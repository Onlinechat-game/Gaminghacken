<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT PRO MAX TELEGRAM READY</title>
<style>
body { background:#0d1117; color:#e6edf3; font-family:Arial; text-align:center; }
.container { margin-top:20px; }
.title { font-size:32px; font-weight:bold; }
.status { font-size:50px; margin:15px; font-weight:bold; }
.green { color:#00ff88; }
.red { color:#ff4d4d; }
.card { background:#161b22; margin:10px auto; padding:15px; width:320px; border-radius:10px; }
.score { font-size:20px; }
</style>
</head>
<body>
<div class="container">
<div class="title">BOT PRO MAX (STABLE + TELEGRAM)</div><div class="card">
<div id="price">Prix: --</div>
<div id="status" class="status">--</div>
<div id="score" class="score">--</div>
<div id="buy">Achat: --%</div>
<div id="sell">Vente: --%</div>
</div></div><script>
const API = "https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=100";

const TOKEN = "8293120597:AAFXNIVeBI7J-QtaqWV32g_9ftHrYpPlceI"; // 🔑 mets ton token
const CHAT_ID = "@H4cken_bot"; // 🔑 mets ton chat id

let lastSignal = "";
let confirmCount = 0;
let lastSent = "";

function EMA(a,p){let k=2/(p+1),e=a[0];for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e;}
function RSI(a,p=14){let g=0,l=0;for(let i=1;i<=p;i++){let d=a[i]-a[i-1];if(d>0)g+=d;else l-=d;}let ag=g/p,al=l/p;for(let i=p+1;i<a.length;i++){let d=a[i]-a[i-1];if(d>0){ag=(ag*(p-1)+d)/p;al=(al*(p-1))/p;}else{ag=(ag*(p-1))/p;al=(al*(p-1)-d)/p;}}let rs=ag/al;return 100-(100/(1+rs));}

function stableSignal(newSignal){
    if(newSignal===lastSignal) confirmCount++;
    else confirmCount=0;

    if(confirmCount>=2){
        lastSignal=newSignal;
        return newSignal;
    }
    return lastSignal||newSignal;
}

function sendTelegram(signal, prob){
    if(!TOKEN || !CHAT_ID) return;

    let emoji = signal === "ACHETER" ? "📈" : "📉";
    let msg = `${emoji} EUR/USD OTC\nSignal: ${signal}\nProbabilité: ${prob}%`;

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

async function analyze(){
    let res = await fetch(API);
    let data = await res.json();

    let closes = data.map(c=>parseFloat(c[4]));
    let price = closes.at(-1);

    let ema = EMA(closes.slice(-50),50);
    let rsi = RSI(closes);

    let score = 0;
    score += (price>ema)?40:-40;
    score += (rsi-50)*1.5;

    let probability = Math.max(0, Math.min(100, Math.round(score + 50)));

    let raw = probability>=50 ? "ACHETER" : "VENDRE";
    let signal = stableSignal(raw);

    // UI
    document.getElementById("price").innerText = "Prix: "+price.toFixed(4);
    document.getElementById("status").innerText = signal;
    document.getElementById("status").className = "status "+(signal==="ACHETER"?"green":"red");

    document.getElementById("score").innerText = signal+" "+probability+"%";
    document.getElementById("buy").innerText = "Achat: "+probability+"%";
    document.getElementById("sell").innerText = "Vente: "+(100-probability)+"%";

    // TELEGRAM (seulement si changement)
    if(signal!==lastSent){
        sendTelegram(signal, probability);
        lastSent = signal;
    }
}

// ⏱️ 10 secondes stable
setInterval(analyze,10000);
analyze();
</script></body>
</html>
