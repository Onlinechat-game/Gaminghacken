<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HACKEN STORE - PRO TRADER</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #0a0f1c, #000);
    color: #00ffc3;
    font-family: Arial;
    text-align: center;
}

h1 {
    text-shadow: 0 0 10px #00ffc3;
}

#chart {
    width: 95%;
    height: 400px;
    margin: auto;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,255,195,0.2);
    border-radius: 10px;
}

.box {
    display: inline-block;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    background: rgba(0,255,195,0.05);
    border: 1px solid rgba(0,255,195,0.3);
    box-shadow: 0 0 10px rgba(0,255,195,0.3);
}

.buy { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
.sell { color: red; text-shadow: 0 0 10px red; }
.neutral { color: orange; }

footer {
    margin-top: 15px;
    opacity: 0.4;
}
</style>
</head>

<body>

<h1>⚡ HACKEN STORE - PRO TRADER</h1>

<div id="indicators"></div>
<h2 id="signal">Connexion...</h2>

<div id="chart"></div>

<footer>HACKEN STORE 🚀</footer>

<script>
// CREATE CHART
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: {
        background: { color: '#000' },
        textColor: '#00ffc3',
    },
    grid: {
        vertLines: { color: '#111' },
        horzLines: { color: '#111' },
    },
    width: window.innerWidth * 0.95,
    height: 400
});

const candleSeries = chart.addCandlestickSeries({
    upColor: '#00ff88',
    downColor: '#ff0033',
    borderVisible: false,
    wickUpColor: '#00ff88',
    wickDownColor: '#ff0033'
});

// FETCH DATA BINANCE
async function getData() {
    let res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100");
    let data = await res.json();

    return data.map(c => ({
        time: c[0] / 1000,
        open: parseFloat(c[1]),
        high: parseFloat(c[2]),
        low: parseFloat(c[3]),
        close: parseFloat(c[4])
    }));
}

// RSI
function RSI(data, period=14){
    let gains=0, losses=0;
    for(let i=data.length-period;i<data.length-1;i++){
        let d=data[i+1]-data[i];
        if(d>0) gains+=d; else losses-=d;
    }
    let rs=gains/(losses||1);
    return 100-(100/(1+rs));
}

// SUPPORT / RESISTANCE
function SR(data){
    return {
        support: Math.min(...data.slice(-20)),
        resistance: Math.max(...data.slice(-20))
    }
}

// UPDATE LOOP
async function update(){
    let candles = await getData();

    candleSeries.setData(candles);

    let closes = candles.map(c=>c.close);
    let rsi = RSI(closes);
    let levels = SR(closes);

    let last = closes[closes.length-1];

    let signal="NEUTRE";
    let cls="neutral";

    if(rsi<30 && last<=levels.support){
        signal="ACHAT 🚀";
        cls="buy";
    }
    else if(rsi>70 && last>=levels.resistance){
        signal="VENTE 🔻";
        cls="sell";
    }

    document.getElementById("signal").innerHTML =
        `<span class="${cls}">${signal}</span>`;

    document.getElementById("indicators").innerHTML = `
        <div class="box">RSI: ${rsi.toFixed(2)}</div>
        <div class="box">Support: ${levels.support.toFixed(2)}</div>
        <div class="box">Résistance: ${levels.resistance.toFixed(2)}</div>
    `;
}

// REFRESH RAPIDE
setInterval(update, 3000);

// FIRST LOAD
update();

</script>

</body>
</html>
