<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken XAU FLASH SCALPER</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000000; color: #fff; text-align: center; padding: 5px; margin: 0; overflow-x: hidden; }
        
        /* EN-TÊTE */
        h2 { color: #ffd700; margin: 5px 0; font-size: 1.1rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* PRIX GÉANT */
        .price-display {
            font-size: 2.5rem; font-weight: 900; font-family: monospace;
            margin: 10px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .price-up { color: #00e676; text-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }
        .price-down { color: #ff5252; text-shadow: 0 0 15px rgba(255, 82, 82, 0.4); }
        .price-change { font-size: 1rem; font-weight: bold; margin-top: -5px; display: block; }

        /* BOUTON D'ACTION GÉANT */
        .action-box {
            padding: 25px 10px; border-radius: 15px; margin: 15px 0;
            border: 3px solid #333; background: #111;
            transition: all 0.1s ease-out; /* Transition ultra rapide */
            position: relative; overflow: hidden;
        }
        
        .action-text { font-size: 2rem; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .action-sub { font-size: 0.9rem; color: #ccc; font-weight: normal; }
        .action-timer { font-size: 0.7rem; color: #888; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* ÉTATS DU SIGNAL */
        .sig-buy { 
            background: linear-gradient(135deg, rgba(0, 230, 118, 0.2), rgba(0, 230, 118, 0.05)); 
            border-color: #00e676; color: #00e676; 
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.4);
            animation: pulseGreen 0.5s infinite;
        }
        .sig-sell { 
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.2), rgba(255, 82, 82, 0.05)); 
            border-color: #ff5252; color: #ff5252; 
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.4);
            animation: pulseRed 0.5s infinite;
        }
        .sig-wait { border-color: #444; color: #666; background: #1a1a1a; }

        @keyframes pulseGreen { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); } 50% { transform: scale(1.02); box-shadow: 0 0 40px rgba(0, 230, 118, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); } }
        @keyframes pulseRed { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 82, 82, 0.4); } 50% { transform: scale(1.02); box-shadow: 0 0 40px rgba(255, 82, 82, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 82, 82, 0.4); } }

        /* NIVEAUX SL/TP RAPIDES */
        .levels-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            margin-bottom: 15px; background: #161616; padding: 10px; border-radius: 10px;
        }
        .lvl-item { text-align: center; }
        .lvl-label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .lvl-value { font-size: 1.1rem; font-weight: bold; font-family: monospace; margin-top: 2px; }
        .v-sl { color: #ff5252; }
        .v-tp { color: #00e676; }
        .v-entry { color: #ffd700; }

        /* INDICATEUR DE VITESSE (MOMENTUM) */
        .momentum-bar-container { margin: 15px 0; text-align: left; }
        .mom-label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .mom-track { height: 12px; background: #222; border-radius: 6px; overflow: hidden; position: relative; }
        .mom-fill { height: 100%; width: 50%; background: #555; transition: width 0.2s linear, background 0.2s; }
        .mom-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 2; }

        .footer { font-size: 0.6rem; color: #555; margin-top: 15px; }
        .creator { color: #ffd700; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <h2>🥇 XAU/USD FLASH <span class="live-dot"></span></h2>
    
    <!-- PRIX EN TEMPS RÉEL -->
    <div class="price-display" id="price-val">--.--</div>
    <span class="price-change" id="price-delta">--</span>

    <!-- BARRE DE MOMENTUM (VITESSE) -->
    <div class="momentum-bar-container">
        <div class="mom-label">
            <span style="color:#ff5252">VENTE</span>
            <span>VITESSE DU MARCHÉ</span>
            <span style="color:#00e676">ACHAT</span>
        </div>
        <div class="mom-track">
            <div class="mom-center"></div>
            <div class="mom-fill" id="mom-fill" style="width: 50%; background: #555;"></div>
        </div>
    </div>

    <!-- SIGNAL PRINCIPAL -->
    <div class="action-box sig-wait" id="signal-box">
        <div class="action-text" id="act-main">EN ATTENTE</div>
        <div class="action-sub" id="act-sub">Surveillance des impulsions...</div>
        <div class="action-timer" id="act-timer">Prochain scan: 2.0s</div>
    </div>

    <!-- NIVEAUX CALCULÉS -->
    <div class="levels-grid">
        <div class="lvl-item">
            <div class="lvl-label">Stop Loss</div>
            <div class="lvl-value v-sl" id="lvl-sl">--.--</div>
        </div>
        <div class="lvl-item">
            <div class="lvl-label">Entrée</div>
            <div class="lvl-value v-entry" id="lvl-entry">--.--</div>
        </div>
        <div class="lvl-item">
            <div class="lvl-label">Take Profit</div>
            <div class="lvl-value v-tp" id="lvl-tp">--.--</div>
        </div>
    </div>

    <div class="footer">Réaction immédiate aux mouvements XAU/USD. Scalping haute fréquence.</div>
    <span class="creator">Creator Hacken STORE</span>

    <script>
        let lastPrice = 0;
        let signalCooldown = false;
        const SYMBOL = 'XAUUSDT';
        
        // Fonction principale appelée toutes les 2 secondes
        async function flashScan() {
            const timerEl = document.getElementById('act-timer');
            
            try {
                // Récupération des données très récentes (1 minute ou ticks si dispo, ici 1m pour stabilité mobile)
                // On prend les 5 dernières minutes pour voir l'impulsion immédiate
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=1m&limit=5`);
                if (!response.ok) throw new Error("Net");
                const data = await response.json();

                const closes = data.map(k => parseFloat(k[4]));
                const highs = data.map(k => parseFloat(k[2]));
                const lows = data.map(k => parseFloat(k[3]));
                
                const currentPrice = closes[closes.length - 1];
                const prevPrice = closes[closes.length - 2];
                const prevPrevPrice = closes[closes.length - 3];

                // 1. Affichage Prix & Delta
                const priceEl = document.getElementById('price-val');
                const deltaEl = document.getElementById('price-delta');
                
                priceEl.innerText = currentPrice.toFixed(2);
                const diff = currentPrice - prevPrice;
                deltaEl.innerText = (diff >= 0 ? "▲ +" : "▼ ") + Math.abs(diff).toFixed(2);
                
                if (diff > 0) { priceEl.className = 'price-display price-up'; deltaEl.style.color = '#00e676'; }
                else if (diff < 0) { priceEl.className = 'price-display price-down'; deltaEl.style.color = '#ff5252'; }
                else { priceEl.className = 'price-display'; deltaEl.style.color = '#888'; }

                // 2. Calcul du Momentum (Vitesse pure)
                // On compare le prix actuel avec il y a 2 minutes pour voir l'accélération
                const momentum = currentPrice - prevPrevPrice;
                const volatility = (highs[highs.length-1] - lows[lows.length-1]); // Taille de la bougie actuelle

                // Mise à jour Barre de Vitesse
                const momFill = document.getElementById('mom-fill');
                // Normalisation simple : si momentum > 1.5$, barre verte max. Si < -1.5$, rouge max.
                let momPercent = 50 + (momentum * 20); 
                if (momPercent > 95) momPercent = 95;
                if (momPercent < 5) momPercent = 5;
                
                momFill.style.width = momPercent + '%';
                if (momPercent > 60) momFill.style.background = '#00e676';
                else if (momPercent < 40) momFill.style.background = '#ff5252';
                else momFill.style.background = '#555';

                // 3. DÉTECTION D'IMPULSION & SIGNAL
                const box = document.getElementById('signal-box');
                const mainText = document.getElementById('act-main');
                const subText = document.getElementById('act-sub');
                const slEl = document.getElementById('lvl-sl');
                const tpEl = document.getElementById('lvl-tp');
                const entryEl = document.getElementById('lvl-entry');

                // Seuils d'impulsion pour l'Or (XAU)
                // Une impulsion forte sur 2 min est > 1.20$ de mouvement
                const threshold = 1.20; 

                if (!signalCooldown) {
                    if (momentum > threshold && volatility > 0.8) {
                        // SIGNAL ACHAT FLASH
                        triggerSignal('BUY', currentPrice, volatility, box, mainText, subText, slEl, tpEl, entryEl);
                    } 
                    else if (momentum < -threshold && volatility > 0.8) {
                        // SIGNAL VENTE FLASH
                        triggerSignal('SELL', currentPrice, volatility, box, mainText, subText, slEl, tpEl, entryEl);
                    } 
                    else {
                        // RETOUR ATTENTE
                        resetSignal(box, mainText, subText, slEl, tpEl, entryEl);
                    }
                }

                // Compte à rebours visuel
                let count = 2.0;
                const interval = setInterval(() => {
                    count -= 0.1;
                    timerEl.innerText = `Prochain scan: ${count.toFixed(1)}s`;
                    if (count <= 0) clearInterval(interval);
                }, 100);

            } catch (error) {
                console.log("Err Flash", error);
                timerEl.innerText = "Erreur connexion...";
            }
        }

        function triggerSignal(type, price, vol, box, mainText, subText, slEl, tpEl, entryEl) {
            signalCooldown = true;
            
            // Calcul SL/TP Scalping (Serrés)
            // SL = 1.0 x Volatilité (On coupe vite si ça tourne)
            // TP = 2.5 x Volatilité (On vise vite le gain)
            const slDist = vol * 1.2; 
            const tpDist = vol * 2.5;

            let slPrice, tpPrice;

            if (type === 'BUY') {
                box.className = 'action-box sig-buy';
                mainText.innerText = 'ACHETER MAINTENANT 🟢';
                subText.innerText = 'Impulsion Haussière Détectée !';
                
                slPrice = price - slDist;
                tpPrice = price + tpDist;
            } else {
                box.className = 'action-box sig-sell';
                mainText.innerText = 'VENDRE MAINTENANT 🔴';
                subText.innerText = 'Impulsion Baissière Détectée !';
                
                slPrice = price + slDist;
                tpPrice = price - tpDist;
            }

            // Affichage des niveaux
            entryEl.innerText = price.toFixed(2);
            slEl.innerText = slPrice.toFixed(2);
            tpEl.innerText = tpPrice.toFixed(2);

            // Vibration et Son (si supporté)
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

            // Cooldown de 10 secondes pour éviter le spam de signaux contradictoires
            setTimeout(() => {
                signalCooldown = false;
            }, 10000);
        }

        function resetSignal(box, mainText, subText, slEl, tpEl, entryEl) {
            // On ne reset le visuel que si on n'est pas en plein signal actif (pour ne pas clignoter trop vite)
            // Ici on laisse le dernier signal affiché jusqu'au prochain scan si pas de nouveau signal fort
            // Ou on peut mettre un état neutre si le momentum retombe à 0
            const momFill = document.getElementById('mom-fill');
            if (Math.abs(parseFloat(momFill.style.width) - 50) < 10) {
                 box.className = 'action-box sig-wait';
                 mainText.innerText = 'EN ATTENTE';
                 subText.innerText = 'Surveillance des impulsions...';
                 slEl.innerText = '--.--';
                 tpEl.innerText = '--.--';
                 entryEl.innerText = '--.--';
            }
        }

        // Démarrage ultra-rapide
        window.onload = function() {
            flashScan();
            setInterval(flashScan, 2000); // Scan toutes les 2 secondes
        };
    </script>
</body>
</html>
