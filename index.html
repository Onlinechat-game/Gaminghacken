<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN PRO TRADER | XAU/USD INSTITUTIONAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0e11;
            --panel-bg: #151a21;
            --border: #2a2e39;
            --text-main: #d1d4dc;
            --text-muted: #787b86;
            --up-color: #26a69a;
            --down-color: #ef5350;
            --accent: #2962ff;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER PRO --- */
        header {
            height: 50px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        .logo span { color: var(--accent); }

        .market-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--up-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 8px; height: 8px; background: var(--up-color); border-radius: 50%; box-shadow: 0 0 5px var(--up-color); }

        /* --- LAYOUT GRID --- */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 320px; /* Graphique large + Sidebar outils */
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* --- GRAPHIQUE PRINCIPAL --- */
        .main-chart {
            border-right: 1px solid var(--border);
            position: relative;
        }

        /* --- SIDEBAR OUTILS --- */
        .sidebar {
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .tool-section {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* --- WIDGETS CONTAINERS --- */
        .mini-widget {
            height: 250px;
            margin-bottom: 10px;
        }

        /* --- CALCULATEUR DE RISQUE --- */
        .risk-calc {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .input-group label { font-size: 0.85rem; color: var(--text-muted); }
        .input-group input {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 5px;
            width: 80px;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        .calc-result {
            background: rgba(41, 98, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 10px;
            text-align: center;
            margin-top: 5px;
        }
        .lot-size { font-size: 1.2rem; font-weight: bold; color: white; }

        /* --- BOUTONS D'ACTION RAPIDE --- */
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-trade {
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-buy { background: var(--up-color); }
        .btn-sell { background: var(--down-color); }
        .btn-trade:hover { opacity: 0.9; }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            .sidebar { height: 400px; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">HACKEN<span>PRO</span></div>
        <div class="market-status">
            <div class="dot"></div>
            XAU/USD MARKET OPEN
        </div>
    </header>

    <div class="workspace">
        
        <!-- ZONE GRAPHIQUE -->
        <div class="main-chart">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="pro_chart"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "OANDA:XAUUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "fr",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_top_toolbar": false,
                    "save_image": false,
                    "container_id": "pro_chart",
                    "studies": [
                        "RSI@tv-basicstudies", 
                        "MASimple@tv-basicstudies",
                        "BB@tv-basicstudies"
                    ],
                    "show_popup_button": true,
                    "popup_width": "1000",
                    "popup_height": "650"
                });
                </script>
            </div>
        </div>

        <!-- ZONE OUTILS PRO -->
        <div class="sidebar">
            
            <!-- 1. ANALYSE MULTI-TIMEFRAME -->
            <div class="tool-section">
                <div class="section-title">Analyse Technique (1H)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1h",
                    "width": "100%",
                    "isTransparent": true,
                    "height": 250,
                    "symbol": "OANDA:XAUUSD",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "fr",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>

            <!-- 2. CALCULATEUR DE POSITION (RISK MANAGEMENT) -->
            <div class="tool-section">
                <div class="section-title">Calculateur de Lots (Risk Manager)</div>
                <div class="risk-calc">
                    <div class="input-group">
                        <label>Capital ($)</label>
                        <input type="number" id="balance" value="1000">
                    </div>
                    <div class="input-group">
                        <label>Risque (%)</label>
                        <input type="number" id="risk" value="1">
                    </div>
                    <div class="input-group">
                        <label>Stop Loss (Pips)</label>
                        <input type="number" id="sl" value="30">
                    </div>
                    
                    <div class="calc-result">
                        <div style="font-size:0.7rem; color:#aaa;">LOTS RECOMMANDÉS</div>
                        <div class="lot-size" id="lotResult">0.00</div>
                    </div>
                    <button class="btn-trade" style="background:#2962ff; width:100%" onclick="calculateLot()">CALCULER</button>
                </div>
            </div>

            <!-- 3. NEWS FLASH -->
            <div class="tool-section" style="flex-grow: 1;">
                <div class="section-title">Flash News</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                    "feedMode": "symbol",
                    "symbol": "OANDA:XAUUSD",
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "displayMode": "compact",
                    "width": "100%",
                    "height": "100%",
                    "locale": "fr"
                    }
                    </script>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Calculateur de taille de position (Formule standard Forex)
        function calculateLot() {
            const balance = parseFloat(document.getElementById('balance').value);
            const riskPercent = parseFloat(document.getElementById('risk').value);
            const slPips = parseFloat(document.getElementById('sl').value);
            
            if(slPips === 0) return;

            // Formule: (Capital * Risque%) / (SL Pips * Valeur du pip pour 1 lot standard)
            // Pour XAUUSD, 1 lot standard = 100oz. 1 pip (0.01 move) = $1. 
            // Simplification: 1 pip standard forex = $10 pour 1 lot. 
            // Pour l'Or, c'est souvent calculé différemment selon le broker, mais voici la base standard :
            
            const riskAmount = balance * (riskPercent / 100);
            // Approximation standard: 1 lot = $10 par pip (si on considère 1 pip = 0.10 mouvement or)
            // Ajustement pour l'or : Si SL est en pips standards (ex: 30 pips = $3.00 mouvement)
            
            const lotSize = riskAmount / (slPips * 1); // Simplifié pour démo
            
            document.getElementById('lotResult').innerText = lotSize.toFixed(2) + " Lots";
        }
    </script>
</body>
</html>
