<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN QUANT | XAU/USD TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --panel: #121212;
            --border: #333;
            --text: #e0e0e0;
            --green: #00ff41;
            --red: #ff003c;
            --blue: #00f0ff;
            --yellow: #fcee0a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { font-family: 'JetBrains Mono'; font-weight: bold; color: var(--blue); letter-spacing: -1px; }
        .ticker { font-family: 'JetBrains Mono'; color: var(--yellow); font-size: 0.9rem; }

        /* GRID LAYOUT */
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr 300px; /* Sidebar | Chart | Data */
            grid-template-rows: 60% 40%;
            height: calc(100vh - 50px);
            width: 100%;
        }

        /* PANELS */
        .panel {
            border: 1px solid var(--border);
            background: var(--panel);
            padding: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .panel-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* ZONES SPECIFIQUES */
        .sidebar-left { grid-row: 1 / 3; grid-column: 1; border-right: 1px solid var(--border); }
        .main-chart { grid-row: 1; grid-column: 2; }
        .data-right { grid-row: 1 / 3; grid-column: 3; border-left: 1px solid var(--border); overflow-y: auto;}
        .bottom-analysis { grid-row: 2; grid-column: 2; border-top: 1px solid var(--border); }

        /* CONFLUENCE TABLE */
        .confluence-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
        }
        .confluence-table td { padding: 8px 0; border-bottom: 1px solid #222; }
        .status-box {
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 0.7rem;
        }
        .bull { background: rgba(0, 255, 65, 0.2); color: var(--green); }
        .bear { background: rgba(255, 0, 60, 0.2); color: var(--red); }
        .neu { background: rgba(255, 255, 255, 0.1); color: #aaa; }

        /* WIDGET CONTAINERS */
        .widget-h { height: 100%; width: 100%; }
        
        /* SCENARIO BUILDER */
        .scenario-box {
            background: #1a1a1a;
            padding: 10px;
            margin-top: 10px;
            border: 1px dashed #444;
        }
        .scenario-input {
            width: 100%; background: #000; border: 1px solid #333; color: white;
            padding: 5px; font-family: 'JetBrains Mono'; margin-bottom: 5px;
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                height: auto;
                overflow-y: auto;
            }
            .sidebar-left, .main-chart, .data-right, .bottom-analysis {
                grid-column: 1; grid-row: auto;
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">HACKEN<span style="color:white">QUANT</span></div>
        <div class="ticker">XAU/USD <span style="color:var(--green)">▲ LIVE</span></div>
    </header>

    <div class="dashboard">
        
        <!-- 1. SIDEBAR: NAVIGATION & ALERTS -->
        <div class="panel sidebar-left">
            <div class="panel-header">SURVEILLANCE</div>
            
            <!-- Widget Hotlist (Ce qui bouge le plus) -->
            <div style="height: 300px; margin-bottom: 20px;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-hotlists.js" async>
                    {
                    "colorTheme": "dark",
                    "dateRange": "1D",
                    "exchange": "FOREX",
                    "showChart": true,
                    "locale": "fr",
                    "largeChartUrl": "",
                    "isTransparent": true,
                    "showSymbolLogo": false,
                    "showFloatingTooltip": false,
                    "width": "100%",
                    "height": "100%"
                    }
                    </script>
                </div>
            </div>

            <div class="panel-header">PLAN DE TRADE</div>
            <div class="scenario-box">
                <input type="text" class="scenario-input" placeholder="Condition d'entrée (Ex: Cassure 2330)">
                <input type="text" class="scenario-input" placeholder="Invalidation (Stop Loss)">
                <input type="text" class="scenario-input" placeholder="Objectif (Take Profit)">
                <button style="width:100%; background:#333; color:white; border:none; padding:5px; cursor:pointer;">SAUVEGARDER SCÉNARIO</button>
            </div>
        </div>

        <!-- 2. MAIN CHART -->
        <div class="panel main-chart" style="padding:0;">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="chart_main"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "OANDA:XAUUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "fr",
                    "toolbar_bg": "#121212",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": false,
                    "container_id": "chart_main",
                    "studies": ["RSI@tv-basicstudies", "StochasticRSI@tv-basicstudies"]
                });
                </script>
            </div>
        </div>

        <!-- 3. RIGHT DATA PANEL: CONFLUENCE & NEWS -->
        <div class="panel data-right">
            <div class="panel-header">MATRICE DE CONFLUENCE (IA)</div>
            
            <!-- Tableau d'analyse statique mais basé sur la logique pro -->
            <table class="confluence-table">
                <tr>
                    <td>Tendance (EMA 200)</td>
                    <td id="trend-val" style="text-align:right;">ANALYSE...</td>
                </tr>
                <tr>
                    <td>Momentum (RSI)</td>
                    <td id="rsi-val" style="text-align:right;">ANALYSE...</td>
                </tr>
                <tr>
                    <td>Volatilité (Bollinger)</td>
                    <td id="vol-val" style="text-align:right;">ANALYSE...</td>
                </tr>
                <tr>
                    <td>Volume</td>
                    <td id="vol-vol" style="text-align:right;">ANALYSE...</td>
                </tr>
            </table>

            <div style="margin-top:20px; text-align:center; border:1px solid var(--blue); padding:10px;">
                <div style="font-size:0.7rem; color:var(--blue);">SCORE DE CONFIANCE GLOBAL</div>
                <div id="global-score" style="font-size:2rem; font-weight:bold; color:white;">--%</div>
            </div>

            <div class="panel-header" style="margin-top:30px;">NEWS IMPACT</div>
            <div style="height: 200px;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                    "feedMode": "symbol",
                    "symbol": "OANDA:XAUUSD",
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "displayMode": "compact",
                    "width": "100%",
                    "height": "100%",
                    "locale": "fr"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 4. BOTTOM ANALYSIS: MULTI-TIMEFRAME RATINGS -->
        <div class="panel bottom-analysis">
            <div class="panel-header">ANALYSE TECHNIQUE PROFONDE (MULTI-TIMEFRAME)</div>
            <div style="display:flex; height: 80%; gap:10px;">
                <!-- 15 Min -->
                <div style="flex:1;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "15m", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "fr", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
                <!-- 1 Hour -->
                <div style="flex:1;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "fr", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
                <!-- 4 Hours -->
                <div style="flex:1;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "fr", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
                 <!-- Daily -->
                 <div style="flex:1;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "1d", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "fr", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Simulation d'une analyse "Quant" basée sur l'observation des widgets
        // Dans une vraie app, on lirait l'API. Ici, on simule la logique de décision.
        
        function updateQuantAnalysis() {
            // Génération de valeurs aléatoires réalistes pour la démo visuelle
            const trends = ['HAUSSIER', 'BAISSIER', 'NEUTRE'];
            const statuses = ['bull', 'bear', 'neu'];
            
            // Randomizer pour l'effet "Live"
            const r1 = Math.floor(Math.random() * 3);
            const r2 = Math.floor(Math.random() * 3);
            const r3 = Math.floor(Math.random() * 3);
            
            // Mise à jour du DOM
            document.getElementById('trend-val').innerHTML = `<span class="status-box ${statuses[r1]}">${trends[r1]}</span>`;
            document.getElementById('rsi-val').innerHTML = `<span class="status-box ${statuses[r2]}">${r2===0?'SURACHAT':r2===1?'SURVENTE':'NEUTRE'}</span>`;
            document.getElementById('vol-val').innerHTML = `<span class="status-box neu">ÉLEVÉE</span>`;
            document.getElementById('vol-vol').innerHTML = `<span class="status-box bull">CROISSANT</span>`;

            // Calcul du score de confiance
            let score = 50;
            if(r1 === r2) score += 20; // Si Tendance et RSI alignés
            if(r3 === 1) score -= 10; // Volatité neutre baisse confiance
            
            document.getElementById('global-score').innerText = score + "%";
            document.getElementById('global-score').style.color = score > 70 ? 'var(--green)' : (score < 40 ? 'var(--red)' : 'white');
        }

        // Lancer l'analyse au chargement
        setTimeout(updateQuantAnalysis, 2000);
    </script>
</body>
    </html>
