<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HackenStore Gold Bot - Auto</title>
    <!-- Importation de Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- STYLE DE L'APPLICATION (CSS) --- */
        body {
            background-color: #0b0f19;
            color: #e0e6ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden; /* Empêche le scroll horizontal */
        }

        h1 {
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8899a6;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .status-bar {
            font-size: 10px;
            color: #00ff88;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Zone du Signal Principal */
        .signal-box {
            background: linear-gradient(145deg, #161b29, #1f2638);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2a3447;
        }

        .signal-title {
            font-size: 14px;
            color: #8899a6;
            text-transform: uppercase;
        }

        .signal-value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: color 0.3s ease;
        }

        .buy { color: #00ff88; text-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .sell { color: #ff3355; text-shadow: 0 0 15px rgba(255, 51, 85, 0.4); }
        .wait { color: #ffd700; }

        /* Indicateurs Techniques */
        .indicators-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card {
            background-color: #161b29;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #00d2ff;
        }

        .card h3 { margin: 0 0 8px 0; font-size: 12px; color: #8899a6; text-transform: uppercase; }
        .card p { margin: 0; font-size: 18px; font-weight: bold; }

        /* Graphique */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            background-color: #161b29;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* News & Sentiment */
        .news-section {
            background-color: #161b29;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
        }
        .news-item {
            border-bottom: 1px solid #2a3447;
            padding: 8px 0;
            font-size: 12px;
            display: flex;
            align-items: center;
        }
        .news-item:last-child { border-bottom: none; }
        .news-positive { color: #00ff88; margin-right: 8px; font-weight: bold;}
        .news-negative { color: #ff3355; margin-right: 8px; font-weight: bold;}
        .news-neutral { color: #8899a6; margin-right: 8px; font-weight: bold;}

        /* Bouton d'action */
        button {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: transform 0.1s;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }

        .footer {
            margin-top: 25px;
            font-size: 10px;
            color: #4a5568;
            letter-spacing: 1px;
        }
        .hackenstore-logo {
            font-weight: bold;
            color: #00d2ff;
            font-size: 14px;
            margin-top: 5px;
            display: block;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
    </style>
</head>
<body>

    <h1>Analyse XAUUSD</h1>
    <div class="subtitle">Bot Auto HackenStore • Mise à jour 1s</div>
    
    <!-- Indicateur de statut -->
    <div class="status-bar">● SYSTÈME EN LIGNE - SCANNING...</div>

    <!-- ZONE DE SIGNAL -->
    <div class="signal-box">
        <div class="signal-title">Signal Actuel (Auto)</div>
        <div id="mainSignal" class="signal-value wait">INITIALISATION...</div>
        <div id="signalReason" style="font-size: 12px; color: #ccc; min-height: 15px;">Chargement des algorithmes...</div>
    </div>

    <!-- INDICATEURS -->
    <div class="indicators-grid">
        <div class="card">
            <h3>Prix Or</h3>
            <p id="priceDisplay">---</p>
        </div>
        <div class="card" style="border-left-color: #ffd700;">
            <h3>RSI (14)</h3>
            <p id="rsiDisplay">---</p>
        </div>
        <div class="card" style="border-left-color: #ff3355;">
            <h3>MM20</h3>
            <p id="mm20Display">---</p>
        </div>
        <div class="card" style="border-left-color: #00ff88;">
            <h3>Sentiment</h3>
            <p id="newsDisplay">---</p>
        </div>
    </div>

    <!-- GRAPHIQUE -->
    <div class="chart-container">
        <canvas id="goldChart"></canvas>
    </div>

    <!-- NEWS SIMULÉES -->
    <div class="news-section">
        <h3 style="color:#00d2ff; margin:0 0 10px 0; font-size:14px;">📰 Flash Info & Sentiment</h3>
        <div id="newsFeed">
            <!-- Les news s'afficheront ici -->
        </div>
    </div>

    <button onclick="runAnalysis()">🔄 FORCER MISE À JOUR</button>

    <div class="footer">
        POWERED BY HACKENSTORE<br>
        <span class="hackenstore-logo">HACKENSTORE</span>
    </div>

    <script>
        /* --- LOGIQUE DU BOT (JAVASCRIPT) --- */

        let myChart = null;
        let priceHistory = [];
        let mm20History = [];
        let labelsHistory = [];
        let maxDataPoints = 20; // Nombre de points sur le graphique

        // Initialisation des historiques
        for(let i=0; i<maxDataPoints; i++) {
            let basePrice = 2030 + (Math.random() * 10 - 5);
            priceHistory.push(basePrice);
            mm20History.push(basePrice - 2);
            labelsHistory.push('');
        }

        // Fonction principale
        function runAnalysis() {
            generateDataAndAnalyze();
        }

        function generateDataAndAnalyze() {
            // 1. GÉNÉRATION DE DONNÉES SIMULÉES (Mouvement réaliste)
            const lastPrice = priceHistory[priceHistory.length - 1];
            // Le prix bouge légèrement par rapport au précédent (marche aléatoire)
            const change = (Math.random() * 4) - 2; 
            const currentPrice = lastPrice + change;
            
            // Calcul RSI et MM20 simulés basés sur le prix
            const rsi = 30 + (Math.random() * 40) + (change > 0 ? 5 : -5); 
            const mm20 = currentPrice - (Math.random() * 5 - 2.5);
            
            // Mise à jour des historiques pour le graphique
            priceHistory.push(currentPrice);
            mm20History.push(mm20);
            if(priceHistory.length > maxDataPoints) {
                priceHistory.shift();
                mm20History.shift();
            }
            
            // Heure actuelle pour le label
            const now = new Date();
            const timeLabel = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
            labelsHistory.push(timeLabel);
            if(labelsHistory.length > maxDataPoints) labelsHistory.shift();

            // Mise à jour de l'affichage des chiffres
            document.getElementById('priceDisplay').innerText = currentPrice.toFixed(2) + " $";
            document.getElementById('rsiDisplay').innerText = rsi.toFixed(1);
            document.getElementById('mm20Display').innerText = mm20.toFixed(2) + " $";

            // 2. ANALYSE TECHNIQUE (La logique du Bot)
            let signal = "ATTENTE";
            let reason = "";
            let sentimentScore = 0; 

            // Logique RSI
            if (rsi > 70) reason += "RSI Surachat. ";
            else if (rsi < 30) reason += "RSI Survente. ";
            else if (rsi > 50) reason += "Momentum Haussier. ";
            else reason += "Momentum Baissier. ";

            // Logique Prix vs MM20
            if (currentPrice > mm20) {
                reason += "Prix > MM20. ";
                sentimentScore += 0.5;
            } else {
                reason += "Prix < MM20. ";
                sentimentScore -= 0.5;
            }

            // Logique News Simulée (Change moins souvent que le prix)
            // On simule un changement de news toutes les 5 secondes environ pour la démo
            if (Math.random() > 0.8) { 
                updateNewsFeed();
            }
            
            // Récupérer le sentiment actuel affiché
            const currentSentimentText = document.getElementById('newsDisplay').innerText;
            if(currentSentimentText.includes("HAUSSIER")) sentimentScore += 0.3;
            if(currentSentimentText.includes("BAISSIER")) sentimentScore -= 0.3;

            // Affichage Sentiment Global
            const sentimentEl = document.getElementById('newsDisplay');
            if (sentimentScore > 0.2) {
                sentimentEl.innerText = "HAUSSIER 🐂";
                sentimentEl.style.color = "#00ff88";
            } else if (sentimentScore < -0.2) {
                sentimentEl.innerText = "BAISSIER 🐻";
                sentimentEl.style.color = "#ff3355";
            } else {
                sentimentEl.innerText = "NEUTRE ⚖️";
                sentimentEl.style.color = "#ffd700";
            }

            // 3. DÉCISION FINALE
            const signalEl = document.getElementById('mainSignal');
            if (sentimentScore > 0.6 && rsi < 75) {
                signal = "ACHAT (BUY) 🚀";
                signalEl.className = "signal-value buy";
            } else if (sentimentScore < -0.6 && rsi > 25) {
                signal = "VENTE (SELL) 📉";
                signalEl.className = "signal-value sell";
            } else {
                signal = "ATTENTE / NEUTRE ⚠️";
                signalEl.className = "signal-value wait";
            }

            signalEl.innerText = signal;
            document.getElementById('signalReason').innerText = reason;

            // 4. DESSINER LE GRAPHIQUE
            drawChart();
        }

        function updateNewsFeed() {
            const newsPool = [
                { text: "Fed : Discours de Powell attendu.", impact: "neutre" },
                { text: "Tensions géopolitiques en hausse.", impact: "positive" },
                { text: "Dollar Index (DXY) en forte hausse.", impact: "negative" },
                { text: "Données inflation US meilleures que prévu.", impact: "positive" },
                { text: "Banques centrales achètent de l'or.", impact: "positive" },
                { text: "Résistance technique majeure touchée.", impact: "negative" }
            ];
            
            // Choisir 3 news aléatoires
            const selectedNews = [];
            for(let i=0; i<3; i++) {
                selectedNews.push(newsPool[Math.floor(Math.random() * newsPool.length)]);
            }

            let newsHtml = "";
            let totalImpact = 0;

            selectedNews.forEach(news => {
                let iconClass = "";
                let iconChar = "";
                if(news.impact === "positive") { iconClass = "news-positive"; iconChar = "🟢"; totalImpact += 1; }
                else if(news.impact === "negative") { iconClass = "news-negative"; iconChar = "🔴"; totalImpact -= 1; }
                else { iconClass = "news-neutral"; iconChar = "⚪"; }

                newsHtml += `<div class="news-item"><span class="${iconClass}">${iconChar}</span> ${news.text}</div>`;
            });
            
            document.getElementById('newsFeed').innerHTML = newsHtml;
            
            // Mettre à jour le résumé sentiment basé sur ces news spécifiques
            const sentimentEl = document.getElementById('newsDisplay');
            if(totalImpact > 0) { sentimentEl.innerText = "HAUSSIER 🐂"; sentimentEl.style.color = "#00ff88"; }
            else if(totalImpact < 0) { sentimentEl.innerText = "BAISSIER 🐻"; sentimentEl.style.color = "#ff3355"; }
            else { sentimentEl.innerText = "NEUTRE ⚖️"; sentimentEl.style.color = "#ffd700"; }
        }

        function drawChart() {
            const ctx = document.getElementById('goldChart').getContext('2d');
            
            if (myChart) {
                // Mise à jour des données existantes (plus fluide que de recréer)
                myChart.data.labels = labelsHistory;
                myChart.data.datasets[0].data = priceHistory;
                myChart.data.datasets[1].data = mm20History;
                myChart.update('none'); // 'none' pour pas d'animation lourde à chaque frame
            } else {
                // Création initiale
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labelsHistory,
                        datasets: [{
                            label: 'Prix XAUUSD',
                            data: priceHistory,
                            borderColor: '#00d2ff',
                            backgroundColor: 'rgba(0, 210, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        },
                        {
                            label: 'MM20',
                            data: mm20History,
                            borderColor: '#ffd700',
                            borderWidth: 1,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false, // Désactiver animation pour performance 1s
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false }, // Cacher les labels X pour propreté
                            y: { 
                                grid: { color: '#2a3447' }, 
                                ticks: { color: '#8899a6', font: {size: 10} } 
                            }
                        }
                    }
                });
            }
        }

        // --- AUTOMATISATION ---
        // Lance l'analyse immédiatement au chargement
        window.onload = function() {
            updateNewsFeed(); // Init news
            runAnalysis();    // Init chart & signal
            
            // Configure la boucle automatique toutes les 1000ms (1 seconde)
            setInterval(runAnalysis, 1000);
        };

    </script>
</body>
</html>
