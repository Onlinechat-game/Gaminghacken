<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Live Auto - Hacken</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #fff; text-align: center; padding: 10px; margin: 0; }
        h2 { color: #ffd700; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Indicateur LIVE */
        .live-indicator {
            font-size: 0.8rem;
            color: #00e676;
            background: rgba(0, 230, 118, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #00e676;
            animation: pulseLive 2s infinite;
        }
        @keyframes pulseLive { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; box-shadow: 0 0 20px rgba(0, 230, 118, 0.1); max-width: 450px; margin: 0 auto; border: 1px solid #333; }
        
        /* ZONE GRAPHIQUE */
        #chart-container {
            width: 100%;
            height: 250px;
            background: #111;
            border-radius: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
        }
        #price-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #4fc3f7;
            z-index: 10;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Sélecteur de temps */
        .time-selector { margin: 10px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .time-btn {
            background: #333; border: 1px solid #555; color: #ccc;
            padding: 6px 10px; border-radius: 5px; cursor: pointer;
            font-size: 0.75rem; transition: all 0.2s;
        }
        .time-btn.active {
            background: #00e676; color: #000; border-color: #00e676;
            font-weight: bold; transform: scale(1.05);
        }

        #signal-box {
            margin: 15px 0; padding: 20px; border-radius: 12px;
            font-size: 1.3rem; font-weight: 900; text-transform: uppercase;
            transition: all 0.3s; border: 2px solid transparent;
            min-height: 70px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; line-height: 1.3;
        }
        .signal-text { font-size: 1.4rem; margin-bottom: 3px; }
        .signal-sub { font-size: 0.85rem; font-weight: normal; opacity: 0.9; }

        .buy { background: linear-gradient(135deg, rgba(0, 200, 83, 0.2), rgba(0, 200, 83, 0.05)); color: #00e676; border-color: #00e676; box-shadow: 0 0 25px rgba(0, 230, 118, 0.4); animation: pulseGreen 2s infinite; }
        .sell { background: linear-gradient(135deg, rgba(255, 61, 0, 0.2), rgba(255, 61, 0, 0.05)); color: #ff5252; border-color: #ff5252; box-shadow: 0 0 25px rgba(255, 82, 82, 0.4); animation: pulseRed 2s infinite; }
        .wait { background-color: #252525; color: #777; border-color: #444; }
        
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        button.action-btn {
            background: linear-gradient(90deg, #2962ff, #00b0ff);
            color: white; border: none; padding: 16px; width: 100%;
            font-size: 1rem; font-weight: bold; border-radius: 10px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(41, 98, 255, 0.4);
        }
        button.action-btn:active { transform: scale(0.96); }
        button.action-btn:disabled { background: #333; color: #555; cursor: not-allowed; box-shadow: none; }

        .details { margin-top: 15px; font-size: 0.75rem; color: #aaa; text-align: left; background: #111; padding: 12px; border-radius: 8px; border-left: 4px solid #ffd700; display: none; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .val-good { color: #00e676; font-weight: bold; }
        .val-bad { color: #ff5252; font-weight: bold; }
        .advice { margin-top: 8px; font-style: italic; color: #ffd700; font-size: 0.7rem; }

        #enable-sound { margin-top: 10px; background: #333; font-size: 0.75rem; padding: 8px; border: 1px solid #555; width: 100%; color: #fff; border-radius: 5px; cursor: pointer; }
        .creator-signature { margin-top: 20px; font-size: 0.8rem; font-weight: bold; color: #ffd700; text-transform: uppercase; border-top: 1px dashed #444; padding-top: 10px; }
        .creator-signature span { color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>
            🤖 Bot Live 
            <span class="live-indicator">● EN DIRECT</span>
        </h2>
        <div class="subtitle">Graphique EUR/USD Auto-Mise à jour</div>
        
        <div id="chart-container">
            <div id="price-overlay">Prix: --.--</div>
        </div>

        <div class="time-selector">
            <button class="time-btn" onclick="setTime('20m')">20 Min</button>
            <button class="time-btn" onclick="setTime('40m')">40 Min</button>
            <button class="time-btn active" onclick="setTime('1h')">1 Heure</button>
            <button class="time-btn" onclick="setTime('24h')">24 Heures</button>
            <button class="time-btn" onclick="setTime('48h')">48 Heures</button>
        </div>
        <div style="font-size: 0.7rem; color: #666; margin-bottom: 10px;">Objectif : <span id="selected-time-display" style="color:#fff; font-weight:bold;">1 Heure</span></div>
        
        <div id="signal-box" class="wait">
            <div class="signal-text">EN ATTENTE</div>
            <div class="signal-sub">Le graphique tourne. Lance l'analyse quand tu veux.</div>
        </div>
        
        <button id="btn-analyze" class="action-btn" onclick="lancerAnalyse()">LANCER L'ANALYSE</button>
        <button id="enable-sound" onclick="activerSon()">🔊 ACTIVER LE SON</button>
        
        <div class="details" id="tech-details"></div>

        <div class="creator-signature">Creator <span>Hacken STORE</span></div>
    </div>

    <script>
        let chart, candleSeries, emaSeries;
        let selectedTimeframe = '1h';
        let audioContext = null;
        let isSoundEnabled = false;
        let currentCandles = []; // Stockage local des données

        // --- 1. INITIALISATION DU GRAPHIQUE ---
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 250,
                layout: { backgroundColor: '#111', textColor: '#aaa' },
                grid: { vertLines: { color: '#222' }, horzLines: { color: '#222' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { borderColor: '#444', timeVisible: true, secondsVisible: false },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00e676', downColor: '#ff5252',
                borderDownColor: '#ff5252', borderUpColor: '#00e676',
                wickDownColor: '#ff5252', wickUpColor: '#00e676',
            });

            emaSeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2, title: 'EMA 50' });

            window.addEventListener('resize', () => chart.resize(container.clientWidth, 250));
            
            // Démarrer la mise à jour automatique immédiate
            updateChartData();
            setInterval(updateChartData, 3000); // Mise à jour toutes les 3 secondes
        }

        // --- 2. FONCTION DE MISE À JOUR AUTOMATIQUE ---
        async function updateChartData() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=15m&limit=100');
                if (!response.ok) return;
                const data = await response.json();

                const candles = data.map(k => ({
                    time: k[0] / 1000,
                    open: parseFloat(k[1]), high: parseFloat(k[2]),
                    low: parseFloat(k[3]), close: parseFloat(k[4])
                }));

                currentCandles = candles; // Sauvegarde pour l'analyse
                candleSeries.setData(candles);
                
                // Mise à jour du prix affiché
                const lastPrice = candles[candles.length - 1].close;
                document.getElementById('price-overlay').innerText = "Prix: " + lastPrice.toFixed(5);

                // Recalculer et mettre à jour l'EMA automatiquement
                const closes = candles.map(c => c.close);
                const emaValues = calculateEMA(closes, 50);
                const emaData = candles.map((c, i) => ({ time: c.time, value: emaValues[i] }));
                emaSeries.setData(emaData);

            } catch (error) {
                console.log("Erreur MAJ auto", error);
            }
        }

        function setTime(time) {
            selectedTimeframe = time;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            let text = time === '20m' ? "20 Min" : time === '40m' ? "40 Min" : time === '1h' ? "1 Heure" : time === '24h' ? "24 Heures" : "48 Heures";
            document.getElementById('selected-time-display').innerText = text;
            document.getElementById('signal-box').className = "wait";
            document.getElementById('signal-box').innerHTML = `<div class="signal-text">PRÊT</div><div class="signal-sub">Graphique à jour. Lance l'analyse.</div>`;
            document.getElementById('tech-details').style.display = 'none';
        }

        function activerSon() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            isSoundEnabled = true;
            document.getElementById('enable-sound').innerText = "✅ SON ACTIVÉ";
            document.getElementById('enable-sound').style.background = "#00e676";
            document.getElementById('enable-sound').style.color = "#000";
        }

        function envoyerNotification(titre, message, type) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(titre, { body: message, tag: 'signal' });
            }
            if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
            if (isSoundEnabled) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioContext.currentTime);
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
                osc.stop(audioContext.currentTime + 0.5);
            }
        }

        // --- 3. FONCTIONS DE CALCUL (EMA, RSI, ADX) ---
        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            return prices.map(p => { ema = p * k + ema * (1 - k); return ema; });
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period - 1; i < prices.length - 1; i++) {
                const diff = prices[i+1] - prices[i];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            if (losses === 0) return 100;
            return 100 - (100 / (1 + (gains / losses)));
        }

        function calculateADX(highs, lows, closes, period = 14) {
            if (closes.length < period * 2) return 0;
            // Version simplifiée pour la performance en temps réel
            let trSum = 0, plusDMSum = 0, minusDMSum = 0;
            for(let i = closes.length - period; i < closes.length; i++) {
                let tr = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
                trSum += tr;
                let plusDM = Math.max(0, highs[i] - highs[i-1]);
                let minusDM = Math.max(0, lows[i-1] - lows[i]);
                if (plusDM > minusDM) minusDMSum += 0; else plusDMSum += 0; // Simplification logique
                plusDMSum += (plusDM > minusDM ? plusDM : 0);
                minusDMSum += (minusDM > plusDM ? minusDM : 0);
            }
            let avgTR = trSum / period;
            let plusDI = ((plusDMSum / period) / avgTR) * 100;
            let minusDI = ((minusDMSum / period) / avgTR) * 100;
            if ((plusDI + minusDI) === 0) return 0;
            return Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100;
        }

        // --- 4. LANCEMENT DE L'ANALYSE MANUELLE (Sur données à jour) ---
        function lancerAnalyse() {
            if (currentCandles.length === 0) {
                alert("Chargement des données...");
                return;
            }

            const btn = document.getElementById('btn-analyze');
            btn.disabled = true;
            btn.innerText = "CALCUL EN COURS...";

            setTimeout(() => {
                const closes = currentCandles.map(c => c.close);
                const highs = currentCandles.map(c => c.high);
                const lows = currentCandles.map(c => c.low);
                const lastClose = closes[closes.length - 1];
                
                // Calculs sur les données fraîches
                const emaValues = calculateEMA(closes, 50);
                const lastEMA = emaValues[emaValues.length - 1];
                const rsi = calculateRSI(closes, 14);
                const adx = calculateADX(highs, lows, closes, 14);

                // Paramètres selon le temps
                let adxThreshold = 20, slPips = 50, tpPips = 100;
                if (selectedTimeframe === '20m') { adxThreshold = 25; slPips = 30; tpPips = 60; }
                else if (selectedTimeframe === '24h') { adxThreshold = 18; slPips = 150; tpPips = 300; }
                else if (selectedTimeframe === '48h') { adxThreshold = 15; slPips = 250; tpPips = 500; }

                let signal = "ATTENDRE ⚪", type = "wait", reason = "Conditions non réunies";

                if (lastClose > lastEMA && rsi < 65 && adx > adxThreshold) {
                    signal = "ACHETER 🟢"; type = "buy"; reason = "Prix > EMA & Tendance Forte";
                    envoyerNotification("SIGNAL ACHAT", reason, 'buy');
                } else if (lastClose < lastEMA && rsi > 35 && adx > adxThreshold) {
                    signal = "VENDRE 🔴"; type = "sell"; reason = "Prix < EMA & Tendance Forte";
                    envoyerNotification("SIGNAL VENTE", reason, 'sell');
                }

                const box = document.getElementById('signal-box');
                box.className = type;
                box.innerHTML = `<div class="signal-text">${signal}</div><div class="signal-sub">${reason}</div>`;

                document.getElementById('tech-details').style.display = 'block';
                document.getElementById('tech-details').innerHTML = `
                    <div class="detail-row"><span>Prix vs EMA:</span> <span class="${lastClose > lastEMA ? 'val-good' : 'val-bad'}">${lastClose > lastEMA ? 'HAUSSE' : 'BAISSE'}</span></div>
                    <div class="detail-row"><span>ADX:</span> <span>${adx.toFixed(1)}</span></div>
                    <div class="detail-row"><span>RSI:</span> <span>${rsi.toFixed(1)}</span></div>
                    <div class="advice">💡 SL: ${slPips} pts | TP: ${tpPips} pts</div>
                `;

                btn.disabled = false;
                btn.innerText = "NOUVELLE ANALYSE";
            }, 500);
        }

        window.onload = initChart;
    </script>
</body>
    </html>
