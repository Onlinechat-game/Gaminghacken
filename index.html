<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken LIVE Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000000; 
            color: #fff; 
            text-align: center; 
            padding: 5px; 
            margin: 0; 
            overflow-x: hidden;
        }
        h2 { color: #ffd700; margin: 5px 0; font-size: 1.2rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .live-badge {
            background: #ff0000; color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
            animation: blink 1s infinite; font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* GRAPHIQUE */
        #chart-container {
            width: 100%; height: 220px;
            background: #0a0a0a; border-radius: 10px;
            margin: 10px auto; border: 1px solid #333;
            position: relative;
        }
        #current-price {
            position: absolute; top: 10px; left: 10px;
            font-size: 1.1rem; font-weight: bold; color: #4fc3f7;
            z-index: 10; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px;
        }

        /* TABLEAU DE BORD INDICATEURS */
        .dashboard-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin: 10px auto; max-width: 400px;
        }
        .card {
            background: #1a1a1a; border-radius: 8px; padding: 10px;
            border: 1px solid #333; text-align: left;
        }
        .card-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .card-value { font-size: 1.1rem; font-weight: bold; }
        .val-up { color: #00e676; }
        .val-down { color: #ff5252; }
        .val-neutral { color: #ffa000; }

        /* BARRE DE FORCE ACHAT/VENTE */
        .force-container {
            max-width: 400px; margin: 15px auto; text-align: left;
        }
        .force-labels { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; font-weight: bold; }
        .progress-bar {
            height: 20px; background: #333; border-radius: 10px; overflow: hidden;
            display: flex; position: relative;
        }
        .bar-buy { background: linear-gradient(90deg, #006400, #00e676); height: 100%; transition: width 0.5s; }
        .bar-sell { background: linear-gradient(90deg, #8b0000, #ff5252); height: 100%; transition: width 0.5s; }
        .marker {
            position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 5;
            box-shadow: 0 0 5px #fff; transition: left 0.5s;
        }

        /* SIGNAL AUTOMATIQUE GÉANT */
        #auto-signal-box {
            max-width: 400px; margin: 15px auto; padding: 20px;
            border-radius: 12px; border: 2px solid #333;
            background: #111; transition: all 0.3s;
        }
        .signal-title { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .signal-desc { font-size: 0.9rem; color: #ccc; }
        
        .sig-buy { background: rgba(0, 230, 118, 0.15); border-color: #00e676; color: #00e676; box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
        .sig-sell { background: rgba(255, 82, 82, 0.15); border-color: #ff5252; color: #ff5252; box-shadow: 0 0 20px rgba(255, 82, 82, 0.2); }
        .sig-wait { background: #222; border-color: #555; color: #aaa; }

        .footer-note { font-size: 0.65rem; color: #555; margin-top: 20px; }
        .creator { font-size: 0.7rem; color: #ffd700; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2>📊 Hacken LIVE <span class="live-badge">● EN DIRECT</span></h2>
    
    <!-- Graphique -->
    <div id="chart-container">
        <div id="current-price">Prix: --.--</div>
    </div>

    <!-- Indicateurs Clés -->
    <div class="dashboard-grid">
        <div class="card">
            <div class="card-title">RSI (14)</div>
            <div class="card-value" id="rsi-val">--</div>
        </div>
        <div class="card">
            <div class="card-title">ADX (Force)</div>
            <div class="card-value" id="adx-val">--</div>
        </div>
        <div class="card">
            <div class="card-title">Tendance (EMA)</div>
            <div class="card-value" id="ema-trend">--</div>
        </div>
        <div class="card">
            <div class="card-title">Momentum</div>
            <div class="card-value" id="mom-val">--</div>
        </div>
    </div>

    <!-- Barre de Force Achat/Vente -->
    <div class="force-container">
        <div class="force-labels">
            <span style="color:#00e676">FORCE ACHAT <span id="buy-pct">0%</span></span>
            <span style="color:#ff5252">FORCE VENTE <span id="sell-pct">0%</span></span>
        </div>
        <div class="progress-bar">
            <div class="bar-buy" id="bar-buy" style="width: 50%;"></div>
            <div class="bar-sell" id="bar-sell" style="width: 50%;"></div>
            <div class="marker" id="force-marker" style="left: 50%;"></div>
        </div>
    </div>

    <!-- Signal Automatique -->
    <div id="auto-signal-box" class="sig-wait">
        <div class="signal-title" id="sig-title">INITIALISATION...</div>
        <div class="signal-desc" id="sig-desc">Chargement des données marché</div>
    </div>

    <div class="footer-note">Mise à jour automatique toutes les 3 secondes. Ne pas rafraîchir.</div>
    <div class="creator">Creator Hacken STORE</div>

    <script>
        let chart, candleSeries, emaSeries;
        let currentData = [];

        // 1. Initialisation du Graphique
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 220,
                layout: { backgroundColor: '#0a0a0a', textColor: '#aaa' },
                grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
                timeScale: { borderColor: '#333', timeVisible: true, secondsVisible: false },
                rightPriceScale: { borderColor: '#333' },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00e676', downColor: '#ff5252',
                borderUpColor: '#00e676', borderDownColor: '#ff5252',
                wickUpColor: '#00e676', wickDownColor: '#ff5252',
            });

            emaSeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2, title: 'EMA 50' });

            window.addEventListener('resize', () => chart.resize(container.clientWidth, 220));
            
            // Lancer la boucle automatique
            fetchDataLoop();
            setInterval(fetchDataLoop, 3000); // Mise à jour toutes les 3 secondes
        }

        // 2. Boucle de Récupération et Analyse
        async function fetchDataLoop() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=15m&limit=100');
                if (!response.ok) throw new Error("Network");
                const data = await response.json();

                // Préparation des données
                const candles = data.map(k => ({
                    time: k[0] / 1000,
                    open: parseFloat(k[1]), high: parseFloat(k[2]),
                    low: parseFloat(k[3]), close: parseFloat(k[4])
                }));
                
                const closes = candles.map(c => c.close);
                const highs = candles.map(c => c.high);
                const lows = candles.map(c => c.low);
                const lastPrice = closes[closes.length - 1];
                const prevPrice = closes[closes.length - 2];

                // Mise à jour Graphique
                candleSeries.setData(candles);
                document.getElementById('current-price').innerText = "Prix: " + lastPrice.toFixed(5);
                document.getElementById('current-price').style.color = lastPrice >= prevPrice ? '#00e676' : '#ff5252';

                // Calculs Indicateurs
                const emaValues = calculateEMA(closes, 50);
                const lastEMA = emaValues[emaValues.length - 1];
                emaData = candles.map((c, i) => ({ time: c.time, value: emaValues[i] }));
                emaSeries.setData(emaData);

                const rsi = calculateRSI(closes, 14);
                const adx = calculateADX(highs, lows, closes, 14);
                const momentum = lastPrice - closes[closes.length - 5]; // Momentum sur 5 bougies

                // Mise à jour Interface Indicateurs
                updateIndicatorsUI(rsi, adx, lastPrice, lastEMA, momentum);

                // Calcul Force Achat/Vente & Signal
                calculateForceAndSignal(rsi, adx, lastPrice, lastEMA, momentum);

            } catch (error) {
                console.log("Erreur loop", error);
                document.getElementById('sig-desc').innerText = "Erreur connexion... Réessai auto.";
            }
        }

        // 3. Mise à jour UI Indicateurs
        function updateIndicatorsUI(rsi, adx, price, ema, mom) {
            // RSI
            const rsiEl = document.getElementById('rsi-val');
            rsiEl.innerText = rsi.toFixed(1);
            rsiEl.className = 'card-value ' + (rsi > 70 ? 'val-down' : rsi < 30 ? 'val-up' : 'val-neutral');

            // ADX
            const adxEl = document.getElementById('adx-val');
            adxEl.innerText = adx.toFixed(1);
            adxEl.className = 'card-value ' + (adx > 25 ? 'val-up' : 'val-neutral');

            // EMA Trend
            const emaEl = document.getElementById('ema-trend');
            const isUp = price > ema;
            emaEl.innerText = isUp ? "HAUSSE ⬆" : "BAISSE ⬇";
            emaEl.className = 'card-value ' + (isUp ? 'val-up' : 'val-down');

            // Momentum
            const momEl = document.getElementById('mom-val');
            momEl.innerText = (mom > 0 ? "+" : "") + mom.toFixed(5);
            momEl.className = 'card-value ' + (mom > 0 ? 'val-up' : 'val-down');
        }

        // 4. Calcul Force et Signal Automatique
        function calculateForceAndSignal(rsi, adx, price, ema, mom) {
            let buyScore = 0;
            let sellScore = 0;

            // Scoring System
            if (price > ema) buyScore += 40; else sellScore += 40;
            
            if (rsi > 50) buyScore += (Math.min(rsi - 50, 20)); else sellScore += (Math.min(50 - rsi, 20));
            if (rsi < 30) buyScore += 20; // Survente
            if (rsi > 70) sellScore += 20; // Surachat

            if (adx > 25) {
                if (price > ema) buyScore += 20; else sellScore += 20;
            }

            if (mom > 0) buyScore += 10; else sellScore += 10;

            // Normalisation pour avoir un total de 100%
            const total = buyScore + sellScore;
            const buyPct = Math.round((buyScore / total) * 100);
            const sellPct = 100 - buyPct;

            // Mise à jour Barre Visuelle
            document.getElementById('bar-buy').style.width = buyPct + '%';
            document.getElementById('bar-sell').style.width = sellPct + '%';
            document.getElementById('force-marker').style.left = buyPct + '%';
            document.getElementById('buy-pct').innerText = buyPct + '%';
            document.getElementById('sell-pct').innerText = sellPct + '%';

            // Décision Finale
            const box = document.getElementById('auto-signal-box');
            const title = document.getElementById('sig-title');
            const desc = document.getElementById('sig-desc');

            if (buyPct >= 65 && adx > 20) {
                box.className = 'sig-buy';
                title.innerText = "ACHETER 🟢";
                desc.innerText = `Force Achat: ${buyPct}% | Tendance Confirmée`;
            } else if (sellPct >= 65 && adx > 20) {
                box.className = 'sig-sell';
                title.innerText = "VENDRE 🔴";
                desc.innerText = `Force Vente: ${sellPct}% | Tendance Confirmée`;
            } else {
                box.className = 'sig-wait';
                title.innerText = "ATTENDRE ⚪";
                desc.innerText = "Marché indécis ou trop faible (ADX bas)";
            }
        }

        // --- Fonctions Mathématiques ---
        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            return prices.map(p => { ema = p * k + ema * (1 - k); return ema; });
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period - 1; i < prices.length - 1; i++) {
                const diff = prices[i+1] - prices[i];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            if (losses === 0) return 100;
            return 100 - (100 / (1 + (gains / losses)));
        }

        function calculateADX(highs, lows, closes, period = 14) {
            if (closes.length < period * 2) return 0;
            let trSum = 0, plusDMSum = 0, minusDMSum = 0;
            for(let i = closes.length - period; i < closes.length; i++) {
                let tr = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
                trSum += tr;
                let plusDM = Math.max(0, highs[i] - highs[i-1]);
                let minusDM = Math.max(0, lows[i-1] - lows[i]);
                plusDMSum += (plusDM > minusDM ? plusDM : 0);
                minusDMSum += (minusDM > plusDM ? minusDM : 0);
            }
            let avgTR = trSum / period;
            let plusDI = ((plusDMSum / period) / avgTR) * 100;
            let minusDI = ((minusDMSum / period) / avgTR) * 100;
            if ((plusDI + minusDI) === 0) return 0;
            return Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100;
        }

        // Démarrage
        window.onload = initChart;
    </script>
</body>
</html>
