<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken TURBO AGRESSIF</title>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            padding: 10px; 
            margin: 0; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container { width: 100%; max-width: 350px; }

        h1 { font-size: 1.1rem; color: #ffd700; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* ZONE DE SIGNAL GÉANTE */
        #signal-box {
            width: 100%;
            height: 140px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        .signal-text { z-index: 2; text-shadow: 2px 2px 4px #000; line-height: 1.1; }
        .sub-text { font-size: 0.9rem; font-weight: normal; z-index: 2; opacity: 0.9; margin-top: 5px; }

        /* Couleurs Flash */
        .buy { 
            background: linear-gradient(135deg, #00ff00, #008000); 
            color: #fff; 
            border-color: #00ff00; 
            box-shadow: 0 0 50px #00ff00;
            animation: pulseGreen 0.3s infinite;
        }
        .sell { 
            background: linear-gradient(135deg, #ff0000, #800000); 
            color: #fff; 
            border-color: #ff0000; 
            box-shadow: 0 0 50px #ff0000;
            animation: pulseRed 0.3s infinite;
        }

        @keyframes pulseGreen { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }
        @keyframes pulseRed { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }

        /* BOUTON D'ACTION GÉANT */
        #btn-analyze {
            background: linear-gradient(90deg, #ff0055, #ff5500);
            color: white; 
            border: none; 
            padding: 20px; 
            width: 100%; 
            font-size: 1.4rem; 
            font-weight: 900; 
            border-radius: 12px;
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.6);
            transition: transform 0.05s;
            margin-bottom: 10px;
            touch-action: manipulation;
        }
        #btn-analyze:active { 
            transform: scale(0.95); 
            background: linear-gradient(90deg, #ff5500, #ff0055);
        }
        #btn-analyze:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* STATS */
        .stats { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aaa; font-family: monospace; background: #1a1a1a; padding: 8px; border-radius: 8px; }
        .val { color: #fff; font-weight: bold; }
        .momentum-up { color: #00ff00; }
        .momentum-down { color: #ff0000; }

        button.small-btn {
            background: #333; color: #fff; border: 1px solid #555;
            padding: 8px; border-radius: 5px; font-size: 0.7rem;
            margin-top: 5px; cursor: pointer; width: 100%;
        }
        button.small-btn.active { background: #00e676; color: #000; font-weight: bold; border: none; }

        .warning { font-size: 0.6rem; color: #ffaa00; margin-top: 8px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Hacken TURBO AGRESSIF</h1>

    <div id="signal-box" style="background:#222; border-color:#555; color:#aaa;">
        <div class="signal-text" style="font-size:1.5rem">PRÊT À FRAPPER</div>
        <div class="sub-text">Appuie pour le signal 10s</div>
    </div>

    <!-- LE BOUTON MANUEL -->
    <button id="btn-analyze" onclick="lancerAnalyseManuelle()">👉 DONNER LE SIGNAL</button>

    <div class="stats">
        <span>Prix: <span id="price" class="val">...</span></span>
        <span>Tendance: <span id="trend" class="val">-</span></span>
    </div>

    <button class="small-btn" id="btn-sound" onclick="initAudio()">🔊 ACTIVER SON & VIBRATION</button>
    <div class="warning">⚠️ MODE AGRESSIF : Donne toujours une direction (Achat ou Vente). Risque élevé.</div>
</div>

<script>
    let audioCtx;
    let isAudioReady = false;
    let isProcessing = false;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAudioReady = true;
        document.getElementById('btn-sound').innerText = "✅ SON ACTIVÉ";
        document.getElementById('btn-sound').classList.add('active');
        if (navigator.vibrate) navigator.vibrate(200);
        playTone(800, 'square', 0.1);
    }

    function playTone(freq, type, duration) {
        if (!isAudioReady) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function triggerAlert(type) {
        const box = document.getElementById('signal-box');
        const btn = document.getElementById('btn-analyze');
        
        let title, sub, colorClass;
        
        if (type === 'BUY') {
            title = "ACHETER 🟢";
            sub = "MAINTENANT (10s) !";
            colorClass = 'buy';
        } else {
            title = "VENDRE 🔴";
            sub = "MAINTENANT (10s) !";
            colorClass = 'sell';
        }

        // Affichage Flash
        box.className = colorClass;
        box.innerHTML = `<div class="signal-text">${title}</div><div class="sub-text">${sub}</div>`;
        document.title = type === 'BUY' ? "🟢 ACHETER 10S" : "🔴 VENDRE 10S";

        // Alerte Sonore Forte (Sirène d'urgence)
        if (isAudioReady) {
            playTone(1000, 'sawtooth', 0.15);
            setTimeout(() => playTone(1400, 'sawtooth', 0.15), 160);
            setTimeout(() => playTone(1000, 'sawtooth', 0.3), 320);
        }

        // Vibration Puissante
        if (navigator.vibrate) {
            navigator.vibrate([300, 100, 300, 100, 500]);
        }

        // Notification
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("HACKEN TURBO", { body: title, tag: 'turbo-agressif' });
        }

        // Bloquer le bouton pendant 9 secondes (temps du trade)
        btn.disabled = true;
        btn.innerText = "TRADE EN COURS...";
        btn.style.background = "#333";
        
        // Reset après 9 secondes
        setTimeout(() => {
            box.className = '';
            box.style.background = "#222";
            box.style.border = "4px solid #555";
            box.style.color = "#aaa";
            box.innerHTML = `<div class="signal-text" style="font-size:1.5rem">PRÊT À FRAPPER</div><div class="sub-text">Appuie pour le signal 10s</div>`;
            document.title = "Hacken TURBO AGRESSIF";
            btn.disabled = false;
            btn.innerText = "👉 DONNER LE SIGNAL";
            btn.style.background = ""; // Reset gradient
            isProcessing = false;
        }, 9000);
    }

    async function lancerAnalyseManuelle() {
        if (isProcessing) return;
        isProcessing = true;

        const btn = document.getElementById('btn-analyze');
        const box = document.getElementById('signal-box');
        const priceSpan = document.getElementById('price');
        const trendSpan = document.getElementById('trend');

        // État de chargement ultra-rapide
        btn.innerText = "CALCUL...";
        
        try {
            // Récupération des données (Dernières minutes)
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=5');
            const data = await response.json();
            
            const closes = data.map(k => parseFloat(k[4]));
            const currentPrice = closes[closes.length - 1];
            const prevPrice = closes[closes.length - 2];
            const prevPrevPrice = closes[closes.length - 3];

            priceSpan.innerText = currentPrice.toFixed(5);

            // LOGIQUE AGRESSIVE : On compare juste le prix actuel vs il y a 2 min
            // Même une toute petite différence donne un signal
            const momentum = currentPrice - prevPrevPrice;
            
            // Seuil très bas pour forcer une décision
            const threshold = 0.00005; 

            if (momentum >= 0) {
                // Si c'est positif ou égal à 0, on dit ACHETER (par défaut haussier si stable)
                trendSpan.innerText = "HAUSSE";
                trendSpan.className = "val momentum-up";
                triggerAlert('BUY');
            } else {
                // Si c'est négatif, on dit VENDRE
                trendSpan.innerText = "BAISSE";
                trendSpan.className = "val momentum-down";
                triggerAlert('SELL');
            }

        } catch (error) {
            // En cas d'erreur, on donne un signal par défaut ou on demande de réessayer
            box.innerHTML = `<div class="signal-text" style="color:orange">ERREUR</div><div class="sub-text">Vérifie connexion</div>`;
            btn.disabled = false;
            btn.innerText = "👉 RÉESSAYER";
            isProcessing = false;
        }
    }

    // Demande permission notif
    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }
</script>
</body>
</html>
