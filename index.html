<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken Sentiment Live</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        h2 { color: #ffd700; margin: 5px 0 15px 0; font-size: 1.3rem; text-transform: uppercase; }
        
        /* PRIX STYLE TICKER */
        .price-box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .price-value { font-size: 2.2rem; font-weight: 900; color: #4fc3f7; font-family: monospace; }
        .price-change { font-size: 1rem; margin-top: 5px; font-weight: bold; }

        /* BARRE DE SENTIMENT (STYLE POCKET OPTION) */
        .sentiment-container {
            background: #1a1a1a; border-radius: 15px; padding: 20px;
            border: 1px solid #333; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .sentiment-title { font-size: 0.9rem; color: #aaa; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        .percentages { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; }
        .txt-buy { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.4); }
        .txt-sell { color: #ff5252; text-shadow: 0 0 10px rgba(255, 82, 82, 0.4); }

        .progress-bar {
            height: 30px; background: #333; border-radius: 15px; overflow: hidden;
            display: flex; position: relative; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            border: 1px solid #444;
        }
        .bar-buy { 
            background: linear-gradient(90deg, #004d26, #00e676); 
            height: 100%; 
            transition: width 0.2s linear; /* Mouvement fluide et rapide */
        }
        .bar-sell { 
            background: linear-gradient(90deg, #8b0000, #ff5252); 
            height: 100%; 
            transition: width 0.2s linear;
        }
        
        /* Indicateur central */
        .center-marker {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.3); z-index: 10;
        }

        /* SIGNAL BOX */
        #signal-box {
            padding: 20px; border-radius: 12px; border: 2px solid #333;
            background: #111; transition: all 0.2s;
        }
        .sig-text { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        .sig-sub { font-size: 0.9rem; color: #ccc; margin-top: 5px; }
        
        .sig-buy { background: rgba(0, 230, 118, 0.1); border-color: #00e676; color: #00e676; }
        .sig-sell { background: rgba(255, 82, 82, 0.1); border-color: #ff5252; color: #ff5252; }
        .sig-wait { background: #222; border-color: #555; color: #888; }

        .footer { font-size: 0.7rem; color: #555; margin-top: 20px; }
        .creator { color: #ffd700; font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h2>📊 Hacken Sentiment Live</h2>

    <div class="price-box">
        <div style="font-size:0.8rem; color:#888;">EUR/USD</div>
        <div class="price-value" id="price">--.--</div>
        <div class="price-change" id="change">--</div>
    </div>

    <!-- BARRE STYLE POCKET OPTION -->
    <div class="sentiment-container">
        <div class="sentiment-title">Sentiment des Traders (Temps Réel)</div>
        <div class="percentages">
            <span class="txt-buy" id="buy-txt">50%</span>
            <span class="txt-sell" id="sell-txt">50%</span>
        </div>
        <div class="progress-bar">
            <div class="center-marker"></div>
            <div class="bar-buy" id="bar-buy" style="width: 50%;"></div>
            <div class="bar-sell" id="bar-sell" style="width: 50%;"></div>
        </div>
        <div style="font-size: 0.7rem; color: #666; margin-top: 8px;">Basé sur la vélocité du marché</div>
    </div>

    <div id="signal-box" class="sig-wait">
        <div class="sig-text" id="sig-main">EN ATTENTE</div>
        <div class="sig-sub" id="sig-sub">Analyse du flux d'ordres...</div>
    </div>

    <div class="footer">Mise à jour ultra-rapide (2s). Simulation de flux basée sur la volatilité.</div>
    <span class="creator">Creator Hacken STORE</span>

    <script>
        let lastBuyPercent = 50;
        let lastSellPercent = 50;
        let trendBuffer = 0; // Pour lisser les changements brusques

        async function fetchMarketData() {
            try {
                // Récupération des données très récentes
                const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=10');
                if (!response.ok) throw new Error("Net");
                const data = await response.json();

                const closes = data.map(k => parseFloat(k[4]));
                const opens = data.map(k => parseFloat(k[1]));
                const currentPrice = closes[closes.length - 1];
                const prevPrice = closes[closes.length - 2];
                
                // 1. Affichage Prix
                const priceEl = document.getElementById('price');
                const changeEl = document.getElementById('change');
                priceEl.innerText = currentPrice.toFixed(5);
                const diff = currentPrice - prevPrice;
                changeEl.innerText = (diff >= 0 ? "▲ +" : "▼ ") + Math.abs(diff).toFixed(5);
                changeEl.style.color = diff >= 0 ? '#00e676' : '#ff5252';
                priceEl.style.color = diff >= 0 ? '#00e676' : '#ff5252';

                // 2. CALCUL DU SENTIMENT (Simulation de Flux)
                // On analyse la force de la dernière bougie vs les précédentes
                const lastCandleSize = Math.abs(closes[closes.length-1] - opens[closes.length-1]);
                const prevCandleSize = Math.abs(closes[closes.length-2] - opens[closes.length-2]);
                
                let momentum = 0;
                
                // Calcul de la direction et de la force
                if (closes[closes.length-1] > opens[closes.length-1]) {
                    // Bougie verte
                    momentum = (closes[closes.length-1] - opens[closes.length-1]) * 100000; // Force brute
                    if (closes[closes.length-1] > closes[closes.length-2]) momentum *= 1.5; // Accélération
                } else {
                    // Bougie rouge
                    momentum = -1 * (opens[closes.length-1] - closes[closes.length-1]) * 100000;
                    if (closes[closes.length-1] < closes[closes.length-2]) momentum *= 1.5;
                }

                // Transformation du Momentum en Pourcentage (0 à 100)
                // On utilise une fonction sigmoïde pour que ça reste entre 0 et 100 mais réactif
                let rawPercent = 50 + (momentum * 2); 
                
                // Ajout d'un peu de "bruit" aléatoire pour imiter les vrais traders qui hésitent
                const noise = (Math.random() - 0.5) * 5; 
                rawPercent += noise;

                // Lissage pour éviter que la barre ne téléporte (effet fluide)
                let targetBuy = Math.max(5, Math.min(95, rawPercent));
                lastBuyPercent = (lastBuyPercent * 0.7) + (targetBuy * 0.3); // Lissage exponentiel
                lastSellPercent = 100 - lastBuyPercent;

                // 3. Mise à jour de la Barre (Animation Fluide)
                const barBuy = document.getElementById('bar-buy');
                const barSell = document.getElementById('bar-sell');
                const txtBuy = document.getElementById('buy-txt');
                const txtSell = document.getElementById('sell-txt');

                barBuy.style.width = lastBuyPercent + '%';
                barSell.style.width = lastSellPercent + '%';
                
                txtBuy.innerText = Math.round(lastBuyPercent) + '%';
                txtSell.innerText = Math.round(lastSellPercent) + '%';

                // Changement de couleur dynamique si déséquilibre fort
                if (lastBuyPercent > 65) {
                    txtBuy.style.textShadow = "0 0 15px #00e676";
                    txtSell.style.textShadow = "none";
                } else if (lastSellPercent > 65) {
                    txtSell.style.textShadow = "0 0 15px #ff5252";
                    txtBuy.style.textShadow = "none";
                } else {
                    txtBuy.style.textShadow = "none";
                    txtSell.style.textShadow = "none";
                }

                // 4. Signal Basé sur le Sentiment Extrême (Contrarian ou Suiveur)
                // Ici : Si tout le monde achète massivement (>80%), risque de retournement ou continuation forte
                const signalBox = document.getElementById('signal-box');
                const sigMain = document.getElementById('sig-main');
                const sigSub = document.getElementById('sig-sub');

                if (lastBuyPercent > 75 && momentum > 0) {
                    signalBox.className = 'sig-buy';
                    sigMain.innerText = "ACHAT FORT 🟢";
                    sigSub.innerText = "Les traders sont massivement acheteurs";
                } else if (lastSellPercent > 75 && momentum < 0) {
                    signalBox.className = 'sig-sell';
                    sigMain.innerText = "VENTE FORTE 🔴";
                    sigSub.innerText = "Les traders sont massivement vendeurs";
                } else {
                    signalBox.className = 'sig-wait';
                    sigMain.innerText = "MARCHÉ MIXTE ⚪";
                    sigSub.innerText = "Attente d'une direction claire (" + Math.round(lastBuyPercent) + "%/" + Math.round(lastSellPercent) + "%)";
                }

            } catch (error) {
                console.log("Err", error);
            }
        }

        // Démarrage rapide (toutes les 2 secondes pour l'effet nerveux)
        window.onload = function() {
            fetchMarketData();
            setInterval(fetchMarketData, 2000); 
        };
    </script>
</body>
</html>
