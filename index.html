<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT PRO PRECISION ELITE</title>
<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial;
    text-align: center;
}
.container { margin-top: 30px; }
.title { font-size: 34px; font-weight: bold; }
select, button {
    margin: 10px;
    padding: 8px;
    background: #161b22;
    color: white;
    border: 1px solid #30363d;
}
.status { font-size: 42px; margin: 20px; font-weight: bold; }
.green { color: #00ff88; }
.red { color: #ff4d4d; }
.card {
    background: #161b22;
    margin: 10px auto;
    padding: 15px;
    width: 260px;
    border-radius: 10px;
}
</style>
</head>
<body>
<div class="container">
    <div class="title">BOT PRO PRECISION ELITE</div><div>
    <select id="pair">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
        <option value="EURUSDT" selected>EUR/USDT</option>
    </select>

    <select id="interval">
        <option value="1m">1m</option>
        <option value="5m">5m</option>
        <option value="15m">15m</option>
    </select>
</div>

<div class="card">
    <div id="price">Prix: --</div>
    <div id="status" class="status">--</div>
</div>

<button onclick="analyze()">NOUVELLE ANALYSE</button>

<div class="card">
    <p>EMA50: <span id="ema"></span></p>
    <p>RSI14: <span id="rsi"></span></p>
    <p>ADX14: <span id="adx"></span></p>
</div>

<div class="card">
    <h3>Historique</h3>
    <ul id="history"></ul>
</div>

</div><script>
let lastSignal = "";

function API_URL() {
    const pair = document.getElementById("pair").value;
    const interval = document.getElementById("interval").value;
    return `https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${interval}&limit=100`;
}

function EMA(prices, period) {
    let k = 2/(period+1);
    let ema = prices[0];
    for(let i=1;i<prices.length;i++){
        ema = prices[i]*k + ema*(1-k);
    }
    return ema;
}

function RSI(prices, period=14){
    let gains=0, losses=0;
    for(let i=1;i<=period;i++){
        let d = prices[i]-prices[i-1];
        if(d>0) gains+=d; else losses-=d;
    }
    let avgG = gains/period;
    let avgL = losses/period;

    for(let i=period+1;i<prices.length;i++){
        let d = prices[i]-prices[i-1];
        if(d>0){
            avgG = (avgG*(period-1)+d)/period;
            avgL = (avgL*(period-1))/period;
        } else {
            avgG = (avgG*(period-1))/period;
            avgL = (avgL*(period-1)-d)/period;
        }
    }
    let rs = avgG/avgL;
    return 100-(100/(1+rs));
}

function ADX(data, period=14){
    let trs=[], plus=[], minus=[];

    for(let i=1;i<data.length;i++){
        let h=data[i][2], l=data[i][3], pc=data[i-1][4];
        let ph=data[i-1][2], pl=data[i-1][3];

        let tr=Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
        trs.push(tr);

        let up=h-ph;
        let down=pl-l;

        plus.push(up>down && up>0 ? up : 0);
        minus.push(down>up && down>0 ? down : 0);
    }

    let atr = trs.slice(0,period).reduce((a,b)=>a+b)/period;
    let pDM = plus.slice(0,period).reduce((a,b)=>a+b)/period;
    let mDM = minus.slice(0,period).reduce((a,b)=>a+b)/period;

    let pDI = (pDM/atr)*100;
    let mDI = (mDM/atr)*100;

    return Math.abs(pDI-mDI)/(pDI+mDI)*100;
}

function addHistory(signal, price){
    const ul = document.getElementById("history");
    const li = document.createElement("li");
    li.textContent = `${new Date().toLocaleTimeString()} → ${signal} (${price})`;
    ul.prepend(li);
}

function notify(signal){
    if(signal !== lastSignal){
        let audio = new Audio(signal === "ACHETER" ?
        "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" :
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        audio.play();
        lastSignal = signal;
    }
}

async function analyze(){
    let res = await fetch(API_URL());
    let data = await res.json();

    let closes = data.map(c=>parseFloat(c[4]));
    let price = closes.at(-1);

    let ema = EMA(closes.slice(-50),50);
    let rsi = RSI(closes);
    let adx = ADX(data);

    document.getElementById("price").innerText = "Prix: "+price.toFixed(2);
    document.getElementById("ema").innerText = ema.toFixed(2);
    document.getElementById("rsi").innerText = rsi.toFixed(2);
    document.getElementById("adx").innerText = adx.toFixed(2);

    let signal = (price>ema && adx>20 && rsi>50) ? "ACHETER" : "VENDRE";

    let status = document.getElementById("status");
    status.innerText = signal;
    status.className = "status " + (signal==="ACHETER"?"green":"red");

    addHistory(signal, price.toFixed(2));
    notify(signal);
}

setInterval(analyze,10000);
analyze();
</script></body>
</html>
