<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken TURBO 10s</title>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            padding: 5px; 
            margin: 0; 
            overflow: hidden; /* Empêche le scroll dans la fenêtre flottante */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container { width: 100%; max-width: 350px; }

        h1 { font-size: 1.2rem; color: #ffd700; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .timer { font-size: 0.8rem; color: #00e676; margin-bottom: 10px; font-family: monospace; }

        /* ZONE DE SIGNAL GÉANTE */
        #signal-box {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .signal-text { z-index: 2; text-shadow: 2px 2px 4px #000; }
        .sub-text { font-size: 0.9rem; font-weight: normal; z-index: 2; opacity: 0.9; }

        /* Couleurs Flash */
        .buy { 
            background: linear-gradient(135deg, #00ff00, #008000); 
            color: #fff; 
            border-color: #00ff00; 
            box-shadow: 0 0 30px #00ff00;
            animation: flashGreen 0.5s infinite;
        }
        .sell { 
            background: linear-gradient(135deg, #ff0000, #800000); 
            color: #fff; 
            border-color: #ff0000; 
            box-shadow: 0 0 30px #ff0000;
            animation: flashRed 0.5s infinite;
        }
        .wait { 
            background-color: #222; 
            color: #555; 
            border-color: #444; 
            font-size: 1.2rem;
        }

        @keyframes flashGreen { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.5); } 100% { transform: scale(1); } }
        @keyframes flashRed { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.5); } 100% { transform: scale(1); } }

        /* STATS RAPIDES */
        .stats { display: flex; justify-content: space-between; font-size: 0.7rem; color: #aaa; margin-top: 5px; font-family: monospace; }
        .val { color: #fff; font-weight: bold; }

        button {
            background: #333; color: #fff; border: 1px solid #555;
            padding: 8px 15px; border-radius: 5px; font-size: 0.8rem;
            margin-top: 5px; cursor: pointer; width: 100%;
        }
        button.active { background: #00e676; color: #000; font-weight: bold; border: none; }

        .warning { font-size: 0.6rem; color: #ff5252; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Hacken TURBO 10s</h1>
    <div class="timer">Prochaine analyse dans: <span id="countdown">3.0</span>s</div>

    <div id="signal-box" class="wait">
        <div class="signal-text">EN ATTENTE</div>
        <div class="sub-text">Prêt à frapper</div>
    </div>

    <div class="stats">
        <span>Prix: <span id="price" class="val">...</span></span>
        <span>Force: <span id="momentum" class="val">0</span></span>
    </div>

    <button id="btn-sound" onclick="initAudio()">🔊 ACTIVER SON & VIBRATION</button>
    <div class="warning">⚠️ Risque Élevé. Trade uniquement en Démo d'abord.</div>
</div>

<script>
    let audioCtx;
    let isAudioReady = false;
    let lastSignalTime = 0;
    const COOLDOWN = 12000; // 12 secondes entre chaque signal max (pour éviter le spam)

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAudioReady = true;
        document.getElementById('btn-sound').innerText = "✅ SON ACTIVÉ - PRÊT";
        document.getElementById('btn-sound').classList.add('active');
        // Test vibration
        if (navigator.vibrate) navigator.vibrate(200);
        playTone(800, 'square', 0.1);
    }

    function playTone(freq, type, duration) {
        if (!isAudioReady) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function triggerAlert(type) {
        const now = Date.now();
        if (now - lastSignalTime < COOLDOWN) return; // Cooldown anti-spam
        lastSignalTime = now;

        const box = document.getElementById('signal-box');
        const title = type === 'BUY' ? 'ACHETER 🟢' : 'VENDRE 🔴';
        const sub = type === 'BUY' ? 'MAINTENANT !' : 'MAINTENANT !';
        
        box.className = type === 'BUY' ? 'buy' : 'sell';
        box.innerHTML = `<div class="signal-text">${title}</div><div class="sub-text">${sub}</div>`;
        
        document.title = type === 'BUY' ? "🟢 ACHETER 10S" : "🔴 VENDRE 10S";

        // Alerte Sonore Forte (Sirène)
        if (isAudioReady) {
            playTone(1200, 'sawtooth', 0.2);
            setTimeout(() => playTone(1500, 'sawtooth', 0.2), 250);
            setTimeout(() => playTone(1200, 'sawtooth', 0.4), 500);
        }

        // Vibration Puissante
        if (navigator.vibrate) {
            navigator.vibrate([400, 100, 400, 100, 600]);
        }

        // Notification Push
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("HACKEN TURBO", { body: title, tag: 'turbo' });
        }

        // Reset visuel après 8 secondes (pour laisser le temps de trader 10s)
        setTimeout(() => {
            box.className = 'wait';
            box.innerHTML = `<div class="signal-text">EN ATTENTE</div><div class="sub-text">Analyse en cours...</div>`;
            document.title = "Hacken TURBO 10s";
        }, 8000);
    }

    async function fetchAndAnalyze() {
        try {
            // On prend des données récentes (1 minute) mais on regarde les dernières secondes
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=5');
            const data = await response.json();
            
            // Extraction des prix de clôture
            const closes = data.map(k => parseFloat(k[4]));
            const currentPrice = closes[closes.length - 1];
            const prevPrice = closes[closes.length - 2];
            const prevPrevPrice = closes[closes.length - 3];

            document.getElementById('price').innerText = currentPrice.toFixed(5);

            // ALGORITHME TURBO 10s (Momentum Pur)
            // On compare le prix actuel avec les 2 dernières minutes
            const momentum = currentPrice - prevPrevPrice;
            const threshold = 0.00015; // Seuil de sensibilité (à ajuster selon volatilité)

            document.getElementById('momentum').innerText = momentum > 0 ? "+" + momentum.toFixed(5) : momentum.toFixed(5);
            document.getElementById('momentum').style.color = momentum > 0 ? '#00ff00' : '#ff0000';

            // LOGIQUE D'ACHAT : Hausse brutale + RSI implicite (prix monte vite)
            if (momentum > threshold && currentPrice > prevPrice) {
                triggerAlert('BUY');
            }
            // LOGIQUE DE VENTE : Baisse brutale
            else if (momentum < -threshold && currentPrice < prevPrice) {
                triggerAlert('SELL');
            }

        } catch (error) {
            console.log("Erreur connexion", error);
        }
    }

    // Demande permission notif
    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    // Boucle d'analyse ultra-rapide (toutes les 3 secondes)
    setInterval(fetchAndAnalyze, 3000);
    
    // Compte à rebours visuel
    let count = 3.0;
    setInterval(() => {
        count -= 0.1;
        if (count <= 0) count = 3.0;
        document.getElementById('countdown').innerText = count.toFixed(1);
    }, 100);

</script>
</body>
</html>
