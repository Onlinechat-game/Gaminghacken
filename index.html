<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackenStore Gold Bot</title>
    <!-- Importation de Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- STYLE DE L'APPLICATION (CSS) --- */
        body {
            background-color: #0b0f19; /* Fond sombre style trading */
            color: #e0e6ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8899a6;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Zone du Signal Principal */
        .signal-box {
            background: linear-gradient(145deg, #161b29, #1f2638);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2a3447;
        }

        .signal-title {
            font-size: 16px;
            color: #8899a6;
        }

        .signal-value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .buy { color: #00ff88; text-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .sell { color: #ff3355; text-shadow: 0 0 15px rgba(255, 51, 85, 0.4); }
        .wait { color: #ffd700; }

        /* Indicateurs Techniques */
        .indicators-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background-color: #161b29;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00d2ff;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #8899a6; }
        .card p { margin: 0; font-size: 18px; font-weight: bold; }

        /* Graphique */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            background-color: #161b29;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
        }

        /* News & Sentiment */
        .news-section {
            background-color: #161b29;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 20px;
        }
        .news-item {
            border-bottom: 1px solid #2a3447;
            padding: 10px 0;
            font-size: 13px;
        }
        .news-item:last-child { border-bottom: none; }
        .news-positive { color: #00ff88; }
        .news-negative { color: #ff3355; }

        /* Bouton d'action */
        button {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #4a5568;
            letter-spacing: 1px;
        }
        .hackenstore-logo {
            font-weight: bold;
            color: #00d2ff;
            font-size: 16px;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Analyse XAUUSD</h1>
    <div class="subtitle">Prédiction Tendances - HackenStore Bot</div>

    <!-- ZONE DE SIGNAL -->
    <div class="signal-box">
        <div class="signal-title">SIGNAL ACTUEL (H4)</div>
        <div id="mainSignal" class="signal-value wait">ANALYSE EN COURS...</div>
        <div id="signalReason" style="font-size: 14px; color: #ccc;">Chargement des indicateurs...</div>
    </div>

    <!-- INDICATEURS -->
    <div class="indicators-grid">
        <div class="card">
            <h3>Prix Actuel</h3>
            <p id="priceDisplay">---</p>
        </div>
        <div class="card" style="border-left-color: #ffd700;">
            <h3>RSI (14)</h3>
            <p id="rsiDisplay">---</p>
        </div>
        <div class="card" style="border-left-color: #ff3355;">
            <h3>MM20</h3>
            <p id="mm20Display">---</p>
        </div>
        <div class="card" style="border-left-color: #00ff88;">
            <h3>Sentiment News</h3>
            <p id="newsDisplay">---</p>
        </div>
    </div>

    <!-- GRAPHIQUE -->
    <div class="chart-container">
        <canvas id="goldChart"></canvas>
    </div>

    <!-- NEWS SIMULÉES -->
    <div class="news-section">
        <h3 style="color:#00d2ff; margin-top:0;">📰 Flash Info & Sentiment</h3>
        <div id="newsFeed">
            <!-- Les news s'afficheront ici -->
        </div>
    </div>

    <button onclick="runAnalysis()">🔄 LANCER L'ANALYSE</button>

    <div class="footer">
        POWERED BY HACKENSTORE<br>
        <span class="hackenstore-logo">HACKENSTORE</span>
    </div>

    <script>
        /* --- LOGIQUE DU BOT (JAVASCRIPT) --- */

        let myChart = null;

        // Fonction principale lancée par le bouton
        function runAnalysis() {
            document.getElementById('mainSignal').innerText = "CALCUL EN COURS...";
            document.getElementById('mainSignal').className = "signal-value wait";
            
            // Simulation d'un délai de calcul (comme si on appelait une API)
            setTimeout(() => {
                generateDataAndAnalyze();
            }, 800);
        }

        function generateDataAndAnalyze() {
            // 1. GÉNÉRATION DE DONNÉES SIMULÉES (Pour la démo)
            // Dans une vraie app, ici on ferait fetch('api-binance.com/...')
            const currentPrice = 2030 + (Math.random() * 20 - 10); 
            const rsi = 40 + (Math.random() * 40); // Entre 40 et 80
            const mm20 = currentPrice - (Math.random() * 10 - 5);
            
            // Mise à jour de l'affichage des chiffres
            document.getElementById('priceDisplay').innerText = currentPrice.toFixed(2) + " $";
            document.getElementById('rsiDisplay').innerText = rsi.toFixed(1);
            document.getElementById('mm20Display').innerText = mm20.toFixed(2) + " $";

            // 2. ANALYSE TECHNIQUE (La logique du Bot)
            let signal = "ATTENTE";
            let reason = "";
            let sentimentScore = 0; // -1 (Baissier) à +1 (Haussier)

            // Logique RSI
            if (rsi > 70) reason += "RSI Surachat (Risque correction). ";
            else if (rsi < 30) reason += "RSI Survente (Rebond possible). ";
            else if (rsi > 50) reason += "Momentum Haussier. ";
            else reason += "Momentum Baissier. ";

            // Logique Prix vs MM20
            if (currentPrice > mm20) {
                reason += "Prix au-dessus MM20. ";
                sentimentScore += 0.5;
            } else {
                reason += "Prix sous MM20. ";
                sentimentScore -= 0.5;
            }

            // Logique News Simulée
            const newsItems = [
                { text: "Fed : Discours de Powell attendu demain.", impact: "neutre" },
                { text: "Tensions géopolitiques au Moyen-Orient.", impact: "positive" },
                { text: "Dollar Index (DXY) en légère hausse.", impact: "negative" }
            ];
            
            let newsHtml = "";
            newsItems.forEach(news => {
                let colorClass = news.impact === "positive" ? "news-positive" : (news.impact === "negative" ? "news-negative" : "");
                let icon = news.impact === "positive" ? "🟢" : (news.impact === "negative" ? "🔴" : "⚪");
                
                if(news.impact === "positive") sentimentScore += 0.3;
                if(news.impact === "negative") sentimentScore -= 0.3;

                newsHtml += `<div class="news-item"><span class="${colorClass}">${icon}</span> ${news.text}</div>`;
            });
            document.getElementById('newsFeed').innerHTML = newsHtml;

            // Affichage Sentiment Global
            const sentimentText = sentimentScore > 0.2 ? "HAUSSIER 🐂" : (sentimentScore < -0.2 ? "BAISSIER 🐻" : "NEUTRE ⚖️");
            document.getElementById('newsDisplay').innerText = sentimentText;
            document.getElementById('newsDisplay').style.color = sentimentScore > 0.2 ? "#00ff88" : (sentimentScore < -0.2 ? "#ff3355" : "#ffd700");

            // 3. DÉCISION FINALE
            if (sentimentScore > 0.5 && rsi < 70) {
                signal = "ACHAT (BUY) 🚀";
                document.getElementById('mainSignal').className = "signal-value buy";
            } else if (sentimentScore < -0.5 && rsi > 30) {
                signal = "VENTE (SELL) 📉";
                document.getElementById('mainSignal').className = "signal-value sell";
            } else {
                signal = "ATTENTE / NEUTRE ⚠️";
                document.getElementById('mainSignal').className = "signal-value wait";
            }

            document.getElementById('mainSignal').innerText = signal;
            document.getElementById('signalReason').innerText = reason;

            // 4. DESSINER LE GRAPHIQUE
            drawChart(currentPrice, mm20);
        }

        function drawChart(price, mm20) {
            const ctx = document.getElementById('goldChart').getContext('2d');
            
            // Données factices pour l'historique (pour faire joli)
            const labels = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', 'Maintenant'];
            const dataPoints = [price-5, price-2, price+3, price-1, price+2, price-4, price];

            if (myChart) myChart.destroy(); // Effacer l'ancien graphique

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Prix XAUUSD',
                        data: dataPoints,
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'MM20',
                        data: [mm20, mm20, mm20, mm20, mm20, mm20, mm20],
                        borderColor: '#ffd700',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#2a3447' }, ticks: { color: '#8899a6' } },
                        y: { grid: { color: '#2a3447' }, ticks: { color: '#8899a6' } }
                    }
                }
            });
        }

        // Lancer une analyse au démarrage
        window.onload = runAnalysis;

    </script>
</body>
</html>
