<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAU/USD Bot Mobile</title>
    <!-- Chargement de Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --green: #00ff88;
            --red: #ff3333;
            --blue: #00ccff;
            --gray: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 1.3rem; margin-bottom: 5px; text-align: center; color: var(--blue); }
        .subtitle { font-size: 0.8rem; color: var(--gray); margin-bottom: 20px; text-align: center; }

        /* Carte Principale */
        .signal-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--gray);
            transition: background 0.5s;
        }
        .signal-card.buy::before { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .signal-card.sell::before { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .signal-card.wait::before { background: var(--blue); }

        .price-display { font-size: 2rem; font-weight: bold; margin: 10px 0; letter-spacing: -1px; }
        .signal-text { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin: 10px 0; letter-spacing: 2px; line-height: 1.1; }
        
        .buy-text { color: var(--green); }
        .sell-text { color: var(--red); }
        .wait-text { color: var(--gray); }

        .confidence-box { 
            background: #222; 
            border-radius: 8px; 
            padding: 10px; 
            margin-top: 15px; 
        }
        .progress-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s ease, background 0.5s; }

        /* Grille Indicateurs */
        .indicators-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .ind-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #222;
        }
        .ind-label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; }
        .ind-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        /* Graphique */
        .chart-container {
            width: 100%;
            max-width: 400px;
            height: 250px;
            background: var(--card);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        /* Logs */
        .logs {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: var(--gray);
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        .log-item { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-time { color: var(--blue); margin-right: 5px; }
        .log-error { color: var(--red); }

        /* Bouton */
        .btn-refresh {
            background: var(--blue);
            color: #000;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 204, 255, 0.2);
        }
        .btn-refresh:active { transform: scale(0.98); opacity: 0.9; }
        .btn-refresh:disabled { background: #333; color: #666; cursor: not-allowed; }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>XAU/USD BOT</h1>
    <div class="subtitle">Analyse Technique Automatisée</div>

    <!-- Carte de Décision -->
    <div id="signal-card" class="signal-card wait">
        <div style="font-size: 0.9rem; color: #aaa;">PRIX ACTUEL</div>
        <div id="price" class="price-display">---.--</div>
        
        <div id="signal-text" class="signal-text wait-text">CALCUL...</div>
        <div id="signal-desc" style="font-size: 0.9rem; color: #ccc;">Initialisation...</div>

        <div class="confidence-box">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                <span>Probabilité</span>
                <span id="conf-val">0%</span>
            </div>
            <div class="progress-bg">
                <div id="conf-bar" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Indicateurs Techniques -->
    <div class="indicators-grid">
        <div class="ind-card">
            <div class="ind-label">RSI (14)</div>
            <div id="rsi-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Tendance</div>
            <div id="trend-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Volatilité</div>
            <div id="vol-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Momentum</div>
            <div id="mom-val" class="ind-value">--</div>
        </div>
    </div>

    <!-- Graphique -->
    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <!-- Logs -->
    <div id="logs" class="logs"></div>

    <button id="btn-action" class="btn-refresh" onclick="startAnalysis()">
        LANCR L'ANALYSE
    </button>

    <script>
        // --- CONFIGURATION ---
        const BINANCE_URL = 'https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=15m&limit=100';
        const PROXY_URL = 'https://api.allorigins.win/get?url='; 
        
        let chartInstance = null;
        let closePrices = [];

        // Fonction de Log
        function log(msg, type = 'normal') {
            const logsDiv = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'log-item';
            if(type === 'error') item.classList.add('log-error');
            item.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logsDiv.prepend(item);
        }

        // --- MOTEUR DE CALCUL ---

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const diff = prices[i] - prices[i - 1];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            const rs = (gains / period) / (losses / period || 1);
            return 100 - (100 / (1 + rs));
        }

        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length - 1];
            const k = 2 / (period + 1);
            let ema = prices[0];
            for (let i = 1; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        function calculateVolatility(prices) {
            const slice = prices.slice(-10);
            const mean = slice.reduce((a, b) => a + b) / slice.length;
            const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / slice.length;
            return Math.sqrt(variance);
        }

        function analyzeMarket(data) {
            // Extraction des prix de clôture (index 4 dans la réponse Binance)
            closePrices = data.map(d => parseFloat(d[4])); 
            const currentPrice = closePrices[closePrices.length - 1];
            
            // Calculs
            const rsi = calculateRSI(closePrices);
            const emaShort = calculateEMA(closePrices, 9);
            const emaLong = calculateEMA(closePrices, 21);
            const volatility = calculateVolatility(closePrices);
            const momentum = currentPrice - closePrices[closePrices.length - 5];

            // Mise à jour UI Indicateurs
            document.getElementById('rsi-val').innerText = rsi.toFixed(2);
            document.getElementById('rsi-val').style.color = rsi > 70 ? 'var(--red)' : (rsi < 30 ? 'var(--green)' : '#fff');
            
            const trend = emaShort > emaLong ? 'HAUSSE' : 'BAISSE';
            document.getElementById('trend-val').innerText = trend;
            document.getElementById('trend-val').style.color = emaShort > emaLong ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('vol-val').innerText = volatility.toFixed(2);
            document.getElementById('mom-val').innerText = momentum > 0 ? 'POSITIF' : 'NÉGATIF';
            document.getElementById('mom-val').style.color = momentum > 0 ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('price').innerText = currentPrice.toFixed(2);

            // --- LOGIQUE DE DÉCISION ---
            let signal = "ATTENDRE";
            let confidence = 40;
            let reason = "Marché indécis / Bruit";
            let cardClass = "wait";
            let barColor = "#555";
            let textColorClass = "wait-text";

            const isBullish = emaShort > emaLong && momentum > 0;
            const isBearish = emaShort < emaLong && momentum < 0;
            const isOverbought = rsi > 70;
            const isOversold = rsi < 30;

            if (isBullish && !isOverbought) {
                signal = "ACHETER";
                cardClass = "buy";
                barColor = "var(--green)";
                textColorClass = "buy-text";
                reason = "Tendance + Momentum Positif";
                confidence = 60 + ((70-rsi)/2); 
            } else if (isBearish && !isOversold) {
                signal = "VENDRE";
                cardClass = "sell";
                barColor = "var(--red)";
                textColorClass = "sell-text";
                reason = "Tendance + Momentum Négatif";
                confidence = 60 + (rsi/2);
            } else if (isOverbought) {
                signal = "VENDRE";
                cardClass = "sell";
                barColor = "var(--red)";
                textColorClass = "sell-text";
                reason = "RSI Surchauffé (Correction)";
                confidence = 75;
            } else if (isOversold) {
                signal = "ACHETER";
                cardClass = "buy";
                barColor = "var(--green)";
                textColorClass = "buy-text";
                reason = "RSI Survendu (Rebond)";
                confidence = 75;
            }

            // Limiter la confiance entre 10 et 95
            confidence = Math.min(Math.max(confidence, 10), 95);

            // Mise à jour UI Signal
            const signalEl = document.getElementById('signal-text');
            const cardEl = document.getElementById('signal-card');
            const descEl = document.getElementById('signal-desc');
            const confBar = document.getElementById('conf-bar');
            const confVal = document.getElementById('conf-val');

            signalEl.innerText = signal;
            signalEl.className = `signal-text ${textColorClass}`;
            
            // Reset classes
            cardEl.classList.remove('buy', 'sell', 'wait');
            cardEl.classList.add(cardClass);
            
            descEl.innerText = reason;
            
            confBar.style.width = `${confidence}%`;
            confBar.style.background = barColor;
            confVal.innerText = `${Math.floor(confidence)}%`;

            log(`Analyse terminée. Signal: ${signal} (${Math.floor(confidence)}%)`);
            updateChart(closePrices);
        }

        // --- GESTION DU GRAPHIQUE (CORRIGÉ) ---
        function updateChart(prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const labels = prices.map((_, i) => i); 

            if (chartInstance) {
                chartInstance.destroy();
            }

            // CORRECTION ICI : Ajout de "data:" manquant
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {  // <--- C'était ici l'erreur "Unexpected token {"
                    labels: labels,
                    datasets: [{
                        label: 'Prix XAU/USD',
                        data: prices,
                        borderColor: '#00ccff',
                        backgroundColor: 'rgba(0, 204, 255, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    scales: {
                        x: { display: false },
                        y: { 
                            display: true, 
                            grid: { color: '#222' },
                            ticks: { color: '#666', font: {size: 10} }
                        }
                    },
                    animation: { duration: 0 }
                }
            });
        }

        // --- FONCTION PRINCIPALE ---
        async function startAnalysis() {
            const btn = document.getElementById('btn-action');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> CHARGEMENT...';
            
            log("Connexion à l'API Binance via Proxy...");

            try {
                // Utilisation du proxy pour éviter les erreurs CORS
                const response = await fetch(PROXY_URL + encodeURIComponent(BINANCE_URL));
                
                if (!response.ok) throw new Error("Erreur Réseau");
                
                const jsonData = await response.json();
                
                if (!jsonData.contents) throw new Error("Réponse vide du proxy");
                
                const data = JSON.parse(jsonData.contents);
                
                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error("Données invalides");
                }

                log(`Données reçues: ${data.length} bougies.`);
                analyzeMarket(data);
                
            } catch (error) {
                console.error(error);
                log("ERREUR: " + error.message, 'error');
                alert("Échec de connexion.\nVérifiez votre internet ou réessayez dans 10s.");
                document.getElementById('signal-text').innerText = "ERREUR";
                document.getElementById('signal-desc').innerText = "Problème de connexion";
            } finally {
                btn.disabled = false;
                btn.innerText = "REFRAÎCHIR";
            }
        }

        // Démarrage automatique
        window.onload = () => {
            log("Bot initialisé. Prêt.");
            setTimeout(startAnalysis, 500);
        };
    </script>
</body>
</html>
