<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken Auto Direct 10s</title>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            padding: 5px; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        .container { width: 100%; max-width: 340px; }

        h1 { font-size: 1rem; color: #ffd700; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* COMPTEUR GÉANT */
        .timer-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00c6ff;
            margin: 10px 0;
            font-family: monospace;
            text-shadow: 0 0 15px rgba(0, 198, 255, 0.6);
        }
        .timer-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-top: -5px; display: block;}

        /* ZONE DE SIGNAL */
        #signal-box {
            width: 100%;
            height: 130px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #333;
            background: #111;
            margin-bottom: 10px;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        .signal-text { z-index: 2; line-height: 1; text-shadow: 2px 2px 4px #000; }
        .sub-text { font-size: 0.8rem; font-weight: normal; z-index: 2; opacity: 0.9; margin-top: 5px; }

        /* COULEURS FLASH */
        .buy { 
            background: linear-gradient(135deg, #00ff00, #006400); 
            color: #fff; border-color: #00ff00; 
            box-shadow: 0 0 60px #00ff00;
            animation: flashG 0.4s infinite;
        }
        .sell { 
            background: linear-gradient(135deg, #ff0000, #8b0000); 
            color: #fff; border-color: #ff0000; 
            box-shadow: 0 0 60px #ff0000;
            animation: flashR 0.4s infinite;
        }
        .scanning {
            background: #222; color: #aaa; border-color: #444;
            font-size: 1.5rem;
        }

        @keyframes flashG { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }
        @keyframes flashR { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }

        .status-bar { font-size: 0.7rem; color: #666; font-family: monospace; margin-top: 10px; }
        .btn-small { background: #333; color: #fff; border: 1px solid #555; padding: 6px; width: 100%; border-radius: 5px; font-size: 0.7rem; margin-top: 5px; cursor: pointer; }
        .btn-small.active { background: #00e676; color: #000; font-weight: bold; border: none; }
        .error-msg { color: #ff4444; font-size: 0.65rem; min-height: 12px; margin-top: 3px; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Hacken Auto Direct</h1>
    
    <!-- COMPTEUR -->
    <div class="timer-box" id="countdown">10.0</div>
    <span class="timer-label">Prochain signal dans</span>

    <!-- SIGNAL -->
    <div id="signal-box" class="scanning">
        <div class="signal-text">PRÊT</div>
        <div class="sub-text">Démarrage auto...</div>
    </div>

    <div class="status-bar">Prix: <span id="price" style="color:#fff">...</span></div>
    <div id="error-display" class="error-msg"></div>

    <button class="btn-small" id="btn-sound" onclick="initAudio()">🔊 ACTIVER SON & VIBRATION</button>
    <div style="font-size:0.6rem; color:#555; margin-top:5px;">Cycle: 10s ➔ Signal Auto ➔ Trade 5s</div>
</div>

<script>
    let audioCtx, isAudioReady = false;
    let cycleTime = 10.0; 
    let timerInterval;
    let isSignaling = false;

    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isAudioReady = true;
            document.getElementById('btn-sound').innerText = "✅ SON ACTIVÉ";
            document.getElementById('btn-sound').classList.add('active');
            if(navigator.vibrate) navigator.vibrate(100);
            // Test son
            playAlert();
        } catch(e) {
            alert("Erreur Audio: Cliquez plusieurs fois sur le bouton");
        }
    }

    function playAlert() {
        if (!isAudioReady) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.stop(audioCtx.currentTime + 0.3);
        
        // Double bip
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.stop(audioCtx.currentTime + 0.3);
        }, 350);
    }

    function showSignal(type) {
        const box = document.getElementById('signal-box');
        const title = type === 'BUY' ? "ACHETER 🟢" : "VENDRE 🔴";
        const sub = "TRADE MAINTENANT (5s)";
        
        box.className = type === 'BUY' ? 'buy' : 'sell';
        box.innerHTML = `<div class="signal-text">${title}</div><div class="sub-text">${sub}</div>`;
        
        document.title = type === 'BUY' ? "🟢 ACHETER" : "🔴 VENDRE";
        
        if(isAudioReady) playAlert();
        if(navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 400]);

        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("HACKEN AUTO", { body: title, tag: 'auto10s' });
        }

        isSignaling = true;
        
        // Le signal reste affiché pendant 4 secondes puis retourne au scan
        setTimeout(() => {
            box.className = 'scanning';
            box.innerHTML = `<div class="signal-text">NEXT CYCLE</div><div class="sub-text">Attente...</div>`;
            document.title = "Hacken Auto Direct";
            isSignaling = false;
        }, 4000);
    }

    async function fetchAndDecide() {
        if (isSignaling) return; 

        const priceEl = document.getElementById('price');
        const errorEl = document.getElementById('error-display');
        const box = document.getElementById('signal-box');

        errorEl.innerText = "";
        box.className = 'scanning';
        box.innerHTML = `<div class="signal-text">ANALYSE...</div><div class="sub-text">Connexion directe</div>`;

        try {
            // CONNEXION DIRECTE SANS PROXY (Comme avant)
            // Ajout d'un timestamp pour éviter le cache
            const url = `https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=5&t=${Date.now()}`;
            
            const response = await fetch(url, { 
                method: 'GET',
                cache: 'no-cache'
            });

            if (!response.ok) {
                throw new Error("Err Réseau (" + response.status + ")");
            }
            
            const data = await response.json();
            
            if (!data || data.length < 3) {
                throw new Error("Données insuffisantes");
            }

            const closes = data.map(k => parseFloat(k[4]));
            const current = closes[closes.length - 1];
            const prev = closes[closes.length - 3]; 

            priceEl.innerText = current.toFixed(5);

            // LOGIQUE AGRESSIVE : Toujours une décision
            const direction = (current >= prev) ? 'BUY' : 'SELL';
            
            showSignal(direction);

        } catch (err) {
            console.error(err);
            errorEl.innerText = err.message;
            box.innerHTML = `<div class="signal-text" style="color:#ffaa00">ERREUR</div><div class="sub-text">Vérifie Internet/HTTPS</div>`;
            
            // En cas d'erreur, on ne bloque pas le cycle, on attend le prochain
            isSignaling = false; 
        }
    }

    function startTimer() {
        const display = document.getElementById('countdown');
        let timeLeft = cycleTime;

        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            
            // Affichage du compteur
            display.innerText = Math.max(0, timeLeft).toFixed(1);
            
            // Déclenchement de l'analyse quand le timer arrive vers 0
            // On déclenche à 0.5s pour avoir le temps de calculer avant que le compteur n'affiche 0.0
            if (timeLeft <= 0.5 && timeLeft > -1 && !isSignaling) {
                fetchAndDecide();
                timeLeft = cycleTime; // Reset immédiat du compteur
                display.innerText = cycleTime.toFixed(1);
            }
            
            // Sécurité anti-bug infini
            if (timeLeft < -2) timeLeft = cycleTime;

        }, 100); // Mise à jour toutes les 100ms
    }

    // Initialisation
    if ("Notification" in window) Notification.requestPermission();
    
    // Démarrage du timer et première analyse après 1 seconde
    startTimer();
    setTimeout(fetchAndDecide, 1000);

</script>
</body>
</html>
