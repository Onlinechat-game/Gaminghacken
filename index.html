<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HACKEN STORE PRO BOT - XAUUSD</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #050505;
    color: #ffd700;
    font-family: Arial;
    text-align: center;
}

h1 { color: gold; }

.box {
    display: inline-block;
    border: 1px solid gold;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

.buy { color: #00ff00; }
.sell { color: red; }
.neutral { color: orange; }

canvas {
    max-width: 95%;
}

footer {
    margin-top: 20px;
    opacity: 0.4;
}
</style>
</head>

<body>

<h1>🟡 HACKEN STORE - XAUUSD BOT</h1>

<div id="indicators"></div>
<h2 id="signal">Connexion...</h2>

<canvas id="chart"></canvas>

<footer>HACKEN STORE 🚀</footer>

<script>

const API_KEY = "a4186ccd7b4843cc9fa11f095aecf159";

let prices = [];
let volumes = [];

// XAUUSD API
async function fetchData() {
    let res = await fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=1min&outputsize=100&apikey=${API_KEY}`);
    let data = await res.json();

    let values = data.values.reverse();

    prices = values.map(c => parseFloat(c.close));
    volumes = values.map(c => parseFloat(c.volume || 1)); // parfois vide
}

// EMA
function EMA(data, period) {
    let k = 2 / (period + 1);
    let ema = [data[0]];
    for (let i = 1; i < data.length; i++) {
        ema.push(data[i] * k + ema[i-1] * (1 - k));
    }
    return ema;
}

// RSI
function RSI(data, period = 14) {
    let gains = 0, losses = 0;
    for (let i = data.length - period; i < data.length - 1; i++) {
        let diff = data[i+1] - data[i];
        if (diff > 0) gains += diff;
        else losses -= diff;
    }
    let rs = gains / (losses || 1);
    return 100 - (100 / (1 + rs));
}

// MACD
function MACD(data) {
    let ema12 = EMA(data, 12);
    let ema26 = EMA(data, 26);
    let macd = ema12.map((v, i) => v - ema26[i]);
    let signal = EMA(macd, 9);
    return { macd, signal };
}

// Bollinger
function Bollinger(data, period = 20) {
    let ma = EMA(data, period);
    let std = [];

    for (let i = 0; i < data.length; i++) {
        if (i < period) std.push(null);
        else {
            let mean = ma[i];
            let sum = 0;
            for (let j = i - period; j < i; j++) {
                sum += Math.pow(data[j] - mean, 2);
            }
            std.push(Math.sqrt(sum / period));
        }
    }

    return {
        upper: ma.map((m, i) => m ? m + 2 * std[i] : null),
        lower: ma.map((m, i) => m ? m - 2 * std[i] : null),
        mid: ma
    };
}

// Support / Résistance
function supportResistance(data) {
    return {
        support: Math.min(...data.slice(-20)),
        resistance: Math.max(...data.slice(-20))
    };
}

// Volume Spike (moins fiable sur gold)
function volumeSignal(volumes) {
    let avg = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
    let current = volumes[volumes.length-1];
    return current > avg * 1.2;
}

// CHART
let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [
            { label: "XAUUSD", data: [], borderColor: "gold" },
            { label: "Bollinger Haut", data: [], borderColor: "red" },
            { label: "Bollinger Bas", data: [], borderColor: "green" }
        ]
    }
});

async function update() {
    await fetchData();

    let rsi = RSI(prices);
    let macd = MACD(prices);
    let bb = Bollinger(prices);
    let sr = supportResistance(prices);
    let volSpike = volumeSignal(volumes);

    chart.data.labels = prices.map(() => "");
    chart.data.datasets[0].data = prices;
    chart.data.datasets[1].data = bb.upper;
    chart.data.datasets[2].data = bb.lower;
    chart.update();

    let signal = "NEUTRE";
    let className = "neutral";

    let lastPrice = prices[prices.length-1];
    let lastMACD = macd.macd.slice(-1)[0];
    let lastSignal = macd.signal.slice(-1)[0];

    if (rsi < 30 && lastMACD > lastSignal) {
        signal = "ACHAT OR 🟢";
        className = "buy";
    } 
    else if (rsi > 70 && lastMACD < lastSignal) {
        signal = "VENTE OR 🔴";
        className = "sell";
    }

    document.getElementById("signal").innerHTML =
        `<span class="${className}">${signal}</span>`;

    document.getElementById("indicators").innerHTML = `
        <div class="box">XAUUSD: ${lastPrice.toFixed(2)}</div>
        <div class="box">RSI: ${rsi.toFixed(2)}</div>
        <div class="box">Support: ${sr.support.toFixed(2)}</div>
        <div class="box">Résistance: ${sr.resistance.toFixed(2)}</div>
        <div class="box">MACD: ${lastMACD.toFixed(2)}</div>
    `;
}

// LOOP
setInterval(update, 5000);

</script>

</body>
</html>
