<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN STORE - AI TERMINAL</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --panel-color: #151a21;
            --accent-green: #0ecb81;
            --accent-red: #f6465d;
            --text-main: #eaecef;
            --text-dim: #848e9c;
            --border: #2b3139;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--panel-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        /* HEADER */
        .header {
            background-color: #1e2329;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: bold;
            letter-spacing: 1px;
            color: #f0b90b; /* Binance Yellow style */
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* SELECTOR */
        .market-selector {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #1e2329;
        }

        .m-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }

        .m-btn.active {
            background: #2b3139;
            color: var(--text-main);
            border-color: #f0b90b;
        }

        /* MAIN DISPLAY */
        .display-area {
            padding: 20px;
            text-align: center;
        }

        .price-box {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }

        .trend-indicator {
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }

        /* SIGNAL BOX */
        .signal-card {
            background: #1e2329;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid gray;
        }

        .signal-card.buy { border-left-color: var(--accent-green); }
        .signal-card.sell { border-left-color: var(--accent-red); }
        .signal-card.wait { border-left-color: var(--text-dim); }

        .signal-title {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .signal-action {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 10px 0;
        }

        .tp-sl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            background: #0b0e11;
            padding: 10px;
            border-radius: 4px;
        }

        .stat-label { font-size: 0.7rem; color: var(--text-dim); }
        .stat-val { font-size: 1rem; font-family: monospace; }

        /* INDICATORS */
        .indicators-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .ind-item span { color: var(--text-main); font-weight: bold; }

        /* ADVICE */
        .advice-box {
            background: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: left;
            margin-bottom: 15px;
            border: 1px solid rgba(240, 185, 11, 0.3);
        }

        /* FOOTER / CONTROLS */
        .controls {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2329;
        }

        .refresh-btn {
            background: #2b3139;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .refresh-btn:hover { background: #363c45; }

        .timer {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .signature {
            text-align: center;
            font-size: 0.7rem;
            color: #474d57;
            padding: 10px;
            margin-top: 10px;
        }

        /* LOADING OVERLAY */
        #loader {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 14, 17, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #f0b90b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="terminal-container">
    
    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#848e9c; font-size:0.8rem;">CONNEXION AU SERVEUR...</p>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="logo">HACKEN STORE <span style="font-size:0.6em; color:#fff;">PRO</span></div>
        <div style="font-size:0.8rem;">STATUS: <span class="status-dot"></span> LIVE</div>
    </div>

    <!-- Market Selector -->
    <div class="market-selector">
        <button class="m-btn" onclick="setMarket('EURUSD')" id="btn-eur">EUR/USD</button>
        <button class="m-btn" onclick="setMarket('XAUUSD')" id="btn-xau">XAU/USD (OR)</button>
    </div>

    <!-- Main Content -->
    <div class="display-area">
        
        <div class="price-box" id="current-price">0.0000</div>
        <div class="trend-indicator" id="trend-text">Analyse en cours...</div>

        <!-- Indicators -->
        <div class="indicators-row">
            <div class="ind-item">RSI (14): <span id="val-rsi">--</span></div>
            <div class="ind-item">MACD: <span id="val-macd">--</span></div>
            <div class="ind-item">ATR: <span id="val-atr">--</span></div>
        </div>

        <!-- Signal Card -->
        <div class="signal-card wait" id="signal-card">
            <div class="signal-title">Signal IA Précis</div>
            <div class="signal-action" id="signal-action">EN ATTENTE</div>
            
            <div class="tp-sl-grid">
                <div>
                    <div class="stat-label">STOP LOSS (SL)</div>
                    <div class="stat-val" id="sl-val" style="color:var(--accent-red)">---</div>
                </div>
                <div style="text-align:right;">
                    <div class="stat-label">TAKE PROFIT (TP)</div>
                    <div class="stat-val" id="tp-val" style="color:var(--accent-green)">---</div>
                </div>
            </div>
            <div style="margin-top:10px; font-size:0.8rem; color:#aaa;">
                Temps estimé: <strong id="time-est" style="color:white">--</strong>
            </div>
        </div>

        <!-- Advice -->
        <div class="advice-box">
            💡 <strong>Conseil Bot :</strong> <span id="bot-advice">Initialisation des algorithmes...</span>
        </div>

    </div>

    <!-- Footer Controls -->
    <div class="controls">
        <div class="timer">Prochain scan: <span id="countdown">5s</span></div>
        <button class="refresh-btn" onclick="forceRefresh()">
            ↻ Actualiser Maintenant
        </button>
    </div>

    <div class="signature">Creator HACKEN STORE © 2024</div>
</div>

<script>
    // --- CONFIGURATION & ETAT ---
    let currentMarket = localStorage.getItem('hacken_market') || 'EURUSD'; // Récupère la préférence sauvegardée
    let autoRefreshInterval;
    let countdownInterval;
    let timeLeft = 5;

    // Initialisation au chargement
    window.onload = function() {
        updateButtons();
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            startAutoPilot();
        }, 1500); // Faux délai de connexion
    };

    // Changement de marché manuel
    function setMarket(market) {
        currentMarket = market;
        localStorage.setItem('hacken_market', market); // Sauvegarde la préférence
        updateButtons();
        forceRefresh(); // Relance l'analyse immédiatement
    }

    function updateButtons() {
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        if(currentMarket === 'EURUSD') document.getElementById('btn-eur').classList.add('active');
        else document.getElementById('btn-xau').classList.add('active');
    }

    // --- MOTEUR D'ANALYSE (SIMULATION AVANCÉE) ---
    function analyze() {
        // 1. Génération Prix de base réaliste
        let basePrice = currentMarket === 'EURUSD' ? 1.0850 : 1945.50;
        let volatility = currentMarket === 'EURUSD' ? 0.0015 : 8.50;
        
        // Variation aléatoire légère pour simuler le temps réel
        let randomMove = (Math.random() - 0.5) * volatility;
        let currentPrice = basePrice + randomMove;

        // Mise à jour affichage prix
        let decimals = currentMarket === 'EURUSD' ? 5 : 2;
        document.getElementById('current-price').innerText = currentPrice.toFixed(decimals);
        document.getElementById('current-price').className = randomMove > 0 ? 'price-box up' : 'price-box down';

        // 2. Calcul des indicateurs (Logique Mathématique Simulée)
        // RSI entre 20 et 80 pour éviter les extrêmes trop souvent
        let rsi = 30 + Math.random() * 40; 
        if(Math.random() > 0.8) rsi = Math.random() > 0.5 ? 15 + Math.random()*10 : 85 - Math.random()*10; // Pics rares
        
        let macdVal = (Math.random() - 0.5).toFixed(4);
        let atrVal = (volatility * 0.5).toFixed(decimals);

        document.getElementById('val-rsi').innerText = rsi.toFixed(2);
        document.getElementById('val-macd').innerText = macdVal > 0 ? "HAUSSIER" : "BAISSIER";
        document.getElementById('val-macd').style.color = macdVal > 0 ? "var(--accent-green)" : "var(--accent-red)";
        document.getElementById('val-atr').innerText = atrVal;

        // 3. Décision du Bot (Algorithme de décision)
        let signal = "WAIT";
        let actionText = "NEUTRE / ATTENDRE";
        let cardClass = "wait";
        let sl = 0, tp = 0;
        let advice = "";
        let timeEst = "";

        // Logique de Trading
        if (rsi < 30) {
            // Survente -> ACHAT
            signal = "BUY";
            actionText = "ACHETER (LONG)";
            cardClass = "buy";
            sl = currentPrice - (atrVal * 1.5);
            tp = currentPrice + (atrVal * 3);
            advice = "Le RSI indique une survente forte. Probabilité de rebond technique élevée.";
            timeEst = "Entrée immédiate (Scalp 15m)";
        } else if (rsi > 70) {
            // Surachat -> VENTE
            signal = "SELL";
            actionText = "VENDRE (SHORT)";
            cardClass = "sell";
            sl = currentPrice + (atrVal * 1.5);
            tp = currentPrice - (atrVal * 3);
            advice = "Le marché est en surachat. Correction imminente attendue.";
            timeEst = "Dans les 30 prochaines minutes";
        } else {
            // Tendance ou Range
            if (macdVal > 0.0005 && rsi > 50) {
                signal = "BUY";
                actionText = "ACHETER (Trend)";
                cardClass = "buy";
                sl = currentPrice - (atrVal * 2);
                tp = currentPrice + (atrVal * 4);
                advice = "Momentum haussier confirmé par le MACD. Suivez la tendance.";
                timeEst = "Hold 1h - 4h";
            } else if (macdVal < -0.0005 && rsi < 50) {
                signal = "SELL";
                actionText = "VENDRE (Trend)";
                cardClass = "sell";
                sl = currentPrice + (atrVal * 2);
                tp = currentPrice - (atrVal * 4);
                advice = "Pression vendeuse structurelle. Le support risque de casser.";
                timeEst = "Hold 1h - 4h";
            } else {
                advice = "Marché en consolidation (Range). Évitez d'ouvrir des positions jusqu'à cassure.";
                timeEst = "Pas de trade recommandé";
            }
        }

        // 4. Mise à jour de l'UI
        const card = document.getElementById('signal-card');
        card.className = `signal-card ${cardClass}`;
        document.getElementById('signal-action').innerText = actionText;
        document.getElementById('signal-action').style.color = cardClass === 'buy' ? 'var(--accent-green)' : (cardClass === 'sell' ? 'var(--accent-red)' : '#848e9c');
        
        document.getElementById('sl-val').innerText = sl.toFixed(decimals);
        document.getElementById('tp-val').innerText = tp.toFixed(decimals);
        document.getElementById('time-est').innerText = timeEst;
        document.getElementById('bot-advice').innerText = advice;
        
        // Trend Text global
        let trendEl = document.getElementById('trend-text');
        if(signal === 'BUY') { trendEl.innerText = "TENDANCE HAUSSIÈRE DETECTÉE"; trendEl.className = "trend-indicator up"; }
        else if(signal === 'SELL') { trendEl.innerText = "TENDANCE BAISSIÈRE DETECTÉE"; trendEl.className = "trend-indicator down"; }
        else { trendEl.innerText = "MARCHÉ INCERTAIN / RANGE"; trendEl.className = "trend-indicator"; }
    }

    // --- GESTION DU TEMPS RÉEL ---
    function startAutoPilot() {
        analyze(); // Premier lancement immédiat
        
        // Compte à rebours visuel
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft + "s";
            if(timeLeft <= 0) {
                timeLeft = 5;
                analyze(); // Relance analyse auto
            }
        }, 1000);
    }

    function forceRefresh() {
        // Bouton manuel : reset le timer et relance
        timeLeft = 5;
        document.getElementById('countdown').innerText = "5s";
        analyze();
    }

</script>

</body>
</html>
