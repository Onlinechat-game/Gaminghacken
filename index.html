<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BOT PRO PRECISION</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 20px;
    }
    .bot-container {
      background: #222;
      border-radius: 10px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px #000;
    }
    h1 { color: #00ffcc; }
    .status {
      font-size: 30px;
      font-weight: bold;
      margin: 20px 0;
    }
    .status.acheter { color: lime; }
    .status.vendre { color: red; }
    button {
      background: #00ffcc;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .result {
      margin-top: 20px;
      text-align: left;
    }
    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="bot-container">
    <h1>BOT PRO PRECISION</h1>
    <p>Stratégie Triple Confirmation (ADX + RSI + EMA)</p>
    <p>Prix Actuel: <span id="price">-</span></p>
    <div id="status" class="status">-</div>
    <button onclick="analyse()">NOUVELLE ANALYSE</button>
    
    <div class="result">
      <p>Tendance (EMA50): <span id="ema">-</span></p>
      <p>Force (ADX): <span id="adx">-</span></p>
      <p>RSI: <span id="rsi">-</span></p>
    </div>
    
    <p class="note">⚠️ Analyse automatique toutes les 10 secondes.<br>
    CREATOR HACKEN STORE</p>
  </div>

  <script>
    async function getData() {
      let response = await fetch("https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=100");
      let data = await response.json();
      return data.map(candle => ({
        high: parseFloat(candle[2]),
        low: parseFloat(candle[3]),
        close: parseFloat(candle[4])
      }));
    }

    function calcEMA(prices, period=50) {
      let k = 2/(period+1);
      let ema = prices[0];
      for (let i=1; i<prices.length; i++) {
        ema = prices[i]*k + ema*(1-k);
      }
      return ema;
    }

    function calcRSI(prices, period=14) {
      if (prices.length < period+1) return 50;
      let gains=0, losses=0;
      for (let i=1; i<period; i++) {
        let diff = prices[i]-prices[i-1];
        if (diff>=0) gains+=diff; else losses-=diff;
      }
      let rs = gains/(losses||1);
      return 100 - (100/(1+rs));
    }

    function calcADX(candles, period=14) {
      let trs=[], plusDM=[], minusDM=[];
      for (let i=1; i<candles.length; i++) {
        let highDiff = candles[i].high - candles[i-1].high;
        let lowDiff = candles[i-1].low - candles[i].low;
        let upMove = highDiff > lowDiff && highDiff > 0 ? highDiff : 0;
        let downMove = lowDiff > highDiff && lowDiff > 0 ? lowDiff : 0;
        let tr = Math.max(
          candles[i].high - candles[i].low,
          Math.abs(candles[i].high - candles[i-1].close),
          Math.abs(candles[i].low - candles[i-1].close)
        );
        trs.push(tr);
        plusDM.push(upMove);
        minusDM.push(downMove);
      }
      let atr = trs.slice(-period).reduce((a,b)=>a+b,0)/period;
      let plusDI = (plusDM.slice(-period).reduce((a,b)=>a+b,0)/atr)*100;
      let minusDI = (minusDM.slice(-period).reduce((a,b)=>a+b,0)/atr)*100;
      let dx = Math.abs(plusDI - minusDI)/(plusDI + minusDI)*100;
      return dx.toFixed(1);
    }

    async function analyse() {
      let candles = await getData();
      let prices = candles.map(c => c.close);
      let lastPrice = prices[prices.length-1].toFixed(5);

      let ema50 = calcEMA(prices, 50);
      let rsi = calcRSI(prices, 14).toFixed(1);
      let adx = calcADX(candles, 14);

      document.getElementById("price").innerText = lastPrice;
      document.getElementById("ema").innerText = (lastPrice > ema50) ? "HAUSSIÈRE" : "BAISSIÈRE";
      document.getElementById("rsi").innerText = rsi;
      document.getElementById("adx").innerText = adx + (adx < 20 ? " (Faible)" : " (Fort)");

      let statusEl = document.getElementById("status");
      if (lastPrice > ema50 && adx > 20 && rsi > 50) {
        statusEl.innerText = "ACHETER";
        statusEl.className = "status acheter";
      } else {
        statusEl.innerText = "VENDRE";
        statusEl.className = "status vendre";
      }
    }

    // Analyse automatique toutes les 10 secondes
    setInterval(analyse, 10000);
    analyse(); // première exécution immédiate
  </script>
</body>
</html>
