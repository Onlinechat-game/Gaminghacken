<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACKEN STORE - LOCAL ALGO</title>
    <style>
        :root { --bg: #000000; --panel: #0a0a0a; --primary: #00f3ff; --success: #00ff9d; --danger: #ff3b3b; --text: #ffffff; --dim: #555555; --border: #222222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        
        .dashboard { background: var(--panel); border: 1px solid var(--border); border-top: 4px solid var(--primary); border-radius: 4px; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .logo { font-size: 1rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .status-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 2px; background: rgba(0, 243, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        
        .price-hero { text-align: center; margin: 10px 0; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 4px; border: 1px solid #111; }
        .price-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; }
        .price-value { font-size: 2.8rem; font-weight: 700; color: var(--text); margin: 5px 0; }
        .price-up { color: var(--success); } .price-down { color: var(--danger); }

        .btn-scan { width: 100%; padding: 16px; background: var(--primary); border: none; color: #000; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin: 10px 0; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        .btn-scan:active { transform: scale(0.98); }
        .btn-scan:disabled { background: #333; color: #666; }

        .console { background: #000; border: 1px solid #222; height: 100px; padding: 8px; font-size: 0.65rem; color: #888; overflow-y: auto; margin-bottom: 10px; border-radius: 2px; font-family: 'Consolas', monospace; }
        .log-line { margin-bottom: 3px; } 
        .log-info { color: #555; } .log-warn { color: var(--primary); } .log-success { color: var(--success); } .log-error { color: var(--danger); }

        .result-card { background: rgba(20,20,20,0.8); border: 1px solid var(--border); border-left: 4px solid var(--dim); padding: 15px; border-radius: 2px; display: none; margin-top: 10px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-card.buy { border-left-color: var(--success); background: linear-gradient(to right, rgba(0,255,157,0.05), transparent); } 
        .result-card.sell { border-left-color: var(--danger); background: linear-gradient(to right, rgba(255,59,59,0.05), transparent); }

        .signal-main { font-size: 2rem; font-weight: 900; text-transform: uppercase; text-align: center; margin: 10px 0; letter-spacing: 2px; }
        .signal-buy { color: var(--success); } .signal-sell { color: var(--danger); } .signal-wait { color: var(--dim); }

        .levels-row { display: flex; gap: 10px; margin: 15px 0; }
        .level-box { flex: 1; background: #000; padding: 10px; border-radius: 2px; text-align: center; border: 1px solid #333; }
        .level-label { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .level-price { font-size: 1.1rem; font-weight: bold; font-family: monospace; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #222; }
        .metric-box { text-align: center; } 
        .metric-label { font-size: 0.55rem; color: var(--dim); display: block; text-transform: uppercase; } 
        .metric-val { font-size: 0.9rem; font-weight: bold; color: var(--text); }

        .algo-reasoning-box { margin-top: 15px; padding: 12px; background: rgba(0, 243, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 2px; font-size: 0.75rem; line-height: 1.5; color: #ddd; }
        .algo-reasoning-box strong { color: var(--primary); display: block; margin-bottom: 6px; text-transform: uppercase; font-size: 0.65rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="header">
            <div class="logo">HACKEN STORE <span style="font-size:0.6em; vertical-align:super;">LOCAL AI</span></div>
            <div class="status-badge">● SYSTÈME AUTONOME</div>
        </div>

        <div class="price-hero">
            <div class="price-label">XAU/USD LIVE PRICE</div>
            <div class="price-value" id="price-display">0.00</div>
        </div>

        <button class="btn-scan" id="btn-analyze" onclick="runLocalAlgo()">
            ⚡ LANCER ANALYSE LOCALE
        </button>

        <div class="console" id="console">
            <div class="log-line log-info">> Moteur Local Prêt.</div>
            <div class="log-line log-success">> Aucune connexion externe requise.</div>
            <div class="log-line log-info">> En attente...</div>
        </div>

        <div class="result-card" id="result-card">
            <div class="signal-main" id="signal-text">WAIT</div>
            
            <div class="levels-row">
                <div class="level-box">
                    <span class="level-label">Stop Loss (SL)</span>
                    <span class="level-price" style="color:var(--danger)" id="sl-val">---</span>
                </div>
                <div class="level-box">
                    <span class="level-label">Take Profit (TP)</span>
                    <span class="level-price" style="color:var(--success)" id="tp-val">---</span>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-box"><span class="metric-label">RSI (14)</span><span class="metric-val" id="val-rsi">--</span></div>
                <div class="metric-box"><span class="metric-label">Bollinger</span><span class="metric-val" id="val-bb">--</span></div>
                <div class="metric-box"><span class="metric-label">Trend</span><span class="metric-val" id="val-trend">--</span></div>
            </div>

            <div class="algo-reasoning-box">
                <strong> Logique Algorithmique :</strong>
                <span id="algo-reasoning">En attente...</span>
            </div>
        </div>
    </div>
</div>

<script>
    const BINANCE_URL = 'https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=1h&limit=100';
    // Proxy pour contourner CORS sur mobile si nécessaire
    const PROXY = "https://api.allorigins.win/raw?url=";

    function log(msg, type = 'info') {
        const consoleEl = document.getElementById('console');
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleEl.appendChild(div);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function runLocalAlgo() {
        const btn = document.getElementById('btn-analyze');
        const resultCard = document.getElementById('result-card');
        
        btn.disabled = true;
        btn.innerText = "CALCUL EN COURS...";
        resultCard.style.display = 'none';
        
        log("Récupération des données marché...", "info");

        try {
            // Fetch Data via Proxy pour éviter erreur CORS
            const res = await fetch(PROXY + encodeURIComponent(BINANCE_URL));
            if(!res.ok) throw new Error("Erreur Réseau");
            const data = await res.json();
            
            const candles = data.map(d => ({
                close: parseFloat(d[4]), 
                high: parseFloat(d[2]), 
                low: parseFloat(d[3])
            }));

            const currentPrice = candles[candles.length - 1].close;
            document.getElementById('price-display').innerText = currentPrice.toFixed(2);
            
            const prevClose = candles[candles.length - 2].close;
            const priceEl = document.getElementById('price-display');
            priceEl.className = `price-value ${currentPrice >= prevClose ? 'price-up' : 'price-down'}`;

            log("Données reçues. Calcul des indicateurs...", "success");

            // --- CERVEAU DE L'ALGO LOCAL ---
            
            // 1. RSI
            const rsi = calculateRSI(candles, 14);
            
            // 2. Bandes de Bollinger (20, 2)
            const bb = calculateBollinger(candles, 20, 2);
            const upperBand = bb.upper;
            const lowerBand = bb.lower;
            const middleBand = bb.middle;
            
            let bbStatus = "NEUTRE";
            if (currentPrice > upperBand) bbStatus = "SURACHAT (HAUT)";
            else if (currentPrice < lowerBand) bbStatus = "SURVENTE (BAS)";

            // 3. Tendance (Moyenne Mobile 50)
            const sma50 = calculateSMA(candles, 50);
            const trend = currentPrice > sma50 ? "HAUSSIER" : "BAISSIER";

            // Affichage Métriques
            document.getElementById('val-rsi').innerText = rsi.toFixed(1);
            document.getElementById('val-bb').innerText = bbStatus;
            document.getElementById('val-trend').innerText = trend;

            // --- PRISE DE DÉCISION (LOGIQUE STRICTE) ---
            let signal = "WAIT";
            let reasoning = "";
            let sl = 0;
            let tp = 0;
            const atr = calculateATR(candles, 14); // Volatilité pour SL/TP

            // Condition ACHAT : RSI < 30 (Survente) ET Prix proche ou sous Bande Inférieure
            if (rsi < 30 && currentPrice <= lowerBand * 1.002) {
                signal = "BUY";
                reasoning = `Confluence Haussière détectée : RSI en survente (${rsi.toFixed(1)}) et prix touchant la bande de Bollinger inférieure. Rebond technique probable.`;
                sl = currentPrice - (atr * 1.5);
                tp = currentPrice + (atr * 3.0);
            } 
            // Condition VENTE : RSI > 70 (Surachat) ET Prix proche ou au-dessus Bande Supérieure
            else if (rsi > 70 && currentPrice >= upperBand * 0.998) {
                signal = "SELL";
                reasoning = `Confluence Baissière détectée : RSI en surachat (${rsi.toFixed(1)}) et prix touchant la bande de Bollinger supérieure. Correction attendue.`;
                sl = currentPrice + (atr * 1.5);
                tp = currentPrice - (atr * 3.0);
            }
            // Condition Tendance Lourde (Breakout)
            else if (trend === "HAUSSIER" && rsi > 50 && rsi < 70) {
                signal = "BUY";
                reasoning = `Tendance de fond haussière confirmée (Prix > SMA50). Momentum positif sans être en surachat extrême.`;
                sl = currentPrice - (atr * 2.0);
                tp = currentPrice + (atr * 4.0);
            }
            else if (trend === "BAISSIER" && rsi < 50 && rsi > 30) {
                signal = "SELL";
                reasoning = `Tendance de fond baissière confirmée (Prix < SMA50). Pression vendeuse dominante.`;
                sl = currentPrice + (atr * 2.0);
                tp = currentPrice - (atr * 4.0);
            }
            else {
                signal = "WAIT";
                reasoning = `Aucune configuration à haute probabilité détectée. RSI (${rsi.toFixed(1)}) et Bandes de Bollinger indiquent un marché neutre ou incertain. Attente recommandée.`;
            }

            // Affichage Résultat
            displayResult(signal, reasoning, sl, tp);
            log("Analyse locale terminée.", "success");

        } catch (error) {
            log(`ERREUR: ${error.message}`, "error");
            alert("Erreur de connexion aux données marché. Vérifie ta connexion internet.");
        } finally {
            btn.disabled = false;
            btn.innerText = "⚡ LANCER ANALYSE LOCALE";
        }
    }

    function displayResult(signal, reasoning, sl, tp) {
        const card = document.getElementById('result-card');
        card.style.display = 'block';
        card.className = `result-card ${signal.toLowerCase()}`;
        
        const sigEl = document.getElementById('signal-text');
        sigEl.innerText = signal === 'BUY' ? 'ACHETER' : (signal === 'SELL' ? 'VENDRE' : 'ATTENDRE');
        sigEl.className = `signal-main ${signal === 'BUY' ? 'signal-buy' : (signal === 'SELL' ? 'signal-sell' : 'signal-wait')}`;

        if(signal !== 'WAIT') {
            document.getElementById('sl-val').innerText = sl.toFixed(2);
            document.getElementById('tp-val').innerText = tp.toFixed(2);
        } else {
            document.getElementById('sl-val').innerText = "---";
            document.getElementById('tp-val').innerText = "---";
        }
        
        document.getElementById('algo-reasoning').innerText = reasoning;
    }

    // --- MOTEURS DE CALCUL MATHÉMATIQUE ---

    function calculateRSI(data, period) {
        let gains = 0, losses = 0;
        for (let i = data.length - period; i < data.length; i++) {
            const change = data[i].close - data[i-1].close;
            if (change > 0) gains += change; else losses += Math.abs(change);
        }
        if (losses === 0) return 100;
        const avgGain = gains / period;
        const avgLoss = losses / period;
        return 100 - (100 / (1 + (avgGain / avgLoss)));
    }

    function calculateSMA(data, period) {
        let sum = 0;
        for (let i = data.length - period; i < data.length; i++) {
            sum += data[i].close;
        }
        return sum / period;
    }

    function calculateBollinger(data, period, multiplier) {
        const sma = calculateSMA(data, period);
        let sumSq = 0;
        for (let i = data.length - period; i < data.length; i++) {
            sumSq += Math.pow(data[i].close - sma, 2);
        }
        const stdDev = Math.sqrt(sumSq / period);
        return {
            upper: sma + (stdDev * multiplier),
            middle: sma,
            lower: sma - (stdDev * multiplier)
        };
    }

    function calculateATR(data, period) {
        let trSum = 0;
        for(let i = data.length - period; i < data.length; i++) {
            const h = data[i].high, l = data[i].low, c = data[i-1].close;
            const tr = Math.max(h - l, Math.abs(h - c), Math.abs(l - c));
            trSum += tr;
        }
        return trSum / period;
    }
</script>
</body>
</html>
