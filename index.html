<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN STORE - XAUUSD ANALYZER</title>
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #0a0a0a;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- ANIMATIONS --- */
        @keyframes scan {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--gold); }
            50% { text-shadow: 0 0 20px var(--gold), 0 0 30px #ffa500; }
            100% { text-shadow: 0 0 5px var(--gold); }
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            background: rgba(0, 0, 0, 0.8);
        }

        .brand {
            font-size: 3rem;
            font-weight: bold;
            color: var(--gold);
            animation: glow 2s infinite;
            letter-spacing: 5px;
        }

        .status {
            color: var(--neon-green);
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* --- LAYOUT --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
        }

        /* --- WIDGETS --- */
        .chart-container {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            height: 600px;
            position: relative;
        }

        .analysis-panel {
            background: #161616;
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .signal-box {
            border: 1px solid var(--neon-green);
            padding: 15px;
            text-align: center;
            background: rgba(0, 255, 65, 0.05);
        }

        .signal-title {
            color: var(--neon-green);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* --- BOUTON SCAN --- */
        .btn-scan {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-scan:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* --- LOADING OVERLAY --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
        }

        .matrix-text {
            color: var(--neon-green);
            font-size: 1.5rem;
        }

    </style>
</head>
<body>

    <!-- Ecran de chargement "Hacking" -->
    <div id="loader">
        <div class="matrix-text" id="load-text">INITIALISATION HACKEN STORE...</div>
        <div style="color: grey; margin-top: 10px;">Accès au marché XAU/USD...</div>
    </div>

    <header>
        <div class="brand">HACKEN STORE</div>
        <div class="status">● SYSTEME D'ANALYSE PRÉDICTIVE ACTIF</div>
    </header>

    <div class="container">
        <div class="dashboard">
            
            <!-- Graphique Principal -->
            <div class="chart-container">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_xau"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "fr",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "hide_side_toolbar": false,
                        "allow_symbol_change": true,
                        "details": true,
                        "hotlist": true,
                        "calendar": true,
                        "container_id": "tradingview_xau"
                    });
                    </script>
                </div>
            </div>

            <!-- Panneau Latéral d'analyse -->
            <div class="analysis-panel">
                <button class="btn-scan" onclick="startScan()">LANCER SCAN PROFOND</button>

                <div class="signal-box">
                    <div class="signal-title">INDICATEUR TECHNIQUE</div>
                    <!-- Widget Jauge -->
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        {
                        "interval": "1h",
                        "width": "100%",
                        "isTransparent": true,
                        "height": "350",
                        "symbol": "OANDA:XAUUSD",
                        "showIntervalTabs": true,
                        "displayMode": "single",
                        "locale": "fr",
                        "colorTheme": "dark"
                        }
                        </script>
                    </div>
                </div>

                <div id="prediction-result" style="border: 1px dashed var(--gold); padding: 10px; font-size: 0.9rem; text-align: center;">
                    En attente de scan...
                </div>
            </div>
        </div>
    </div>

    <!-- Widget News en bas -->
    <div style="width: 95%; margin: 20px auto;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            {
            "feedMode": "market",
            "market": "stock",
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "regular",
            "width": "100%",
            "height": "400",
            "locale": "fr"
            }
            </script>
        </div>
    </div>

    <script>
        // Simulation de chargement
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2500);
        };

        function startScan() {
            const resultDiv = document.getElementById('prediction-result');
            resultDiv.innerHTML = "<span style='color:yellow'>SCAN EN COURS...</span>";
            
            setTimeout(() => {
                const choices = [
                    {text: "HAUSSE PROBABLE (BUY)", color: "#00ff41", target: "+12.5 pips"},
                    {text: "BAISSE IMMINENTE (SELL)", color: "#ff003c", target: "-18.2 pips"},
                    {text: "CONSOLIDATION (NEUTRE)", color: "#ffcc00", target: "Stable"}
                ];
                const final = choices[Math.floor(Math.random() * choices.length)];
                
                resultDiv.innerHTML = `
                    <div style="color:${final.color}; font-weight:bold; font-size:1.2rem;">${final.text}</div>
                    <div style="margin-top:10px">Confiance: 92%<br>Cible: ${final.target}<br>Horizon: 2-4 Heures</div>
                    <div style="font-size:0.7rem; margin-top:10px; color:gray">Analyse signée HACKEN STORE</div>
                `;
            }, 2000);
        }
    </script>
</body>
</html>
