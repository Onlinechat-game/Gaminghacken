<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken LIVE - Réactif</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        h2 { color: #ffd700; margin: 5px 0 15px 0; font-size: 1.3rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .live-badge { background: #ff0000; color: #fff; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .price-box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .price-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .price-value { font-size: 2rem; font-weight: 900; color: #4fc3f7; font-family: monospace; }
        .price-change { font-size: 0.9rem; margin-top: 5px; font-weight: bold; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border-radius: 10px; padding: 12px; border: 1px solid #333; text-align: left; }
        .card-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 1.3rem; font-weight: bold; }
        .val-up { color: #00e676; }
        .val-down { color: #ff5252; }
        .val-neutral { color: #ffa000; }

        .force-container { margin: 20px 0; text-align: left; }
        .force-labels { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; font-weight: bold; }
        .progress-bar { height: 25px; background: #333; border-radius: 12px; overflow: hidden; display: flex; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .bar-buy { background: linear-gradient(90deg, #006400, #00e676); height: 100%; transition: width 0.3s ease-out; }
        .bar-sell { background: linear-gradient(90deg, #8b0000, #ff5252); height: 100%; transition: width 0.3s ease-out; }
        .marker { position: absolute; top: -2px; bottom: -2px; width: 3px; background: #fff; z-index: 5; box-shadow: 0 0 8px #fff; transition: left 0.3s ease-out; }

        #auto-signal-box { padding: 25px 15px; border-radius: 15px; border: 3px solid #333; background: #111; transition: all 0.3s; margin-top: 20px; }
        .signal-title { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .signal-desc { font-size: 1rem; color: #ccc; font-weight: normal; }
        
        .sig-buy { background: rgba(0, 230, 118, 0.15); border-color: #00e676; color: #00e676; box-shadow: 0 0 30px rgba(0, 230, 118, 0.3); }
        .sig-sell { background: rgba(255, 82, 82, 0.15); border-color: #ff5252; color: #ff5252; box-shadow: 0 0 30px rgba(255, 82, 82, 0.3); }
        .sig-wait { background: #222; border-color: #555; color: #aaa; }

        .footer-note { font-size: 0.7rem; color: #555; margin-top: 25px; border-top: 1px solid #222; padding-top: 10px; }
        .creator { font-size: 0.8rem; color: #ffd700; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
        #loading { font-size: 0.8rem; color: #ffa000; margin-top: 5px; height: 15px; }
    </style>
</head>
<body>

    <h2>⚡ Hacken LIVE <span class="live-badge">● RAPIDE</span></h2>
    
    <div class="price-box">
        <div class="price-label">EUR/USD Prix Actuel</div>
        <div class="price-value" id="current-price">--.--</div>
        <div class="price-change" id="price-change">En attente...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-title">RSI (Rapide)</div>
            <div class="card-value" id="rsi-val">--</div>
        </div>
        <div class="card">
            <div class="card-title">Momentum</div>
            <div class="card-value" id="mom-val">--</div>
        </div>
        <div class="card">
            <div class="card-title">Tendance</div>
            <div class="card-value" id="ema-trend">--</div>
        </div>
        <div class="card">
            <div class="card-title">Volatilité</div>
            <div class="card-value" id="adx-val">--</div>
        </div>
    </div>

    <div class="force-container">
        <div class="force-labels">
            <span style="color:#00e676">ACHAT <span id="buy-pct">50%</span></span>
            <span style="color:#ff5252">VENTE <span id="sell-pct">50%</span></span>
        </div>
        <div class="progress-bar">
            <div class="bar-buy" id="bar-buy" style="width: 50%;"></div>
            <div class="bar-sell" id="bar-sell" style="width: 50%;"></div>
            <div class="marker" id="force-marker" style="left: 50%;"></div>
        </div>
    </div>

    <div id="auto-signal-box" class="sig-wait">
        <div class="signal-title" id="sig-title">INITIALISATION...</div>
        <div class="signal-desc" id="sig-desc">Analyse du marché en cours</div>
    </div>
    
    <div id="loading"></div>
    <div class="footer-note">Mise à jour toutes les 3s. Algorithme réactif.</div>
    <div class="creator">Creator Hacken STORE</div>

    <script>
        async function fetchDataLoop() {
            const loading = document.getElementById('loading');
            loading.innerText = "🔄 Mise à jour...";
            
            try {
                // On prend toujours des données 15m pour la stabilité, mais on calcule différemment
                const response = await fetch('https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=15m&limit=50');
                if (!response.ok) throw new Error("Network");
                const data = await response.json();

                const closes = data.map(k => parseFloat(k[4]));
                const highs = data.map(k => parseFloat(k[2]));
                const lows = data.map(k => parseFloat(k[3]));
                
                const lastPrice = closes[closes.length - 1];
                const prevPrice = closes[closes.length - 2];
                const prevPrevPrice = closes[closes.length - 3];

                // 1. Affichage Prix
                const priceEl = document.getElementById('current-price');
                const changeEl = document.getElementById('price-change');
                priceEl.innerText = lastPrice.toFixed(5);
                const diff = lastPrice - prevPrice;
                changeEl.innerText = (diff >= 0 ? "▲ +" : "▼ ") + Math.abs(diff).toFixed(5);
                changeEl.style.color = diff >= 0 ? '#00e676' : '#ff5252';
                priceEl.style.color = diff >= 0 ? '#00e676' : '#ff5252';

                // 2. Calculs Indicateurs
                const emaValues = calculateEMA(closes, 20); // EMA plus courte (20) pour être plus réactif
                const lastEMA = emaValues[emaValues.length - 1];
                const rsi = calculateRSI(closes, 7); // RSI plus court (7) pour réagir vite
                const momentum = lastPrice - prevPrevPrice; // Momentum sur 2 bougies
                
                // Volatilité simple (différence haut/bas récente)
                const volatility = (highs[highs.length-1] - lows[lows.length-1]) * 10000; 

                // 3. Mise à jour UI Indicateurs
                updateUI(rsi, momentum, lastPrice, lastEMA, volatility);

                // 4. Calcul Force Achat/Vente (NOUVEL ALGORITHME ÉQUILIBRÉ)
                calculateBalancedForce(rsi, momentum, lastPrice, lastEMA, volatility);

            } catch (error) {
                console.log("Erreur", error);
                document.getElementById('sig-title').innerText = "ERREUR";
                document.getElementById('sig-desc').innerText = "Vérifie connexion";
            } finally {
                setTimeout(() => { loading.innerText = ""; }, 500);
            }
        }

        function updateUI(rsi, mom, price, ema, vol) {
            // RSI
            const rsiEl = document.getElementById('rsi-val');
            rsiEl.innerText = rsi.toFixed(1);
            rsiEl.className = 'card-value ' + (rsi > 70 ? 'val-down' : rsi < 30 ? 'val-up' : 'val-neutral');

            // Momentum
            const momEl = document.getElementById('mom-val');
            momEl.innerText = (mom > 0 ? "+" : "") + mom.toFixed(5);
            momEl.className = 'card-value ' + (mom > 0 ? 'val-up' : 'val-down');

            // Tendance
            const emaEl = document.getElementById('ema-trend');
            const isUp = price > ema;
            emaEl.innerText = isUp ? "HAUSSE ⬆" : "BAISSE ⬇";
            emaEl.className = 'card-value ' + (isUp ? 'val-up' : 'val-down');

            // Volatilité
            const volEl = document.getElementById('adx-val');
            volEl.innerText = vol.toFixed(1) + " pips";
            volEl.className = 'card-value ' + (vol > 15 ? 'val-up' : 'val-neutral');
        }

        function calculateBalancedForce(rsi, mom, price, ema, vol) {
            let buyScore = 50; // On part de 50/50 (équilibre)
            let sellScore = 50;

            // Facteur 1: Position par rapport à l'EMA (Poids léger: +/- 10)
            if (price > ema) buyScore += 10; else sellScore += 10;

            // Facteur 2: RSI (Le plus important pour les retournements)
            // Si RSI > 60, on penche vers vente (surachat), si < 40 vers achat
            if (rsi > 60) sellScore += 25;
            else if (rsi < 40) buyScore += 25;
            else if (rsi > 50) buyScore += (rsi - 50) * 0.5; // Légère pente
            else sellScore += (50 - rsi) * 0.5;

            // Facteur 3: Momentum immédiat (Poids moyen: +/- 15)
            if (mom > 0.00010) buyScore += 15;
            else if (mom < -0.00010) sellScore += 15;
            else if (mom > 0) buyScore += 5;
            else sellScore += 5;

            // Facteur 4: Si le marché est très plat (volatilité basse), on force l'équilibre
            if (vol < 10) {
                buyScore = 50;
                sellScore = 50;
            }

            // Normalisation finale pour affichage %
            const total = buyScore + sellScore;
            const buyPct = Math.round((buyScore / total) * 100);
            const sellPct = 100 - buyPct;

            // Animation Barre
            document.getElementById('bar-buy').style.width = buyPct + '%';
            document.getElementById('bar-sell').style.width = sellPct + '%';
            document.getElementById('force-marker').style.left = buyPct + '%';
            document.getElementById('buy-pct').innerText = buyPct + '%';
            document.getElementById('sell-pct').innerText = sellPct + '%';

            // Décision Signal
            const box = document.getElementById('auto-signal-box');
            const title = document.getElementById('sig-title');
            const desc = document.getElementById('sig-desc');

            // Seuils plus stricts pour éviter les faux signaux, mais assez sensibles pour changer
            if (buyPct >= 65 && mom > 0) {
                box.className = 'sig-buy';
                title.innerText = "ACHETER 🟢";
                desc.innerText = `Force: ${buyPct}% | Momentum Positif`;
            } else if (sellPct >= 65 && mom < 0) {
                box.className = 'sig-sell';
                title.innerText = "VENDRE 🔴";
                desc.innerText = `Force: ${sellPct}% | Momentum Négatif`;
            } else {
                box.className = 'sig-wait';
                title.innerText = "ATTENDRE ⚪";
                desc.innerText = "Marché indécis (" + buyPct + "% vs " + sellPct + "%)";
            }
        }

        // --- Fonctions Mathématiques ---
        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            return prices.map(p => { ema = p * k + ema * (1 - k); return ema; });
        }

        function calculateRSI(prices, period) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period - 1; i < prices.length - 1; i++) {
                const diff = prices[i+1] - prices[i];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            if (losses === 0) return 100;
            return 100 - (100 / (1 + (gains / losses)));
        }

        // Démarrage
        window.onload = function() {
            fetchDataLoop();
            setInterval(fetchDataLoop, 3000);
        };
    </script>
</body>
</html>
