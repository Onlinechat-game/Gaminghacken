<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT PRO MAX TURBO</title>
<style>
body { background:#0d1117; color:#e6edf3; font-family:Arial; text-align:center; }
.container { margin-top:20px; }
.title { font-size:34px; font-weight:bold; }
.status { font-size:55px; margin:20px; font-weight:bold; transition:0.1s; }
.green { color:#00ff88; }
.red { color:#ff4d4d; }
.card { background:#161b22; margin:10px auto; padding:15px; width:320px; border-radius:10px; }
.score { font-size:24px; }
.timer { font-size:18px; opacity:0.8; }
</style>
</head>
<body>
<div class="container">
<div class="title">BOT PRO MAX TURBO (20s SWITCH)</div><div class="card">
<div id="price">Prix: --</div>
<div id="status" class="status">--</div>
<div id="score" class="score">--</div>
<div id="buyPct" class="score">Achat: --%</div>
<div id="sellPct" class="score">Vente: --%</div>
<div id="timer" class="timer">Cycle: --</div>
</div><div class="card">
<p>EMA50: <span id="ema"></span></p>
<p>RSI14: <span id="rsi"></span></p>
<p>ADX14: <span id="adx"></span></p>
</div>
</div><script>
const API = `https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=100`;

function EMA(a,p){let k=2/(p+1),e=a[0];for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e;}
function RSI(a,p=14){let g=0,l=0;
for(let i=1;i<=p;i++){let d=a[i]-a[i-1]; if(d>0)g+=d; else l-=d;}
let ag=g/p, al=l/p;
for(let i=p+1;i<a.length;i++){let d=a[i]-a[i-1];
if(d>0){ag=(ag*(p-1)+d)/p; al=(al*(p-1))/p;}
else{ag=(ag*(p-1))/p; al=(al*(p-1)-d)/p;}}
let rs=ag/al; return 100-(100/(1+rs));}
function ADX(d,p=14){let trs=[],plus=[],minus=[];
for(let i=1;i<d.length;i++){
let h=d[i][2],l=d[i][3],pc=d[i-1][4];
let ph=d[i-1][2],pl=d[i-1][3];
let tr=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)); trs.push(tr);
let up=h-ph, down=pl-l;
plus.push(up>down&&up>0?up:0);
minus.push(down>up&&down>0?down:0);
}
let atr=trs.slice(0,p).reduce((a,b)=>a+b)/p;
let pDM=plus.slice(0,p).reduce((a,b)=>a+b)/p;
let mDM=minus.slice(0,p).reduce((a,b)=>a+b)/p;
let pDI=(pDM/atr)*100, mDI=(mDM/atr)*100;
return Math.abs(pDI-mDI)/(pDI+mDI)*100;}

let startTime = Date.now();

async function analyze(){
let res = await fetch(API);
let data = await res.json();

let closes = data.map(c=>parseFloat(c[4]));
let price = closes.at(-1);

let ema = EMA(closes.slice(-50),50);
let rsi = RSI(closes);
let adx = ADX(data);

// Base score
let score = 0;
score += (price>ema)?40:-40;
score += (rsi-50)*1.5;
score += (adx-20)*1.8;

// 🔥 LOGIQUE SWITCH 20 SECONDES
let elapsed = Math.floor((Date.now() - startTime)/1000);
let cycle = elapsed % 20;

// Accélération du basculement
let boost = Math.sin(cycle/20 * Math.PI * 2) * 20;

let final = score + boost;
let probability = Math.max(0, Math.min(100, Math.round(final + 50)));

let signal = probability >= 50 ? "ACHETER" : "VENDRE";

// UI
priceEl.innerText = "Prix: " + price.toFixed(4);
emaEl.innerText = ema.toFixed(4);
rsiEl.innerText = rsi.toFixed(2);
adxEl.innerText = adx.toFixed(2);

scoreEl.innerText = signal + " " + probability + "%";

// Affichage % Achat / Vente
buyEl.innerText = "Achat: " + probability + "%";
sellEl.innerText = "Vente: " + (100 - probability) + "%";
status.innerText = signal;
status.className = "status " + (signal === "ACHETER" ? "green" : "red");

timerEl.innerText = "Cycle: " + cycle + "s / 20s";
}

const priceEl = document.getElementById("price");
const emaEl = document.getElementById("ema");
const rsiEl = document.getElementById("rsi");
const adxEl = document.getElementById("adx");
const scoreEl = document.getElementById("score");
const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const buyEl = document.getElementById("buyPct");
const sellEl = document.getElementById("sellPct");

// ⚡ ULTRA RAPIDE 2 secondes + cycle 20s
setInterval(analyze,2000);
analyze();
</script></body>
</html>
