<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken Turbo - Anti-Blocage</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background-color: #050505; color: #fff; text-align: center; padding: 10px; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .container { width: 100%; max-width: 350px; }
        h1 { font-size: 1rem; color: #ffd700; margin: 0 0 10px 0; text-transform: uppercase; }
        
        #signal-box {
            width: 100%; height: 130px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; text-transform: uppercase;
            border: 4px solid #333; background: #111; margin-bottom: 15px;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .signal-text { z-index: 2; text-shadow: 2px 2px 4px #000; line-height: 1.1; }
        .sub-text { font-size: 0.8rem; font-weight: normal; z-index: 2; opacity: 0.9; margin-top: 5px; }

        .buy { background: linear-gradient(135deg, #00ff00, #006400); color: #fff; border-color: #00ff00; box-shadow: 0 0 40px #00ff00; animation: flashG 0.4s infinite; }
        .sell { background: linear-gradient(135deg, #ff0000, #8b0000); color: #fff; border-color: #ff0000; box-shadow: 0 0 40px #ff0000; animation: flashR 0.4s infinite; }
        .loading { background: #222; color: #ffa500; border-color: #ffa500; }
        
        @keyframes flashG { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.5); } 100% { transform: scale(1); } }
        @keyframes flashR { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.5); } 100% { transform: scale(1); } }

        #btn-analyze {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white; border: none; padding: 18px; width: 100%;
            font-size: 1.3rem; font-weight: 900; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.5);
            margin-bottom: 10px; touch-action: manipulation;
        }
        #btn-analyze:active { transform: scale(0.96); }
        #btn-analyze:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }

        .info-panel { background: #1a1a1a; padding: 8px; border-radius: 8px; font-family: monospace; font-size: 0.75rem; color: #aaa; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .val-good { color: #00ff00; } .val-bad { color: #ff0000; }
        
        .btn-small { background: #333; color: #fff; border: 1px solid #555; padding: 6px; width: 100%; border-radius: 5px; font-size: 0.7rem; margin-top: 5px; }
        .btn-small.active { background: #00e676; color: #000; font-weight: bold; border: none; }
        .msg-error { color: #ff4444; font-size: 0.7rem; margin-top: 5px; min-height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Hacken Anti-Blocage</h1>

    <div id="signal-box">
        <div class="signal-text">PRÊT</div>
        <div class="sub-text">Appuie pour analyser</div>
    </div>

    <button id="btn-analyze" onclick="lancerAnalyse()">👉 ANALYSER MAINTENANT</button>
    
    <div class="info-panel">
        <span>Prix: <span id="price">...</span></span>
        <span>Statut: <span id="status" class="val-good">EN LIGNE</span></span>
    </div>
    <div id="error-msg" class="msg-error"></div>

    <button class="btn-small" id="btn-sound" onclick="initAudio()">🔊 ACTIVER SON/VIBRATION</button>
</div>

<script>
    let audioCtx, isAudioReady = false, isProcessing = false;

    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isAudioReady = true;
            document.getElementById('btn-sound').innerText = "✅ SON ACTIVÉ";
            document.getElementById('btn-sound').classList.add('active');
            if(navigator.vibrate) navigator.vibrate(100);
        } catch(e) { console.log("Audio err", e); }
    }

    function playAlert() {
        if (!isAudioReady) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function triggerSignal(type) {
        const box = document.getElementById('signal-box');
        const btn = document.getElementById('btn-analyze');
        document.getElementById('error-msg').innerText = "";

        if (type === 'BUY') {
            box.className = 'buy';
            box.innerHTML = '<div class="signal-text">ACHETER 🟢</div><div class="sub-text">MAINTENANT (10s)</div>';
            document.title = "🟢 ACHETER";
        } else {
            box.className = 'sell';
            box.innerHTML = '<div class="signal-text">VENDRE 🔴</div><div class="sub-text">MAINTENANT (10s)</div>';
            document.title = "🔴 VENDRE";
        }

        if(isAudioReady) playAlert();
        if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

        btn.disabled = true;
        btn.innerText = "TRADE EN COURS...";
        
        setTimeout(() => {
            box.className = '';
            box.style.background = '#111';
            box.style.border = '4px solid #333';
            box.style.color = '#fff';
            box.innerHTML = '<div class="signal-text">PRÊT</div><div class="sub-text">Appuie pour analyser</div>';
            document.title = "Hacken Anti-Blocage";
            btn.disabled = false;
            btn.innerText = "👉 ANALYSER MAINTENANT";
            isProcessing = false;
        }, 9000);
    }

    async function lancerAnalyse() {
        if (isProcessing) return;
        isProcessing = true;
        
        const btn = document.getElementById('btn-analyze');
        const box = document.getElementById('signal-box');
        const priceEl = document.getElementById('price');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error-msg');

        btn.disabled = true;
        btn.innerText = "CONNEXION...";
        box.className = 'loading';
        box.innerHTML = '<div class="signal-text">SCAN...</div><div class="sub-text">Contournement firewall</div>';
        errorEl.innerText = "";
        statusEl.innerText = "CHARGEMENT";
        statusEl.className = "";

        try {
            // MÉTHODE ALTERNATIVE : Utilisation d'un proxy CORS public pour contourner les blocages
            // On essaie d'abord avec un proxy fiable, sinon fallback direct
            const targetUrl = 'https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=5';
            // Utilisation du proxy 'allorigins' qui est très stable pour le JS côté client
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                cache: 'no-cache'
            });

            if (!response.ok) throw new Error("Échec réseau");
            
            const dataWrapper = await response.json();
            if (!dataWrapper.contents) throw new Error("Données vides");

            // Le proxy renvoie le contenu sous forme de string JSON, il faut le parser
            const data = JSON.parse(dataWrapper.contents);

            if (!data || data.length < 3) throw new Error("Données insuffisantes");

            const closes = data.map(k => parseFloat(k[4]));
            const currentPrice = closes[closes.length - 1];
            const prevPrice = closes[closes.length - 3]; // Comparaison sur 3 bougies

            priceEl.innerText = currentPrice.toFixed(5);
            statusEl.innerText = "CONNECTÉ";
            statusEl.className = "val-good";

            // Logique simple et robuste
            const diff = currentPrice - prevPrice;
            
            // Délai artificiel minime pour simuler le calcul et éviter les clics trop rapides
            setTimeout(() => {
                if (diff >= 0) {
                    triggerSignal('BUY');
                } else {
                    triggerSignal('SELL');
                }
            }, 200);

        } catch (error) {
            console.error(error);
            statusEl.innerText = "HORS LIGNE";
            statusEl.className = "val-bad";
            errorEl.innerText = "Erreur: " + error.message + ". Réessaie.";
            
            box.className = '';
            box.style.background = '#220000';
            box.style.border = '4px solid #ff0000';
            box.innerHTML = '<div class="signal-text" style="color:#ff0000">ÉCHEC</div><div class="sub-text">Vérifie Internet</div>';
            
            btn.disabled = false;
            btn.innerText = "👉 RÉESSAYER";
            isProcessing = false;
            if(navigator.vibrate) navigator.vibrate(500);
        }
    }

    if ("Notification" in window) Notification.requestPermission();
</script>
</body>
</html>
