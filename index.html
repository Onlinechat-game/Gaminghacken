<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN STORE - GOLD MASTER</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0f0f0f;
            --gold: #FFD700;
            --gold-dim: #998200;
            --buy: #00ff9d;
            --sell: #ff3b3b;
            --text: #ffffff;
            --gray: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace; /* Style Terminal */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .terminal {
            width: 100%;
            max-width: 480px;
            background-color: var(--card);
            border: 1px solid #333;
            border-top: 4px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            background: linear-gradient(180deg, #1a1a1a, #0f0f0f);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .sub-logo {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 5px;
            display: block;
        }

        .asset-badge {
            display: inline-block;
            margin-top: 10px;
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* CONTENT AREA */
        .content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 350px;
        }

        /* BUTTON */
        .btn-scan {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 18px;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-scan:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* LOADING */
        .loader {
            display: none;
            text-align: center;
        }

        .radar {
            width: 60px;
            height: 60px;
            border: 2px solid #333;
            border-radius: 50%;
            border-top: 2px solid var(--gold);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .log-text {
            font-size: 0.8rem;
            color: var(--gray);
            line-height: 1.6;
            text-align: left;
            background: #050505;
            padding: 10px;
            border: 1px solid #222;
            margin-top: 15px;
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .log-line { margin-bottom: 4px; opacity: 0; animation: fadeIn 0.3s forwards; }
        .log-line.ok { color: var(--buy); }
        .log-line.warn { color: var(--gold); }
        
        @keyframes fadeIn { to { opacity: 1; } }

        /* RESULTS */
        .results {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .price-display {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .signal-box {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .signal-box::before {
            content: "SIGNAL VERROUILLÉ";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 10px;
        }

        .signal-text {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 10px 0;
        }

        .sig-buy { color: var(--buy); text-shadow: 0 0 15px rgba(0,255,157,0.3); }
        .sig-sell { color: var(--sell); text-shadow: 0 0 15px rgba(255,59,59,0.3); }
        .sig-wait { color: var(--gray); }

        .time-frame {
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .level-card {
            background: #080808;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #222;
        }

        .level-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .level-price {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
        }

        .candle-insight {
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid var(--gold);
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 20px;
        }

        .candle-title {
            color: var(--gold);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 0.7rem;
            color: #444;
            border-top: 1px solid #222;
            background: #050505;
        }

    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <h1 class="logo">HACKEN STORE</h1>
        <span class="sub-logo">GOLD SPECIALIST AI</span>
        <div class="asset-badge">XAU/USD ONLY</div>
    </div>

    <div class="content">
        
        <!-- HOME SCREEN -->
        <div id="home-screen">
            <button class="btn-scan" onclick="startDeepScan()">
                🔍 LANCER L'ANALYSE OR
            </button>
            <p style="text-align:center; color:#555; font-size:0.75rem; margin-top:15px;">
                Algorithme de stabilité activé.<br>Le signal restera identique tant que la tendance est valide.
            </p>
        </div>

        <!-- LOADING SCREEN -->
        <div id="loading-screen" class="loader">
            <div class="radar"></div>
            <div class="log-text" id="console-log">
                <!-- Logs injected here -->
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="results">
            <div class="price-display" id="price-val">$0000.00</div>

            <div class="signal-box">
                <div class="signal-text" id="signal-val">WAIT</div>
                <div class="time-frame" id="time-val">--</div>
            </div>

            <div class="levels-grid">
                <div class="level-card">
                    <span class="level-label">Stop Loss (SL)</span>
                    <span class="level-price" style="color:var(--sell)" id="sl-val">---</span>
                </div>
                <div class="level-card">
                    <span class="level-label">Take Profit (TP)</span>
                    <span class="level-price" style="color:var(--buy)" id="tp-val">---</span>
                </div>
            </div>

            <div class="candle-insight">
                <span class="candle-title">🕯️ Analyse des Bougies Japonaises</span>
                <span id="candle-text">En attente...</span>
            </div>

            <button class="btn-scan" style="border-color:#444; color:#666;" onclick="resetApp()">
                NOUVELLE ANALYSE
            </button>
        </div>

    </div>

    <div class="footer">
        Creator HACKEN STORE © 2024 - XAU/USD MASTER
    </div>
</div>

<script>
    // --- CONFIGURATION STRICTE XAU/USD ---
    const GOLD_CONFIG = {
        basePrice: 2035.50,
        volatility: 12.00, // Volatilité moyenne de l'Or
        decimals: 2
    };

    // Mémoire pour la stabilité (Le cœur du système)
    let cachedResult = null;
    let scanCount = 0;

    // Base de données de bougies japonaises spécifiques à l'Or
    const candlePatterns = [
        { name: "Marteau (Hammer)", type: "BUY", desc: "Rejet fort des bas. Les acheteurs institutionnels entrent." },
        { name: "Étoile Filante (Shooting Star)", type: "SELL", desc: "Rejet des hauts. Pression vendeuse massive." },
        { name: "Englobante Haussière", type: "BUY", desc: "Une bougie verte avale la rouge précédente. Signal fort." },
        { name: "Englobante Baissière", type: "SELL", desc: "Une bougie rouge avale la verte précédente. Danger." },
        { name: "Doji (Croix)", type: "WAIT", desc: "Indécision totale du marché. Attendre confirmation." },
        { name: "Avalement (Engulfing)", type: "MIXED", desc: "Volatilité extrême. Risque élevé." },
        { name: "Trois Soldats Blancs", type: "BUY", desc: "Tendance haussière très forte confirmée." },
        { name: "Trois Corbeaux Noirs", type: "SELL", desc: "Krach ou correction majeure en cours." }
    ];

    function startDeepScan() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        
        const consoleEl = document.getElementById('console-log');
        consoleEl.innerHTML = ''; // Clear logs

        const steps = [
            { msg: "Connexion au flux XAU/USD...", delay: 600 },
            { msg: "Analyse de la structure H4...", delay: 1200, class: "ok" },
            { msg: "Identification des bougies japonaises...", delay: 1800 },
            { msg: "Calcul des zones de liquidité...", delay: 2400, class: "warn" },
            { msg: "Vérification de la cohérence (Stability Check)...", delay: 3000 },
            { msg: "Verrouillage du signal...", delay: 3600, class: "ok" }
        ];

        let totalDelay = 0;

        steps.forEach(step => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = `log-line ${step.class || ''}`;
                div.innerText = `> ${step.msg}`;
                consoleEl.appendChild(div);
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }, totalDelay);
            totalDelay += step.delay;
        });

        setTimeout(() => {
            generateStableSignal();
        }, totalDelay + 500);
    }

    function generateStableSignal() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';

        // 1. Mise à jour du prix (Simulation légère)
        let move = (Math.random() - 0.5) * (GOLD_CONFIG.volatility * 0.2);
        let currentPrice = GOLD_CONFIG.basePrice + move;
        GOLD_CONFIG.basePrice = currentPrice; // Update for next time

        // 2. LOGIQUE DE STABILITÉ
        // Si on a déjà un résultat en cache ET qu'on n'a pas scanné trop de fois (simulant peu de temps passé)
        // On REUTILISE le même résultat pour garantir que ça ne change pas en désordre.
        if (cachedResult && scanCount < 5) {
            scanCount++;
            displayResult(currentPrice, cachedResult);
            return;
        }

        // Sinon, on calcule un NOUVEAU signal
        scanCount = 0;
        calculateNewSignal(currentPrice);
    }

    function calculateNewSignal(price) {
        // A. Sélection aléatoire mais pondérée d'une bougie
        const candle = candlePatterns[Math.floor(Math.random() * candlePatterns.length)];
        
        // B. Facteur aléatoire de tendance (RSI simulé)
        const rsi = Math.floor(Math.random() * (80 - 20) + 20);

        let signal = "WAIT";
        let timeFrame = "";
        let sl = 0;
        let tp = 0;
        let reasoning = "";

        // C. Logique de décision stricte basée sur la bougie + RSI
        if (candle.type === "BUY" && rsi < 70) {
            signal = "BUY";
            timeFrame = "Prévision Haussière : 2H - 4H";
            sl = price - (GOLD_CONFIG.volatility * 1.5);
            tp = price + (GOLD_CONFIG.volatility * 3.0);
            reasoning = `La bougie <strong>${candle.name}</strong> confirme un rebond. ${candle.desc} RSI à ${rsi} permet encore de la hausse.`;
        } else if (candle.type === "SELL" && rsi > 30) {
            signal = "SELL";
            timeFrame = "Prévision Baissière : 1H - 3H";
            sl = price + (GOLD_CONFIG.volatility * 1.5);
            tp = price - (GOLD_CONFIG.volatility * 3.0);
            reasoning = `La bougie <strong>${candle.name}</strong> indique un rejet. ${candle.desc} RSI à ${rsi} confirme la force vendeuse.`;
        } else {
            signal = "WAIT";
            timeFrame = "Marché Incertain / Range";
            reasoning = `Bougie <strong>${candle.name}</strong> détectée. ${candle.desc} Confluence insuffisante pour entrer. Attente recommandée.`;
        }

        // Sauvegarde en cache pour les prochains scans
        cachedResult = {
            signal, timeFrame, sl, tp, candleName: candle.name, candleDesc: candle.desc, reasoning
        };

        displayResult(price, cachedResult);
    }

    function displayResult(price, data) {
        // Prix
        document.getElementById('price-val').innerText = '$' + price.toFixed(GOLD_CONFIG.decimals);

        // Signal
        const sigEl = document.getElementById('signal-val');
        sigEl.className = `signal-text ${data.signal === 'BUY' ? 'sig-buy' : (data.signal === 'SELL' ? 'sig-sell' : 'sig-wait')}`;
        sigEl.innerText = data.signal === 'BUY' ? 'ACHETER' : (data.signal === 'SELL' ? 'VENDRE' : 'ATTENDRE');

        document.getElementById('time-val').innerText = data.timeFrame;

        // Niveaux
        if (data.signal !== 'WAIT') {
            document.getElementById('sl-val').innerText = '$' + data.sl.toFixed(GOLD_CONFIG.decimals);
            document.getElementById('tp-val').innerText = '$' + data.tp.toFixed(GOLD_CONFIG.decimals);
        } else {
            document.getElementById('sl-val').innerText = '---';
            document.getElementById('tp-val').innerText = '---';
        }

        // Analyse Bougie
        document.getElementById('candle-text').innerHTML = `
            Formation : <strong style="color:#fff">${data.candleName}</strong><br>
            ${data.candleDesc}<br><br>
            <span style="color:#888; font-size:0.8em">Note IA : ${data.reasoning}</span>
        `;
    }

    function resetApp() {
        // Optionnel : Vider le cache si on veut forcer un nouveau calcul immédiat
        // cachedResult = null; 
        // scanCount = 0;
        
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }
</script>

</body>
</html>
