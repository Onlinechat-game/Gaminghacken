<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAU/USD Mobile AI Bot</title>
    <!-- Chart.js pour les graphiques légers -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --green: #00ff88;
            --red: #ff3333;
            --blue: #00ccff;
            --gray: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 1.2rem; margin-bottom: 5px; text-align: center; }
        .subtitle { font-size: 0.8rem; color: var(--gray); margin-bottom: 20px; text-align: center; }

        /* Carte Principale de Signal */
        .signal-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--gray);
            transition: background 0.5s;
        }
        .signal-card.buy::before { background: var(--green); }
        .signal-card.sell::before { background: var(--red); }
        .signal-card.wait::before { background: var(--blue); }

        .price-display { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .signal-text { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin: 10px 0; letter-spacing: 2px; }
        .confidence-box { 
            background: #222; 
            border-radius: 8px; 
            padding: 10px; 
            margin-top: 15px; 
        }
        .progress-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s ease, background 0.5s; }

        /* Indicateurs Grid */
        .indicators-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .ind-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #222;
        }
        .ind-label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; }
        .ind-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        /* Graphique */
        .chart-container {
            width: 100%;
            max-width: 400px;
            height: 250px;
            background: var(--card);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
        }

        /* Logs */
        .logs {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--gray);
            border: 1px solid #222;
        }
        .log-item { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-time { color: var(--blue); }

        /* Bouton Refresh */
        .btn-refresh {
            background: var(--blue);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }
        .btn-refresh:active { transform: scale(0.98); }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>XAU/USD MOBILE BOT</h1>
    <div class="subtitle">Algorithme Auto-Hébergé (JS Native)</div>

    <!-- Carte de Décision -->
    <div id="signal-card" class="signal-card wait">
        <div style="font-size: 0.9rem; color: #aaa;">PRIX ACTUEL</div>
        <div id="price" class="price-display">---.--</div>
        
        <div id="signal-text" class="signal-text" style="color: var(--gray);">CALCUL...</div>
        <div id="signal-desc" style="font-size: 0.9rem;">Analyse en cours</div>

        <div class="confidence-box">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                <span>Probabilité de succès</span>
                <span id="conf-val">0%</span>
            </div>
            <div class="progress-bg">
                <div id="conf-bar" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Indicateurs Techniques -->
    <div class="indicators-grid">
        <div class="ind-card">
            <div class="ind-label">RSI (14)</div>
            <div id="rsi-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Tendance (EMA)</div>
            <div id="ema-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Volatilité</div>
            <div id="vol-val" class="ind-value">--</div>
        </div>
        <div class="ind-card">
            <div class="ind-label">Momentum</div>
            <div id="mom-val" class="ind-value">--</div>
        </div>
    </div>

    <!-- Graphique -->
    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <!-- Logs -->
    <div id="logs" class="logs"></div>

    <button class="btn-refresh" onclick="startAnalysis()">
        <span id="btn-text">LANCER L'ANALYSE</span>
    </button>

    <script>
        // --- CONFIGURATION ---
        // Utilisation de l'API Binance pour XAUUSDT (Or spot) car c'est gratuit et sans clé API
        // Note: Le prix peut varier légèrement du Forex classique (OANDA), mais la tendance est la même.
        const API_URL = 'https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=15m&limit=100';
        
        let chartInstance = null;
        let priceData = [];
        let closePrices = [];

        // --- MOTEUR D'ANALYSE (Mathématiques Pures) ---

        function log(msg) {
            const logsDiv = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logsDiv.prepend(item);
        }

        // Calcul du RSI (Relative Strength Index)
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const diff = prices[i] - prices[i - 1];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            const rs = (gains / period) / (losses / period || 1);
            return 100 - (100 / (1 + rs));
        }

        // Calcul de la Moyenne Mobile Exponentielle (EMA)
        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length - 1];
            const k = 2 / (period + 1);
            let ema = prices[0];
            for (let i = 1; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        // Calcul de la Volatilité (Écart Type simple sur les 10 dernières bougies)
        function calculateVolatility(prices) {
            const slice = prices.slice(-10);
            const mean = slice.reduce((a, b) => a + b) / slice.length;
            const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / slice.length;
            return Math.sqrt(variance);
        }

        // --- LOGIQUE DE DÉCISION (Le "Cerveau") ---
        function analyzeMarket(data) {
            // Extraction des prix de clôture
            closePrices = data.map(d => parseFloat(d[4])); 
            const currentPrice = closePrices[closePrices.length - 1];
            
            // Calcul des indicateurs
            const rsi = calculateRSI(closePrices);
            const emaShort = calculateEMA(closePrices, 9);
            const emaLong = calculateEMA(closePrices, 21);
            const volatility = calculateVolatility(closePrices);
            const momentum = currentPrice - closePrices[closePrices.length - 5]; // Diff sur 5 périodes

            // Mise à jour de l'UI des indicateurs
            document.getElementById('rsi-val').innerText = rsi.toFixed(2);
            document.getElementById('rsi-val').style.color = rsi > 70 ? 'var(--red)' : (rsi < 30 ? 'var(--green)' : '#fff');
            
            document.getElementById('ema-val').innerText = emaShort > emaLong ? 'HAUSSIERE' : 'BAISSIERE';
            document.getElementById('ema-val').style.color = emaShort > emaLong ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('vol-val').innerText = volatility.toFixed(2);
            document.getElementById('mom-val').innerText = momentum > 0 ? 'POSITIF' : 'NÉGATIF';
            document.getElementById('mom-val').style.color = momentum > 0 ? 'var(--green)' : 'var(--red)';

            document.getElementById('price').innerText = currentPrice.toFixed(2);

            // ALGORITHME DE DÉCISION
            let signal = "ATTENDRE";
            let confidence = 0;
            let reason = "";
            let cardClass = "wait";
            let barColor = "#555";

            // Stratégie de Confluence
            const isBullish = emaShort > emaLong && momentum > 0;
            const isBearish = emaShort < emaLong && momentum < 0;
            const isOverbought = rsi > 70;
            const isOversold = rsi < 30;

            if (isBullish && !isOverbought) {
                signal = "ACHETER";
                cardClass = "buy";
                barColor = "var(--green)";
                reason = "Tendance + Momentum Positif";
                confidence = 60 + (isOversold ? 20 : 0) + ((100-rsi)/2); 
            } else if (isBearish && !isOversold) {
                signal = "VENDRE";
                cardClass = "sell";
                barColor = "var(--red)";
                reason = "Tendance + Momentum Négatif";
                confidence = 60 + (isOverbought ? 20 : 0) + (rsi/2);
            } else if (isOverbought && !isBullish) {
                signal = "VENDRE (Rejet)";
                cardClass = "sell";
                barColor = "var(--red)";
                reason = "RSI Surchauffé";
                confidence = 75;
            } else if (isOversold && !isBearish) {
                signal = "ACHETER (Rebond)";
                cardClass = "buy";
                barColor = "var(--green)";
                reason = "RSI Survendu";
                confidence = 75;
            } else {
                signal = "ATTENDRE";
                reason = "Marché Indécis / Bruit";
                confidence = 40;
            }

            // Limitation de la confiance à 95%
            confidence = Math.min(confidence, 95);

            // Mise à jour UI Signal
            const signalEl = document.getElementById('signal-text');
            const cardEl = document.getElementById('signal-card');
            const descEl = document.getElementById('signal-desc');
            const confBar = document.getElementById('conf-bar');
            const confVal = document.getElementById('conf-val');

            signalEl.innerText = signal.split(' ')[0];
            signalEl.style.color = cardClass === 'buy' ? 'var(--green)' : (cardClass === 'sell' ? 'var(--red)' : 'var(--gray)');
            
            cardEl.className = `signal-card ${cardClass}`;
            descEl.innerText = reason;
            
            confBar.style.width = `${confidence}%`;
            confBar.style.background = barColor;
            confVal.innerText = `${Math.floor(confidence)}%`;

            log(`Analyse terminée. Signal: ${signal} (${Math.floor(confidence)}%)`);
            updateChart(closePrices);
        }

        // --- GESTION DU GRAPHIQUE ---
        function updateChart(prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const labels = prices.map((_, i) => i); // Labels simples 0, 1, 2...

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Prix XAU/USD',
                        data: prices,
                        borderColor: '#00ccff',
                        backgroundColor: 'rgba(0, 204, 255, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            display: true, 
                            grid: { color: '#222' },
                            ticks: { color: '#888' }
                        }
                    },
                    animation: { duration: 0 }
                }
            });
        }

        // --- FONCTION PRINCIPALE ---
        async function startAnalysis() {
            const btnText = document.getElementById('btn-text');
            const originalText = btnText.innerText;
            btnText.innerHTML = '<div class="loader"></div> CHARGEMENT...';
            
            log("Connexion à l'API Binance (XAUUSDT)...");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Erreur API");
                const data = await response.json();
                
                log(`Données reçues: ${data.length} bougies.`);
                analyzeMarket(data);
                
            } catch (error) {
                log("ERREUR: Impossible de charger les données. Vérifiez internet.");
                console.error(error);
                alert("Erreur de connexion. Vérifiez votre réseau mobile/WiFi.");
            } finally {
                btnText.innerText = "REFRAÎCHIR L'ANALYSE";
            }
        }

        // Démarrage automatique au chargement
        window.onload = () => {
            log("Bot Mobile Initialisé.");
            startAnalysis();
            // Auto-refresh toutes les 60 secondes
            setInterval(startAnalysis, 60000);
        };
    </script>
</body>
    </html>
