<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKEN STORE | XAU/USD TERMINAL</title>
    
    <!-- Polices Cyberpunk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #FFD700;
            --gold-dim: #b39700;
            --dark-bg: #050505;
            --panel-bg: rgba(20, 20, 20, 0.7);
            --neon-green: #0f0;
            --neon-red: #f00;
            --cyan: #00f3ff;
            --border-color: #333;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- EFFET CRT SCANLINE --- */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--gold-dim);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--cyan);
        }

        .blink {
            width: 10px; height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* --- LAYOUT PRINCIPAL --- */
        .container {
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            height: calc(100vh - 120px);
            min-height: 600px;
        }

        /* --- WIDGETS CONTAINERS --- */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        .chart-wrapper {
            height: 100%;
            width: 100%;
        }

        /* --- SIDEBAR ANALYSE --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            overflow-y: auto;
        }

        .control-panel {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px dashed #333;
        }

        .btn-scan {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-scan:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 25px var(--gold);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* --- RESULTATS ANALYSE --- */
        .analysis-result {
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            padding: 15px;
            margin-top: 10px;
            display: none; /* Caché par défaut */
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .signal-main {
            text-align: center;
            padding: 15px;
            margin-top: 10px;
            border: 1px solid;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .buy { color: var(--neon-green); border-color: var(--neon-green); box-shadow: inset 0 0 10px rgba(0,255,65,0.2); }
        .sell { color: var(--neon-red); border-color: var(--neon-red); box-shadow: inset 0 0 10px rgba(255,0,60,0.2); }
        .neutral { color: var(--gold); border-color: var(--gold); }

        /* --- LOADER OVERLAY --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-text {
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .progress-bar-container {
            width: 300px;
            height: 4px;
            background: #333;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--gold);
            width: 0%;
            box-shadow: 0 0 10px var(--gold);
            transition: width 0.1s;
        }

        .terminal-log {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
            height: 20px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                height: auto;
            }
            .chart-wrapper { height: 500px; }
            .sidebar { height: auto; }
        }
    </style>
</head>
<body>

    <!-- Ecran de chargement -->
    <div id="loader">
        <div class="loader-text">HACKEN STORE v4.0</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="load-bar"></div>
        </div>
        <div class="terminal-log" id="term-log">CONNEXION AU SERVEUR...</div>
    </div>

    <header>
        <div class="brand">HACKEN STORE</div>
        <div class="system-status">
            <span>XAU/USD LIVE FEED</span>
            <div class="blink"></div>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            
            <!-- GRAPHIQUE PRINCIPAL -->
            <div class="panel chart-wrapper">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_chart"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "fr",
                        "toolbar_bg": "#111",
                        "enable_publishing": false,
                        "hide_side_toolbar": false,
                        "allow_symbol_change": false,
                        "details": true,
                        "studies": [
                            "MASimple@tv-basicstudies",
                            "RSI@tv-basicstudies"
                        ],
                        "container_id": "tradingview_chart"
                    });
                    </script>
                </div>
            </div>

            <!-- PANNEAU LATÉRAL -->
            <div class="panel sidebar">
                
                <div class="control-panel">
                    <button class="btn-scan" id="scanBtn" onclick="runDeepScan()">
                        INITIALISER LE SCAN IA
                    </button>
                </div>

                <!-- Widget Jauge Technique -->
                <div style="height: 320px;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        {
                        "interval": "1h",
                        "width": "100%",
                        "isTransparent": true,
                        "height": "100%",
                        "symbol": "OANDA:XAUUSD",
                        "showIntervalTabs": true,
                        "displayMode": "single",
                        "locale": "fr",
                        "colorTheme": "dark"
                        }
                        </script>
                    </div>
                </div>

                <!-- Zone de Résultat du Scan -->
                <div id="ai-result" class="analysis-result">
                    <div style="color:var(--gold); font-size:0.8rem; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">
                        > RÉSULTAT ALGORITHMIQUE
                    </div>
                    
                    <div class="metric-row"><span>RSI (14):</span> <span id="val-rsi">--</span></div>
                    <div class="metric-row"><span>STOCH:</span> <span id="val-stoch">--</span></div>
                    <div class="metric-row"><span>VOLATILITÉ:</span> <span id="val-vol">--</span></div>
                    
                    <div id="final-signal" class="signal-main neutral">
                        EN ATTENTE
                    </div>
                    <div style="text-align:center; font-size:0.7rem; margin-top:5px; color:#666;">
                        Confiance IA: <span id="conf-val">0%</span>
                    </div>
                </div>

                <!-- Widget News Compact -->
                <div style="flex-grow: 1; min-height: 200px;">
                     <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                        {
                        "feedMode": "symbol",
                        "symbol": "OANDA:XAUUSD",
                        "colorTheme": "dark",
                        "isTransparent": true,
                        "displayMode": "regular",
                        "width": "100%",
                        "height": "100%",
                        "locale": "fr"
                        }
                        </script>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- 1. GESTION DU CHARGEMENT (BOOT SEQUENCE) ---
        window.addEventListener('load', () => {
            const bar = document.getElementById('load-bar');
            const log = document.getElementById('term-log');
            const loader = document.getElementById('loader');
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 500);
                    }, 500);
                } else {
                    width += Math.random() * 5;
                    if(width > 100) width = 100;
                    bar.style.width = width + '%';
                    
                    // Logs aléatoires
                    if(width > 20 && width < 40) log.innerText = "CHARGEMENT DES INDICATEURS...";
                    if(width > 50 && width < 70) log.innerText = "SYNCHRONISATION FLUX DE DONNÉES...";
                    if(width > 80) log.innerText = "ACCÈS AUTORISÉ.";
                }
            }, 50);
        });

        // --- 2. LOGIQUE DE SCAN AVANCÉE (SIMULATION) ---
        function runDeepScan() {
            const btn = document.getElementById('scanBtn');
            const resultBox = document.getElementById('ai-result');
            const signalDiv = document.getElementById('final-signal');
            
            // Reset UI
            btn.disabled = true;
            btn.innerHTML = "ANALYSE EN COURS...";
            resultBox.style.display = 'block';
            signalDiv.className = 'signal-main neutral';
            signalDiv.innerHTML = "CALCUL...";
            
            // Simulation de calcul étape par étape
            let steps = 0;
            const process = setInterval(() => {
                steps++;
                
                if(steps === 1) {
                    document.getElementById('val-rsi').innerText = (Math.random() * (70 - 30) + 30).toFixed(2);
                    document.getElementById('val-stoch').innerText = "OVERBOUGHT";
                }
                if(steps === 2) {
                    document.getElementById('val-vol').innerText = "HIGH";
                    document.getElementById('conf-val').innerText = Math.floor(Math.random() * (98 - 85) + 85) + "%";
                }
                if(steps === 3) {
                    clearInterval(process);
                    finalizeSignal();
                    btn.disabled = false;
                    btn.innerHTML = "RELANCER LE SCAN";
                }
            }, 600);
        }

        function finalizeSignal() {
            const signalDiv = document.getElementById('final-signal');
            const rand = Math.random();
            
            // Logique pondérée pour la démo
            if (rand > 0.6) {
                signalDiv.className = 'signal-main buy';
                signalDiv.innerHTML = "ACHAT FORT<br><span style='font-size:0.7em'>ENTRY: MARKET</span>";
            } else if (rand < 0.3) {
                signalDiv.className = 'signal-main sell';
                signalDiv.innerHTML = "VENTE AGRESSIVE<br><span style='font-size:0.7em'>ENTRY: MARKET</span>";
            } else {
                signalDiv.className = 'signal-main neutral';
                signalDiv.innerHTML = "ATTENTE / RANGE<br><span style='font-size:0.7em'>NO TRADE</span>";
            }
        }
    </script>
</body>
</html>
