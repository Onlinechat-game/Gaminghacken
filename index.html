<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacken TURBO FIX</title>
    <style>
        /* Mêmes styles que avant pour garder le design */
        body { font-family: 'Arial Black', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 10px; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 350px; }
        h1 { font-size: 1.1rem; color: #ffd700; margin: 0 0 10px 0; text-transform: uppercase; }
        #signal-box { width: 100%; height: 140px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin-bottom: 15px; background-color: #111; transition: all 0.2s; }
        .signal-text { z-index: 2; text-shadow: 2px 2px 4px #000; line-height: 1.1; }
        .sub-text { font-size: 0.9rem; font-weight: normal; z-index: 2; opacity: 0.9; margin-top: 5px; }
        .buy { background: linear-gradient(135deg, #00ff00, #008000); color: #fff; border-color: #00ff00; box-shadow: 0 0 50px #00ff00; animation: pulseGreen 0.3s infinite; }
        .sell { background: linear-gradient(135deg, #ff0000, #800000); color: #fff; border-color: #ff0000; box-shadow: 0 0 50px #ff0000; animation: pulseRed 0.3s infinite; }
        @keyframes pulseGreen { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }
        @keyframes pulseRed { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.8); } 100% { transform: scale(1); } }
        #btn-analyze { background: linear-gradient(90deg, #ff0055, #ff5500); color: white; border: none; padding: 20px; width: 100%; font-size: 1.4rem; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.6); margin-bottom: 10px; }
        #btn-analyze:active { transform: scale(0.95); }
        #btn-analyze:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        .stats { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aaa; font-family: monospace; background: #1a1a1a; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        .val { color: #fff; font-weight: bold; }
        button.small-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 5px; }
        button.small-btn.active { background: #00e676; color: #000; font-weight: bold; border: none; }
        .error-msg { color: #ffaa00; font-size: 0.7rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Hacken TURBO FIX</h1>

    <div id="signal-box" style="background:#222; border-color:#555; color:#aaa;">
        <div class="signal-text" style="font-size:1.5rem">PRÊT</div>
        <div class="sub-text">Appuie pour analyser</div>
    </div>

    <button id="btn-analyze" onclick="lancerAnalyseManuelle()">👉 DONNER LE SIGNAL</button>
    
    <div class="stats">
        <span>Prix: <span id="price" class="val">...</span></span>
        <span>Statut: <span id="status" class="val" style="color:#00ff00">EN LIGNE</span></span>
    </div>

    <div id="error-display" class="error-msg">Erreur de connexion. Réessaie.</div>
    <button class="small-btn" id="btn-sound" onclick="initAudio()">🔊 ACTIVER SON</button>
</div>

<script>
    let audioCtx;
    let isAudioReady = false;
    let isProcessing = false;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAudioReady = true;
        document.getElementById('btn-sound').innerText = "✅ SON ACTIVÉ";
        document.getElementById('btn-sound').classList.add('active');
        if (navigator.vibrate) navigator.vibrate(200);
    }

    function playTone(freq, type, duration) {
        if (!isAudioReady) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function triggerAlert(type) {
        const box = document.getElementById('signal-box');
        const btn = document.getElementById('btn-analyze');
        document.getElementById('error-display').style.display = 'none';

        let title, sub, colorClass;
        if (type === 'BUY') {
            title = "ACHETER 🟢"; sub = "MAINTENANT (10s) !"; colorClass = 'buy';
        } else {
            title = "VENDRE 🔴"; sub = "MAINTENANT (10s) !"; colorClass = 'sell';
        }

        box.className = colorClass;
        box.innerHTML = `<div class="signal-text">${title}</div><div class="sub-text">${sub}</div>`;
        document.title = type === 'BUY' ? "🟢 ACHETER" : "🔴 VENDRE";

        if (isAudioReady) {
            playTone(1000, 'sawtooth', 0.15);
            setTimeout(() => playTone(1400, 'sawtooth', 0.15), 160);
            setTimeout(() => playTone(1000, 'sawtooth', 0.3), 320);
        }
        if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);

        btn.disabled = true;
        btn.innerText = "TRADE EN COURS...";
        
        setTimeout(() => {
            box.className = '';
            box.style.background = "#222";
            box.style.border = "4px solid #555";
            box.style.color = "#aaa";
            box.innerHTML = `<div class="signal-text" style="font-size:1.5rem">PRÊT</div><div class="sub-text">Appuie pour analyser</div>`;
            document.title = "Hacken TURBO FIX";
            btn.disabled = false;
            btn.innerText = "👉 DONNER LE SIGNAL";
            isProcessing = false;
        }, 9000);
    }

    async function lancerAnalyseManuelle() {
        if (isProcessing) return;
        isProcessing = true;

        const btn = document.getElementById('btn-analyze');
        const box = document.getElementById('signal-box');
        const priceSpan = document.getElementById('price');
        const statusSpan = document.getElementById('status');
        const errorDisplay = document.getElementById('error-display');

        btn.innerText = "ANALYSE...";
        statusSpan.innerText = "CHARGEMENT...";
        statusSpan.style.color = "#ffa000";
        errorDisplay.style.display = 'none';

        try {
            // Utilisation d'un timestamp unique pour éviter le cache du navigateur
            const timestamp = new Date().getTime();
            // Tentative de connexion avec timeout implicite
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=1m&limit=5&t=${timestamp}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) {
                throw new Error("Réponse réseau invalide: " + response.status);
            }

            const data = await response.json();
            
            if (!data || data.length < 3) {
                throw new Error("Données insuffisantes");
            }

            const closes = data.map(k => parseFloat(k[4]));
            const currentPrice = closes[closes.length - 1];
            const prevPrevPrice = closes[closes.length - 3];

            priceSpan.innerText = currentPrice.toFixed(5);
            statusSpan.innerText = "CONNECTÉ";
            statusSpan.style.color = "#00ff00";

            const momentum = currentPrice - prevPrevPrice;
            
            // Logique Agressive
            if (momentum >= 0) {
                triggerAlert('BUY');
            } else {
                triggerAlert('SELL');
            }

        } catch (error) {
            console.error("Erreur détaillée:", error);
            statusSpan.innerText = "HORS LIGNE";
            statusSpan.style.color = "#ff0000";
            errorDisplay.style.display = 'block';
            errorDisplay.innerText = "Erreur: " + error.message + ". Vérifie HTTPS.";
            
            box.style.borderColor = "#ff0000";
            box.innerHTML = `<div class="signal-text" style="color:#ff0000; font-size:1.2rem">ÉCHEC CONNEXION</div><div class="sub-text">Voir détails ci-dessous</div>`;
            
            btn.disabled = false;
            btn.innerText = "👉 RÉESSAYER";
            isProcessing = false;
            
            // Vibration d'erreur
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
        }
    }

    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }
</script>
</body>
</html>
